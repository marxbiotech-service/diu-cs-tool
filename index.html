8\u751c\u5473\u5291\uff09\n**\u529f\u6548\u8a34\u6c42**\uff1a\u9ad8\u86cb\u767d\u88dc\u5145\u3001\u589e\u52a0\u98fd\u8db3\u611f\u3001\u71df\u990a\u5747\u8861\u3001\u9ad4\u614b\u7ba1\u7406\n**\u5efa\u8b70\u98df\u7528\u91cf/\u4f7f\u7528\u65b9\u5f0f**\uff1a\u6bcf\u65e51\u5305\uff0c\u6bcf\u5305\u6c96\u6ce1180ml\u6c34\n**\u98df\u7528\u6642\u6a5f**\uff1a\u65e9\u9910\u3001\u4ee3\u9910\u3001\u904b\u52d5\u5f8c\u3001\u9ede\u5fc3\u66ff\u4ee3\n**\u9069\u7528\u65cf\u7fa4**\uff1a\u9ad4\u614b\u7ba1\u7406\u65cf\u3001\u6e1b\u8102\u65cf\u3001\u5916\u98df\u65cf\u3001\u9700\u8981\u86cb\u767d\u8cea\u88dc\u5145\u8005\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a\u5927\u8c46\u3001\u725b\u5976\u3001\u9ea9\u8cea\u3001\u5805\u679c\u904e\u654f\u8005\n**\u6ce8\u610f\u4e8b\u9805**\uff1a\u672c\u7522\u54c1\u542b\u5927\u8c46\u3001\u725b\u5976\u3001\u5805\u679c\u3001\u542b\u9ea9\u8cea\u7a40\u7269\u53ca\u5176\u88fd\u54c1\uff0c\u4e0d\u9069\u5408\u5c0d\u5176\u904e\u654f\u9ad4\u8cea\u8005\u98df\u7528\u3002\u7279\u6b8a\u9ad4\u8cea\u8005\u5efa\u8b70\u8aee\u8a62\u91ab\u5e2b\u3002\n**\u904e\u654f\u539f**\uff1a\u5927\u8c46\u3001\u725b\u5976\u3001\u5805\u679c\u3001\u9ea9\u8cea\u7a40\u7269\n**\u98a8\u96aa\u6a19\u7c64**\uff1a\u904e\u654f, \u5927\u8c46, \u725b\u5976, \u9ea9\u8cea, \u5805\u679c, \u7cd6\u5206, \u751c\u5473\u5291\n**\u5ba2\u670d\u5099\u8a3b**\uff1a\u9999\u8549\uff1a\u751c\u611f\uff0b\u597d\u5165\u53e3\uff0c\u9069\u5408\u65b0\u624b\u3002\n\n## Diu+ \u5b45\u5b45\u51cd \n**\u54c1\u724c**\uff1aDiu+\n**\u7522\u54c1\u5206\u985e**\uff1a\u4fdd\u5065\u98df\u54c1\n**\u5291\u578b**\uff1a\u679c\u51cd\n**\u898f\u683c**\uff1a20g/\u5305\n**\u4fdd\u5b58\u671f\u9650**\uff1a18\u500b\u6708\n**\u4fdd\u5b58\u65b9\u5f0f**\uff1a\u9670\u6dbc\u4e7e\u71e5\u8655\uff0c\u907f\u514d\u967d\u5149\u76f4\u5c04\n**\u7522\u5730**\uff1a\u53f0\u7063\n**\u4e3b\u8981\u6210\u5206**\uff1a\u7d9c\u5408\u6d88\u5316\u9175\u7d20\u3001\u852c\u679c\u767c\u9175\u7c89\u3001\u5c71\u8336\u82b1\u8403\u53d6\u3001\u6c7a\u660e\u5b50\u3001\u81b3\u98df\u7e96\u7dad\u3001\u8606\u8588\u3001\u7389\u7c73\u9b1a\u3001\u9b5a\u81a0\u539f\u86cb\u767d\n**\u5168\u6210\u5206**\uff1a\u6c34\u3001D-\u5c71\u68a8\u9187\u6db2\uff08\u751c\u5473\u5291\uff09\u3001\u860b\u679c\u6fc3\u7e2e\u6c41\u3001\u5c08\u5229\u96e3\u6d88\u5316\u6027\u9ea5\u82bd\u7cca\u7cbe\u3001\u6c7a\u660e\u5b50\u8403\u53d6\u7269\u3001\u85e4\u9ec3\u679c\u8403\u53d6\u7269\u3001\u6ab8\u6aac\u9178\u3001\u849f\u84bb\u7c89\u3001\u9e7f\u89d2\u83dc\u81a0\u3001\u7f8a\u89d2\u8c46\u8403\u53d6\u7269\u3001\u6ab8\u6aac\u6fc3\u7e2e\u6c41\u3001\u9999\u6599\u3001\u5c08\u5229\u4e8c\u80dc\u80bd\u9b5a\u81a0\u539f\u86cb\u767d\u7c89\u3001\u679c\u5be1\u7cd6\u7c89\u3001\u8606\u8588\u8403\u53d6\u7269\u3001\u7389\u7c73\u9b1a\u8403\u53d6\u7269\u3001\u5c08\u5229\u5c71\u8336\u82b1\u8403\u53d6\u7269\u3001\u6ab8\u6aac\u9178\u9209\u3001\u7d9c\u5408\u6d88\u5316\u9175\u7d20\u3001\u7d9c\u5408\u852c\u679c\u767c\u9175\u7c89\u3001\u8517\u7cd6\u7d20\u3001\u9ec3\u9999\u8349\u6728\u6a28\u8403\u53d6\u7269\u3001\u7d9c\u5408\u852c\u679c\u8403\u53d6\u7269\n**\u529f\u6548\u8a34\u6c42**\uff1a\u5e6b\u52a9\u6d88\u5316\u5206\u89e3\u3001\u4fc3\u9032\u4ee3\u8b1d\u3001\u8abf\u6574\u6392\u4fbf\u3001\u9ad4\u614b\u7ba1\u7406\n**\u5efa\u8b70\u98df\u7528\u91cf/\u4f7f\u7528\u65b9\u5f0f**\uff1a\u6bcf\u65e51\u6b21\uff0c\u6bcf\u6b211\u5305\n**\u98df\u7528\u6642\u6a5f**\uff1a\u9910\u5f8c\u3001\u5927\u9910\u5f8c\u6216\u6cb9\u81a9\u98f2\u98df\u5f8c\n**\u9069\u7528\u65cf\u7fa4**\uff1a\u5916\u98df\u65cf\u3001\u6cb9\u81a9\u98f2\u98df\u65cf\u3001\u6392\u4fbf\u4e0d\u9806\u8005\u3001\u9ad4\u614b\u7ba1\u7406\u65cf\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a\u5b55\u5a66\u3001\u5e7c\u5152\u8207\u751f\u9577\u767c\u80b2\u671f\u9752\u5c11\u5e74\u3001\u9b5a\u985e\u904e\u654f\u3001\u829d\u9ebb/\u5805\u679c/\u5927\u8c46/\u9ea9\u8cea/\u5947\u7570\u679c\u904e\u654f\u8005\u3001\u8178\u80c3\u6975\u654f\u611f\u8005\n**\u6ce8\u610f\u4e8b\u9805**\uff1a\u542b\u8606\u8588\u8403\u53d6\u7269\uff0c\u5b55\u5a66\u7981\u98df\uff1b\u542b\u9b5a\u985e\u53ca\u5176\u88fd\u54c1\uff1b\u542b\u829d\u9ebb\u3001\u5805\u679c\u3001\u5927\u8c46\u3001\u9ea9\u8cea\u3001\u5947\u7570\u679c\u53ca\u5176\u88fd\u54c1\uff1b\u75be\u75c5\u3001\u814e\u529f\u80fd\u4e0d\u5168\u6216\u904e\u654f\u9ad4\u8cea\u8005\u8acb\u5148\u8aee\u8a62\u91ab\u85e5\u5c08\u696d\u4eba\u58eb\u3002\n**\u904e\u654f\u539f**\uff1a\u9b5a\u985e\u3001\u829d\u9ebb\u3001\u5805\u679c\u3001\u5927\u8c46\u3001\u9ea9\u8cea\u3001\u5947\u7570\u679c\n**\u98a8\u96aa\u6a19\u7c64**\uff1a\u5b55\u5a66\u7981\u7528, \u8178\u80c3\u53cd\u61c9, \u6392\u4fbf\u589e\u52a0, \u9b5a\u985e\u904e\u654f, \u591a\u91cd\u904e\u654f\u539f, \u85e5\u7269\u9593\u9694\n**\u5ba2\u670d\u5099\u8a3b**\uff1a\u6838\u5fc3\uff1a\u5206\u89e3\uff08\u9175\u7d20\uff09\uff0b\u6392\u51fa\uff08\u6c7a\u660e\u5b50/\u7e96\u7dad\uff09\uff0b\u4ee3\u8b1d\uff08\u5c71\u8336\u82b1/\u7389\u7c73\u9b1a\uff09\u3002\n\n## Diu+ \u5eb7\u666e\u8336\uff08\u71b1\u5e36\u6c34\u679c\uff09 \n**\u54c1\u724c**\uff1aDiu+\n**\u7522\u54c1\u5206\u985e**\uff1a\u8336\u98f2\n**\u5291\u578b**\uff1a\u7c89\u672b\u6c96\u6ce1\n**\u898f\u683c**\uff1a5g/\u5305\n**\u4fdd\u5b58\u671f\u9650**\uff1a3\u5e74\n**\u4fdd\u5b58\u65b9\u5f0f**\uff1a\u9670\u6dbc\u4e7e\u71e5\u8655\uff0c\u907f\u514d\u967d\u5149\u76f4\u5c04\n**\u7522\u5730**\uff1a\u53f0\u7063\n**\u4e3b\u8981\u6210\u5206**\uff1a\u5eb7\u666e\u8336\u7c89\u3001\u71b1\u5e36\u6c34\u679c\u679c\u6c41\u7c89\u3001\u81b3\u98df\u7e96\u7dad\u3001\u5c71\u82e6\u74dc\u3001\u6bdb\u5589\u9798\u854a\u82b1\n**\u5168\u6210\u5206**\uff1a\u9ea5\u82bd\u7cca\u7cbe\u3001\u6ab8\u6aac\u9178\u3001InstaKombu\u2122\u5eb7\u666e\u8336\u7c89\u3001\u8d64\u85fb\u7cd6\u9187\u3001\u78b3\u9178\u6c2b\u9209\u3001FiberJuice\u2122\u71b1\u5e36\u6c34\u679c\u679c\u6c41\u7c89\u3001\u4e8c\u6c27\u5316\u77fd\u3001\u8517\u7cd6\u7d20\u3001\u9999\u6599\u3001\u5c08\u5229\u5c71\u82e6\u74dc\u8403\u53d6\u7269\u3001\u5c08\u5229\u6bdb\u5589\u9798\u854a\u82b1\u8403\u53d6\u7c89\n**\u529f\u6548\u8a34\u6c42**\uff1a\u4fc3\u9032\u4ee3\u8b1d\u3001\u5e6b\u52a9\u6d88\u5316\u3001\u9806\u66a2\u6392\u7a7a\u3001\u9ad4\u614b\u7ba1\u7406\n**\u5efa\u8b70\u98df\u7528\u91cf/\u4f7f\u7528\u65b9\u5f0f**\uff1a\u6bcf\u65e51\u6b21\uff0c\u6bcf\u6b211\u5305\uff0c\u52a0\u5165\u7d04200ml\u6c34\n**\u98df\u7528\u6642\u6a5f**\uff1a\u9910\u5f8c\u6216\u65e5\u5e38\u98f2\u7528\n**\u9069\u7528\u65cf\u7fa4**\uff1a\u65b0\u624b\u3001\u5916\u98df\u65cf\u3001\u9ad4\u614b\u7ba1\u7406\u65cf\n**\u904e\u654f\u539f**\uff1a\u7121\u5e38\u898b\u904e\u654f\u539f\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a\u5496\u5561\u56e0\u654f\u611f\u8005\u3001\u5b55\u5a66\u9700\u8a55\u4f30\u3001\u8178\u80c3\u6975\u654f\u611f\u8005\n**\u6ce8\u610f\u4e8b\u9805**\uff1a\u542b\u5496\u5561\u56e0\u7d0420-30mg\uff1b\u8acb\u52ff\u904e\u91cf\u98f2\u7528\u3002\n**\u904e\u654f\u539f**\uff1a\u7121\n**\u98a8\u96aa\u6a19\u7c64**\uff1a\u5496\u5561\u56e0, \u8178\u80c3\u53cd\u61c9, \u8840\u7cd6, \u5b55\u5a66, \u751c\u5473\u5291\n**\u5ba2\u670d\u5099\u8a3b**\uff1a\u820a\u7248\uff0c\u6709\u5496\u5561\u56e0\u3002\n\n## Diu+ \u5eb7\u666e\u8336\uff08\u860b\u679c\u9cf3\u68a8\uff09 \n**\u54c1\u724c**\uff1aDiu+\n**\u7522\u54c1\u5206\u985e**\uff1a\u8336\u98f2\n**\u5291\u578b**\uff1a\u7c89\u672b\u6c96\u6ce1\n**\u898f\u683c**\uff1a5g/\u5305\n**\u4fdd\u5b58\u671f\u9650**\uff1a24\u500b\u6708\n**\u4fdd\u5b58\u65b9\u5f0f**\uff1a\u9670\u6dbc\u4e7e\u71e5\u8655\uff0c\u907f\u514d\u967d\u5149\u76f4\u66ec\n**\u7522\u5730**\uff1a\u53f0\u7063\n**\u4e3b\u8981\u6210\u5206**\uff1a\u5eb7\u666e\u8336\u767c\u9175\u6db2\u3001\u860b\u679c\u679c\u6c41\u7c89\u3001\u9cf3\u68a8\u679c\u6c41\u7c89\u3001\u96e3\u6d88\u5316\u6027\u9ea5\u82bd\u7cca\u7cbe\u3001\u5c71\u82e6\u74dc\u8403\u53d6\u3001\u6bdb\u5589\u9798\u854a\u82b1\u3001\u8299\u746a\u91d1\u8403\u3001\u9999\u6aac\u7cbe\u7cb9\n**\u5168\u6210\u5206**\uff1a\u8acb\u4f9d\u5404\u53e3\u5473\u5f69\u76d2\u6587\u6848\u539f\u6587\u3002\u5171\u7528\u6838\u5fc3\uff1a\u6ab8\u6aac\u9178\u3001\u78b3\u9178\u6c2b\u9209\u3001\u5eb7\u666e\u8336\u7c89\uff08\u9ea5\u82bd\u7cca\u7cbe\u3001\u5eb7\u666e\u8336\u767c\u9175\u6db2\uff09\u3001\u9ea5\u82bd\u7cca\u7cbe\u3001\u679c\u6c41\u7c89\u3001\u96e3\u6d88\u5316\u6027\u9ea5\u82bd\u7cca\u7cbe\u3001\u4e8c\u6c27\u5316\u77fd\u3001\u8517\u7cd6\u7d20\u3001\u9999\u6599\u3001\u5c08\u5229\u5c71\u82e6\u74dc\u8403\u53d6\u7269\u3001\u5c08\u5229\u6bdb\u5589\u9798\u854a\u82b1\u8403\u53d6\u7c89\u3001\u5c08\u5229\u8299\u746a\u91d1\u8403\u3001\u5c08\u5229\u9999\u6aac\u7cbe\u7cb9\u7c89\u3002\n**\u529f\u6548\u8a34\u6c42**\uff1a\u4fc3\u9032\u4ee3\u8b1d\u3001\u5e6b\u52a9\u6d88\u5316\u3001\u8abf\u6574\u8178\u9053\u74b0\u5883\u3001\u9ad4\u614b\u7ba1\u7406\n**\u5efa\u8b70\u98df\u7528\u91cf/\u4f7f\u7528\u65b9\u5f0f**\uff1a\u6bcf\u65e51\u6b21\uff0c\u6bcf\u6b211\u5305\uff0c\u52a0\u5165200ml\u6c34\uff1b\u5fae\u6ce1\u98f2\u6c96\u6ce1\u52ff\u8d85\u904e50\u2103\uff0c\u51b0\u6c34\u6c96\u6ce1\u5efa\u8b70\u591a\u652a\u62cc\n**\u98df\u7528\u6642\u6a5f**\uff1a\u5168\u6642\u6bb5\u53ef\u98f2\u7528\uff0c\u5305\u542b\u665a\u4e0a\n**\u9069\u7528\u65cf\u7fa4**\uff1a\u4e0d\u559d\u5496\u5561\u56e0\u8005\u3001\u5916\u98df\u65cf\u3001\u9ad4\u614b\u7ba1\u7406\u65cf\u3001\u65e5\u5e38\u4fdd\u990a\u65cf\n**\u904e\u654f\u539f**\uff1a\u7121\u5e38\u898b\u904e\u654f\u539f\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a\u8178\u80c3\u6975\u5ea6\u654f\u611f\u8005\u3001\u5b55\u5a66\u9700\u8a55\u4f30\n**\u6ce8\u610f\u4e8b\u9805**\uff1a\u7121\u5496\u5561\u56e0\uff1b\u8acb\u907f\u514d\u904e\u91cf\uff1b\u7279\u6b8a\u9ad4\u8cea\u3001\u5b55\u54fa\u4e2d\u5efa\u8b70\u5148\u8aee\u8a62\u5c08\u696d\u4eba\u58eb\u3002\n**\u98a8\u96aa\u6a19\u7c64**\uff1a\u8178\u80c3\u53cd\u61c9, \u767c\u9175, \u751c\u5473\u5291, \u5b55\u5a66\n**\u5ba2\u670d\u5099\u8a3b**\uff1a\u5347\u7d1a\u7248\u662f\u7121\u5496\u5561\u56e0\uff0c\u4e3b\u8ef8\uff1a\u767c\u9175\uff0b\u6c34\u679c\uff0b\u7121\u5496\u5561\u56e0\u3002\n\n## Diu+ \u5eb7\u666e\u8336\uff08\u9e9d\u9999\u8461\u8404\uff09 \n**\u54c1\u724c**\uff1aDiu+\n**\u7522\u54c1\u5206\u985e**\uff1a\u8336\u98f2\n**\u5291\u578b**\uff1a\u7c89\u672b\u6c96\u6ce1\n**\u898f\u683c**\uff1a5g/\u5305\n** 01\u6d77\u6d0b\u9382\u3001\u5341\u76ca\u83cc\u3001\u5c08\u5229\u76ca\u751f\u83cc\u7c89\n**\u529f\u6548\u8a34\u6c42**\uff1a\u4fc3\u9032\u5206\u89e3\u3001\u8abf\u6574\u83cc\u76f8\u3001\u5e6b\u52a9\u6392\u4fbf\u9806\u66a2\n**\u5efa\u8b70\u98df\u7528\u91cf/\u4f7f\u7528\u65b9\u5f0f**\uff1a\u6bcf\u65e51\u5305\uff0c\u53ef\u76f4\u63a5\u5403\u6216\u52a0\u5165100cc\u5e38\u6eab\u6c34\uff1b\u907f\u514d\u9ad8\u6eab\n**\u98df\u7528\u6642\u6a5f**\uff1a\u65e5\u5e38/\u9910\u5f8c\n**\u9069\u7528\u65cf\u7fa4**\uff1a\u6392\u4fbf\u4e0d\u9806\u3001\u5916\u98df\u65cf\u3001\u8178\u9053\u83cc\u76f8\u4e0d\u7a69\u8005\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a\u5b55\u5a66\u3001\u4e73\u7cd6\u4e0d\u8010\u8005\u3001\u8178\u80c3\u6975\u654f\u611f\u8005\n**\u6ce8\u610f\u4e8b\u9805**\uff1a\u4e8c\u5230\u516d\u6b72\u56db\u5206\u4e4b\u4e00\u5305\uff0c\u5341\u4e8c\u6b72\u4ee5\u4e0b\u534a\u5305\uff1b\u5b55\u5a66\u4e0d\u5efa\u8b70\uff1b\u82e5\u6709\u4e0d\u9069\u505c\u7528\u4e26\u8aee\u8a62\u91ab\u5e2b\n**\u904e\u654f\u539f**\uff1a\u4e73\u7cd6/\u5976\u7c89\u76f8\u95dc\n**\u98a8\u96aa\u6a19\u7c64**\uff1a\u8178\u80c3\u53cd\u61c9, \u6392\u4fbf\u589e\u52a0, \u5b55\u5a66, \u4e73\u7cd6, \u76ca\u751f\u83cc\n**\u5ba2\u670d\u5099\u8a3b**\uff1a\u6392\u4fbf\u554f\u984c\u5efa\u8b70\u512a\u683c\u3002\n\n## Diu+ \u5495\u5695\u5495\u5695\u8d85\u7e96\u9175\u7d20\u7c89\uff08\u8393\u679c\uff09 \n**\u54c1\u724c**\uff1aDiu+\n**\u7522\u54c1\u5206\u985e**\uff1a\u4fdd\u5065\u98df\u54c1\n**\u5291\u578b**\uff1a\u7c89\u672b\n**\u898f\u683c**\uff1a10g/\u5305\n**\u4fdd\u5b58\u671f\u9650**\uff1a3\u5e74\n**\u4fdd\u5b58\u65b9\u5f0f**\uff1a\u9670\u6dbc\u4e7e\u71e5\u8655\n**\u7522\u5730**\uff1a\u53f0\u7063\n**\u4e3b\u8981\u6210\u5206**\uff1a\u690d\u7269\u7d9c\u5408\u9175\u7d20\u3001\u76ca\u751f\u83cc\u3001\u679c\u5be1\u7cd6\u3001\u8393\u679c\u8403\u53d6\u3001\u6d77\u6d0b\u9382\n**\u5168\u6210\u5206**\uff1a\u4e73\u7cd6\u3001\u679c\u5be1\u7cd6\u3001\u690d\u7269\u7d9c\u5408\u9175\u7d20\u3001\u512a\u683c\u679c\u6c41\u7c89\u3001\u8513\u8d8a\u8
