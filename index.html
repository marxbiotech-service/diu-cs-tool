\u7269\u3001\u8461\u8404\u9152\u7c95\u8403\u53d6\u7269\u3001\u5927\u541f\u91c0\u9152\u7c95\n**\u529f\u6548\u8a34\u6c42**\uff1a\u5e6b\u52a9\u6cb9\u5207\u3001\u4ee3\u8b1d\u8abf\u6574\n**\u5efa\u8b70\u98df\u7528\u91cf/\u4f7f\u7528\u65b9\u5f0f**\uff1a\u71b1\u6c34\u6c96\u6ce1\uff0c\u7d04300cc\uff0c\u4f9d\u559c\u597d\u8abf\u6574\u6642\u9593\n**\u98df\u7528\u6642\u6a5f**\uff1a\u9910\u5f8c/\u6cb9\u81a9\u5f8c\n**\u9069\u7528\u65cf\u7fa4**\uff1a\u6cb9\u81a9\u98f2\u98df\u65cf\n**\u904e\u654f\u539f**\uff1a\u7121\u5e38\u898b\u904e\u654f\u539f\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a\u5b55\u5a66\u3001\u54fa\u4e73\u3001\u5152\u7ae5\u3001\u7279\u6b8a\u75be\u75c5\u8005\n**\u6ce8\u610f\u4e8b\u9805**\uff1a\u5b55\u5a66\u3001\u54fa\u4e73\u5a66\u5973\u3001\u5152\u7ae5\u3001\u8eab\u9ad4\u4e0d\u9069\u8005\u8acb\u52ff\u98df\u7528\uff1b\u7279\u6b8a\u75be\u75c5\u8005\u5148\u8aee\u8a62\u91ab\u5e2b\n**\u98a8\u96aa\u6a19\u7c64**\uff1a\u5b55\u5a66, \u5496\u5561\u56e0, \u8178\u80c3\u53cd\u61c9, \u8349\u672c\n**\u5ba2\u670d\u5099\u8a3b**\uff1a\u6cb9\u81a9\u98f2\u98df\u5efa\u8b70\u6d1b\u795e\u8336\u3002\n\n## Diu+ \u4e1f\u4e1f\u8336\uff08\u9cf3\u68a8\u9175\u7d20\u8336\uff09 \u26a0\ufe0f\u3010\u5373\u5c07\u505c\u552e\uff0c\u5eab\u5b58\u552e\u5b8c\u70ba\u6b62\u3011\n**\u54c1\u724c**\uff1aDiu+\n**\u7522\u54c1\u5206\u985e**\uff1a\u8336\u98f2\n**\u5291\u578b**\uff1a\u8336\u5305\n**\u898f\u683c**\uff1a3.5g/\u5305\n**\u4fdd\u5b58\u671f\u9650**\uff1a2\u5e74\n**\u4fdd\u5b58\u65b9\u5f0f**\uff1a\u4e7e\u71e5\u9670\u6dbc\u8655\u6216\u51b7\u85cf\n**\u7522\u5730**\uff1a\u53f0\u7063\n**\u4e3b\u8981\u6210\u5206**\uff1a\u9ea5\u8336\u3001\u854e\u9ea5\u3001\u7d05\u8336\u3001\u4ed9\u6942\u3001\u6d1b\u795e\u3001\u85e4\u9ec3\u679c\u3001\u9cf3\u68a8\u9175\u7d20\n**\u5168\u6210\u5206**\uff1a\u9ea5\u8336\u3001\u854e\u9ea5\u3001\u7d05\u8336\u3001\u9999\u6599\u3001\u4ed9\u6942\u3001\u6ab8\u6aac\u9178\u3001\u6894\u5b50\u9ec3\u8272\u7d20\u3001\u860b\u679c\u9178\u3001\u751c\u83ca\u7cd6\u82f7\u3001\u6d1b\u795e\u3001\u5c08\u5229\u85e4\u9ec3\u679c\u8403\u53d6\u7269\u3001\u8461\u8404\u76ae\u8403\u53d6\u7269\u3001\u9cf3\u68a8\u62bd\u51fa\u7269\n**\u529f\u6548\u8a34\u6c42**\uff1a\u5e6b\u52a9\u5206\u89e3\u3001\u9806\u66a2\u4ee3\u8b1d\n**\u5efa\u8b70\u98df\u7528\u91cf/\u4f7f\u7528\u65b9\u5f0f**\uff1a\u71b1\u6c34\u6c96\u6ce1\uff0c\u7d04300cc\uff0c\u4f9d\u559c\u597d\u8abf\u6574\u6642\u9593\n**\u98df\u7528\u6642\u6a5f**\uff1a\u9910\u5f8c/\u5927\u9910\u5f8c\n**\u9069\u7528\u65cf\u7fa4**\uff1a\u5927\u9910\u5f8c\u3001\u6cb9\u81a9\u98f2\u98df\u65cf\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a\u5b55\u5a66\u3001\u54fa\u4e73\u3001\u5152\u7ae5\u3001\u7279\u6b8a\u75be\u75c5\u8005\n**\u6ce8\u610f\u4e8b\u9805**\uff1a\u5b55\u5a66\u3001\u54fa\u4e73\u5a66\u5973\u3001\u5152\u7ae5\u3001\u8eab\u9ad4\u4e0d\u9069\u8005\u8acb\u52ff\u98df\u7528\uff1b\u7279\u6b8a\u75be\u75c5\u8005\u5148\u8aee\u8a62\u91ab\u5e2b\n**\u904e\u654f\u539f**\uff1a\u542b\u9ea9\u8cea\u7a40\u7269\u53ca\u5176\u88fd\u54c1\n**\u98a8\u96aa\u6a19\u7c64**\uff1a\u5b55\u5a66, \u5496\u5561\u56e0, \u8178\u80c3\u53cd\u61c9, \u8349\u672c, \u9ea9\u8cea\n**\u5ba2\u670d\u5099\u8a3b**\uff1a\u5927\u9910\u5f8c\u6d88\u5316\u53ef\u9078\u9cf3\u68a8\u9175\u7d20\u8336\u3002\n\n## Diu+ \u73ab\u7470\u5b45\u5b45\u98f2\uff08\u5347\u7d1a\u7248\uff09 \n**\u54c1\u724c**\uff1aDiu+\n**\u7522\u54c1\u5206\u985e**\uff1a\u4fdd\u5065\u98df\u54c1\n**\u5291\u578b**\uff1a\u7c89\u672b\u6c96\u6ce1\n**\u898f\u683c**\uff1a7g/\u5305\n**\u4fdd\u5b58\u671f\u9650**\uff1a2\u5e74\n**\u4fdd\u5b58\u65b9\u5f0f**\uff1a\u9670\u6dbc\u8655\uff0c\u62c6\u5c01\u5f8c\u76e1\u5feb\u98df\u7528\n**\u7522\u5730**\uff1a\u53f0\u7063\n**\u4e3b\u8981\u6210\u5206**\uff1a\u6d0b\u8eca\u524d\u5b50\u6bbc\u3001\u8c4c\u8c46\u7e96\u7dad\u3001\u85e4\u9ec3\u679c\u3001\u767d\u814e\u8c46\u3001\u5c71\u82e6\u74dc\u3001\u7d9c\u5408\u9175\u7d20\u3001\u9748\u829d\u83cc\u7d72\u9ad4\u767c\u9175\u7269\u3001\u7a40\u80f1\u7518\u80bd\n**\u5168\u6210\u5206**\uff1a\u6d0b\u8eca\u524d\u5b50\u6bbc\u7c89\u3001\u8513\u8d8a\u8393\u8abf\u5473\u679c\u6c41\u7c89\u3001\u8c4c\u8c46\u7e96\u7dad\u3001IMMIO\u00aeMSD\u591a\u91a3\u9ad4\u8907\u5408\u8403\u53d6\u7269\u3001\u860b\u679c\u9178\u3001\u85e4\u9ec3\u679c\u8403\u53d6\u7269\u3001\u767d\u814e\u8c46\u8403\u53d6\u7269\u3001\u73ab\u7470\u82b1\u9999\u6599\u7c89\u3001\u7d9c\u5408\u9175\u7d20\u3001\u860b\u679c\u7e96\u7dad\u3001\u7d9c\u5408\u8393\u679c\u9999\u6599\u7c89\u3001\u8517\u7cd6\u7d20\u3001\u82e6\u74dc\u8403\u53d6\u7c89\u3001\u7a40\u80f1\u7518\u80bd\u3001\u73ab\u7470\u82b1\u74e3\u8403\u53d6\u7269\n**\u529f\u6548\u8a34\u6c42**\uff1a\u9ad8\u7e96\u7dad\u88dc\u5145\u3001\u8178\u9053\u9806\u66a2\u3001\u71b1\u91cf\u8207\u6fb1\u7c89\u63a7\u5236\u3001\u9ad4\u614b\u7ba1\u7406\n**\u5efa\u8b70\u98df\u7528\u91cf/\u4f7f\u7528\u65b9\u5f0f**\uff1a\u6bcf\u65e51-2\u5305\uff0c\u642d\u914d\u8db3\u91cf\u6c34\u98df\u7528\n**\u98df\u7528\u6642\u6a5f**\uff1a\u65e5\u5e38/\u9910\u524d\u6216\u9910\u5f8c\uff0c\u9808\u591a\u559d\u6c34\n**\u9069\u7528\u65cf\u7fa4**\uff1a\u6392\u4fbf\u4e0d\u9806\u3001\u98f2\u98df\u4e0d\u5747\u3001\u9ad4\u614b\u7ba1\u7406\u65cf\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a\u5b55\u5a66\u3001\u54fa\u4e73\u3001\u5b30\u5e7c\u5152\u3001\u771f\u83cc\u904e\u654f\u8005\u3001\u8178\u80c3\u6975\u654f\u611f\u8005\n**\u6ce8\u610f\u4e8b\u9805**\uff1a\u542b\u6d0b\u8eca\u524d\u5b50\u9700\u642d\u914d\u8db3\u91cf\u6c34\uff1b\u5b55\u5a66\u3001\u54fa\u4e73\u5a66\u5973\u3001\u5b30\u5e7c\u5152\u61c9\u907f\u514d\uff1b\u542b\u6851\u9ec3\u83cc\u7d72\u9ad4\uff0c\u5b30\u5e7c\u5152\u3001\u5b55\u5a66\u53ca\u54fa\u4e73\u4e0d\u5b9c\u98df\u7528\n**\u904e\u654f\u539f**\uff1a\u7a40\u80f1\u7518\u80bd\u3001\u6d0b\u8eca\u524d\u5b50\u3001\u6851\u9ec3\u83cc\u7d72\u9ad4\n**\u98a8\u96aa\u6a19\u7c64**\uff1a\u8178\u80c3\u53cd\u61c9, \u6392\u4fbf\u589e\u52a0, \u5b55\u5a66, \u771f\u83cc\u904e\u654f, \u9ad8\u7e96\u7dad, \u8840\u7cd6, \u6fb1\u7c89\u963b\u65b7\n**\u5ba2\u670d\u5099\u8a3b**\uff1a\u6b63\u5f0f\u540d\u7a31\u4f9d\u4f7f\u7528\u8005\u66f4\u6b63\u70ba\u5b45\u5b45\u98f2\uff08\u5347\u7d1a\u7248\uff09\uff0c\u907f\u514d\u7e96\u7e96\u8aa4\u690d\u3002\n\n## Diu+ \u85e4\u9ec3\u679c\u6c34\u871c\u6843\u8336 \n**\u54c1\u724c**\uff1aDiu+\n**\u7522\u54c1\u5206\u985e**\uff1a\u8336\u98f2\n**\u5291\u578b**\uff1a\u8336\u5305\n**\u898f\u683c**\uff1a3.5g/\u5305\n**\u4fdd\u5b58\u671f\u9650**\uff1a2\u5e74\n**\u4fdd\u5b58\u65b9\u5f0f**\uff1a\u9670\u6dbc\u4e7e\u71e5\u8655\n**\u7522\u5730**\uff1a\u53f0\u7063\n**\u4e3b\u8981\u6210\u5206**\uff1a\u85e4\u9ec3\u679c\u3001\u6bdb\u5589\u9798\u854a\u82b1\u3001\u56db\u68f1\u767d\u7c89\u85e4\u3001\u67d1\u6a58HPMF\u3001\u5eb7\u666e\u8336\u7c89\u3001\u4ed9\u4eba\u638c\u3001\u7389\u7c73\u9b1a\u3001\u5357\u975e\u570b\u5bf6\u7d05\u8336\n**\u5168\u6210\u5206**\uff1a\u5357\u975e\u570b\u5bf6\u7d05\u8336\u3001\u6c34\u871c\u6843\u679c\u4e7e\uff08\u6c34\u871c\u6843\u3001\u7c73\u7c89\uff09\u3001\u854e\u9ea5\u3001\u9999\u6599\u3001\u860b\u679c\u9178\u3001\u6ab8\u6aac\u9178\u3001\u5927\u9ea5\u3001\u8517\u7cd6\u7d20\uff08\u751c\u5473\u5291\uff09\u3001\u85e4\u9ec3\u679c\u8403\u53d6\u7269\u3001\u5eb7\u666e\u8336\u7c89\u3001\u5c08\u5229\u6bdb\u5589\u9798\u854a\u82b1\u8403\u53d6\u7269\uff08\u6bdb\u5589\u9798\u854a\u82b1\u8403\u53d6\u7269\u3001\u9ea5\u82bd\u7cca\u7cbe\uff09\u3001\u56db\u68f1\u767d\u7c89\u85e4\u8403\u53d6\u7269\u3001\u67d1\u6a58\u8403\u53d6\u7269\uff08\u542bHPMF\u2122\uff09\uff08\u9ea5\u82bd\u7cca\u7cbe\u3001\u67d1\u6a58\u8403\u53d6\u7269\u3001\u8102\u80aa\u9178\u8517\u7cd6\u916f\u3001\u8102\u80aa\u9178\u7518\u6cb9\u916f\u3001\u8475\u82b1\u6cb9\u3001\u67d1\u6a58\u679c\u81a0\uff09\u3001\u4ed9\u4eba\u638c\u8403\u53d6\u7269\u3001\u7389\u7c73\u9b1a\u8403\u53d6\u7269\uff08\u7389\u7c73\u9b1a\u8403\u53d6\u7269\u3001\u9ea5\u82bd\u7cca\u7cbe\uff09\n**\u529f\u6548\u8a34\u6c42**\uff1a\u6cb9\u8102\u63a7\u5236\u3001\u4fc3\u9032\u4ee3\u8b1d\u3001\u6c34\u5206\u4ee3\u8b1d\u3001\u9ad4\u614b\u7ba1\u7406\n**\u5efa\u8b70\u98df\u7528\u91cf/\u4f7f\u7528\u65b9\u5f0f**\uff1a\u6bcf\u65e51\u6b21\uff0c\u6bcf\u6b211\u5305\uff0c\u71b1\u6c34\u6c96\u6ce1\u7d04200cc\n**\u98df\u7528\u6642\u6a5f**\uff1a\u9910\u5f8c/\u6cb9\u81a9\u98f2\u98df\u5f8c\n**\u9069\u7528\u65cf\u7fa4**\uff1a\u5916\u98df\u65cf\u3001\u6cb9\u81a9\u98f2\u98df\u65cf\u3001\u9ad4\u614b\u7ba1\u7406\u65cf\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a\u9ea9\u8cea\u904e\u654f\u8005\u3001\u5b55\u5a66\u3001\u5e7c\u5152\u3001\u751f\u9577\u767c\u80b2\u671f\u9752\u5c11\u5e74\u3001\u814e\u529f\u80fd\u4e0d\u5168\u8005\u9700\u8a55\u4f30\n**\u6ce8\u610f\u4e8b\u9805**\uff1a(\u4e00)\u8acb\u4f9d\u7167\u5efa\u8b70\u98df\u7528\u91cf\u98df\u7528\u3002\n(\u4e8c)\u672c\u7522\u54c1\u542b\u6709\u9ea9\u8cea\u4e4b\u7a40\u7269\u53ca\u5176\u88fd\u54c1\uff0c\u4e0d\u9069\u5408\u5c0d\u5176\u904e\u654f\u9ad4\u8cea\u8005\u98df\u7528\u3002\n(\u4e09)\u5b55\u5a66\u3001\u5e7c\u5152\u8207\u751f\u9577\u767c\u80b2\u671f\u4e4b\u9752\u5c11\u5e74\u4e0d\u5b9c\u4f7f\u7528\u3002\n(\u56db)\u82e5\u6709\u75be\u75c5\u3001\u814e\u529f\u80fd\u4e0d\u5168\u6216\u904e\u654f\u9ad4\u8cea\u8005\uff0c\u8acb\u5148\u8aee\u8a62\u91ab\u85e5\u5c08\u696d\u4eba\u58eb\u518d\u98df\u7528\u3002\n(\u4e94)\u98df\u7528\u5f8c\u82e5\u7522\u751f\u4e0d\u9069\u75c7\u72c0\uff0c\u8acb\u7acb\u5373\u505c\u6b62\u98df\u7528\u3002\n**\u904e\u654f\u539f**\uff1a\u9ea9\u8cea\u7a40\u7269\u53ca\u5176\u88fd\u54c1\n**\u98a8\u96aa\u6a19\u7c64**\uff1a\u9ea9\u8cea\u904e\u654f, \u5b55\u5a66\u7981\u7528, \u814e\u529f\u80fd, \u8349\u672c, \u4ee3\u8b1d, \u8178\u80c3\u53cd\u61c9\n**\u5ba2\u670d\u5099\u8a3b**\uff1a\u8acb\u8207\u5176\u4ed6\u85e5\u7269\u9593\u96942\u5c0f\u6642\uff1b\u7570\u5e38\u7522\u54c1\u52ff\u98df\u7528\u3002\n\n## Diu+ \u85e4\u9ec3\u679c\u91d1\u9ea5\u8336 \n**\u54c1\u724c**\uff1aDiu+\n**\u7522\u54c1\u5206\u985e**\uff1a\u8336\u98f2\n**\u5291\u578b**\uff1a\u8336\u5305\n**\u898f\u683c**\uff1a3.5g/\u5305\n**\u4fdd\u5b58\u671f\u9650**\uff1a2\u5e74\n**\u4fdd\u5b58\u65b9\u5f0f**\uff1a\u9670\u6dbc\u4e7e\u71e5\u8655\n**\u7522\u5730**\uff1a\u53f0\u7063\n**\u4e3b\u8981\u6210\u5206**\uff1a\u85e4\u9ec3\u679c\u3001\u6bdb\u5589\u9798\u854a\u82b1\u3001\u9cf3\u68a8\u9175\u7d20\u3001\u56db\u68f1\u767d\u7c89\u85e4\u3001\u67d1\u6a58HPMF\u3001\u4ed9\u4eba\u638c\u3001\u7389\u7c73\u9b1a\u3001\u5357\u975e\u570b\u5bf6\u7da0\u8336\n**\u5168\u6210\u5206**\uff1a\u854e\u9ea5\u3001\u5357\u975e\u570b\u5bf6\u7da0\u8336\u3001\u6ab8\u6aac\u9178\u3001\u5927\u9ea5\u3001\u860b\u679c\u9178\u3001\u9999\u6599\u3001\u8517\u7cd6\u7d20\uff08\u751c\u5473\u5291\uff09\u3001\u85e4\u9ec3\u679c\u8403\u53d6\u7269\u3001\u9cf3\u68a8\u9175\u7d20\uff08\u9ea5\u82bd\u7cca\u7cbe\u3001\u9cf3\u68a8\u9175\u7d20\uff09\u3001\u56db\u68f1\u767d\u7c89\u85e4\u8403\u53d6\u7269\u3001\u5c08\u5229\u6bdb\u5589\u9798\u854a\u82b1\u8403\u53d6\u7269\uff08\u6bdb\u5589\u9798\u854a\u82b1\u8403\u53d6\u7269\u3001\u9ea5\u82bd\u7cca\u7cbe\uff09\u3001\u67d1\u6a58\u8403\u53d6\u7269\uff08\u542bHPMF\u2122\uff09\uff08\u9ea5\u82bd\u7cca\u7cbe\u3001\u67d1\u6a58\u8403\u53d6\u7269\u3001\u8102\u80aa\u9178\u8517\u7cd6\u916f\u3001\u8102\u80aa\u9178\u7518\u6cb9\u916f\u3001\u8475\u82b1\u6cb9\u3001\u67d1\u6a58\u679c\u81a0\uff09\u3001\u4ed9\u4eba\u638c\u8403\u53d6\u7269\u3001\u7389\u7c73\u9b1a\u8403\u53d6\u7269\uff08\u7389\u7c73\u9b1a\u8403\u53d6\u7269\u3001\u9ea5\u82bd\u7cca\u7cbe\uff09\n**\u529f\u6548\u8a34\u6c42**\uff1a\u6cb9\u8102\u63a7\u5236\u3001\u4fc3\u9032\u4ee3\u8b1d\u3001\u6c34\u5206\u4ee3\u8b1d\u3001\u9ad4\u614b\u7ba1\u7406\n**\u5efa\u8b70\u98df\u7528\u91cf/\u4f7f\u7528\u65b9\u5f0f**\uff1a\u6bcf\u65e51\u6b21\uff0c\u6bcf\u6b211\u5305\uff0c\u71b1\u6c34\u6c96\u6ce1\u7d04200cc\n**\u98df\u7528\u6642\u6a5f**\uff1a\u9910\u5f8c/\u6cb9\u81a9\u98f2\u98df\u5f8c\n**\u9069\u7528\u65cf\u7fa4**\uff1a\u5916\u98df\u65cf\u3001\u6cb9\u81a9\u98f2\u98df\u65cf\u3001\u9ad4\u614b\u7ba1\u7406\u65cf\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a\u9ea9\u8cea\u904e\u654f\u8005\u3001\u5b55\u5a66\u3001\u5e7c\u5152\u3001\u751f\u9577\u767c\u80b2\u671f\u9752\u5c11\u5e74\u3001\u814e\u529f\u80fd\u4e0d\u5168\u8005\u9700\u8a55\u4f30\n**\u6ce8\u610f\u4e8b\u9805**\uff1a(\u4e00)\u8acb\u4f9d\u7167\u5efa\u8b70\u98df\u7528\u91cf\u98df\u7528\u3002\n(\u4e8c)\u672c\u7522\u54c1\u542b\u6709\u9ea9\u8cea\u4e4b\u7a40\u7269\u53ca\u5176\u88fd\u54c1\uff0c\u4e0d\u9069\u5408\u5c0d\u5176\u904e\u654f\u9ad4\u8cea\u8005\u98df\u7528\u3002\n(\u4e09)\u5b55\u5a66\u3001\u5e7c\u5152\u8207\u751f\u9577\u767c\u80b2\u671f\u4e4b\u9752\u5c11\u5e74\u4e0d\u5b9c\u4f7f\u7528\u3002\n(\u56db)\u82e5\u6709\u75be\u75c5\u3001\u814e\u529f\u80fd\u4e0d\u5168\u6216\u904e\u654f\u9ad4\u8cea\u8005\uff0c\u8acb\u5148\u8aee\u8a62\u91ab\u85e5\u5c08\u696d\u4eba\u58eb\u518d\u98df\u7528\u3002\n(\u4e94)\u98df\u7528\u5f8c\u82e5\u7522\u751f\u4e0d\u9069\u75c7\u72c0\uff0c\u8acb\u7acb\u5373\u505c\u6b62\u98df\u7528\u3002\n**\u904e\u654f\u539f**\uff1a\u9ea9\u8cea\u7a40\u7269\u53ca\u5176\u88fd\u54c1\n**\u98a8\u96aa\u6a19\u7c64**\uff1a\u9ea9\u8cea\u904e\u654f, \u5b55\u5a66\u7981\u7528, \u814e\u529f\u80fd, \u8349\u672c, \u4ee3\u8b1d, \u8178\u80c3\u53cd\u61c9\n**\u5ba2\u670d\u5099\u8a3b**\uff1a\u8acb\u8207\u5176\u4ed6\u85e5\u7269\u9593\u96942\u5c0f\u6642\uff1b\u7570\u5e38\u7522\u54c1\u52ff\u98df\u7528\u3002\n\n## Diu+ \u85e4\u9ec3\u679c\u6d1b\u795e\u8336 \n**\u54c1\u724c**\uff1aDiu+\n**\u7522\u54c1\u5206\u985e**\uff1a\u8336\u98f2\n**\u5291\u578b**\uff1a\u8336\u5305\n**\u898f\u683c**\uff1a3.5g/\u5305\n**\u4fdd\u5b58\u671f\u9650**\uff1a2\u5e74\n**\u4fdd\u5b58\u65b9\u5f0f**\uff1a\u9670\u6dbc\u4e7e\u71e5\u8655\n**\u7522\u5730**\uff1a\u53f0\u7063\n**\u4e3b\u8981\u6210\u5206**\uff1a\u85e4\u9ec3\u679c\u3001\u6bdb\u5589\u9798\u854a\u82b1\u3001\u56db\u68f1\u767d\u7c89\u85e4\u3001\u67d1\u6a58HPMF\u3001\u8461\u8404\u9152\u7c95\u3001\u6d1b\u795e\u3001\u4ed9\u6942\u3001\u7d05\u8336\u3001\u4ed9\u4eba\u638c\u3001\u7389\u7c73\u9b1a\n**\u5168\u6210\u5206**\uff1a\u7d05\u9152\u7c95\u82b1\u8349\u8907\u5408\u8336\u3014\u7d05\u8336\u3001\u9999\u6599\u3001\u4ed9\u6942\u3001\u6d1b\u795e\u3001\u9152\u77f3\u9178\u3001\u5929\u7136\u8461\u8404\u76ae\u8272\u7d20\u3001\u751c\u83ca\u91a3\u82f7\uff08\u751c\u5473\u5291\uff09\u3001\u7d05\u751c\u83dc\u3001\u5c08\u5229\u85e4\u9ec3\u679c\u8403\u53d6\u7269\u3001\u8461\u8404\u9152\u7c95\u8403\u53d6\u7269\uff08\u542b\u767d\u85dc\u8606\u9187\uff09\u3001\u5927\u541f\u91c0\u9152\u7c95\u3015\u3001\u5c08\u5229\u6bdb\u5589\u9798\u854a\u82b1\u8403\u53d6\u7269\uff08\u6bdb\u5589\u9798\u854a\u82b1\u8403\u53d6\u7269\u3001\u9ea5\u82bd\u7cca\u7cbe\uff09\u3001\u56db\u68f1\u767d\u7c89\u85e4\u8403\u53d6\u7269\u3001\u67d1\u6a58\u8403\u53d6\u7269\uff08\u542bHPMF\u2122\uff09\uff08\u9ea5\u82bd\u7cca\u7cbe\u3001\u67d1\u6a58\u8403\u53d6\u7269\u3001\u8102\u80aa\u9178\u8517\u7cd6\u916f\u3001\u8102\u80aa\u9178\u7518\u6cb9\u916f\u3001\u8475\u82b1\u6cb9\u3001\u67d1\u6a58\u679c\u81a0\uff09\u3001\u4ed9\u4eba\u638c\u8403\u53d6\u7269\u3001\u7389\u7c73\u9b1a\u8403\u53d6\u7269\uff08\u7389\u7c73\u9b1a\u8403\u53d6\u7269\u3001\u9ea5\u82bd\u7cca\u7cbe\uff09\n**\u529f\u6548\u8a34\u6c42**\uff1a\u6cb9\u8102\u63a7\u5236\u3001\u4fc3\u9032\u4ee3\u8b1d\u3001\u6c34\u5206\u4ee3\u8b1d\u3001\u9ad4\u614b\u7ba1\u7406\n**\u5efa\u8b70\u98df\u7528\u91cf/\u4f7f\u7528\u65b9\u5f0f**\uff1a\u6bcf\u65e51\u6b21\uff0c\u6bcf\u6b211\u5305\uff0c\u71b1\u6c34\u6c96\u6ce1\u7d04200cc\n**\u98df\u7528\u6642\u6a5f**\uff1a\u9910\u5f8c/\u6cb9\u81a9\u98f2\u98df\u5f8c\n**\u9069\u7528\u65cf\u7fa4**\uff1a\u5916\u98df\u65cf\u3001\u6cb9\u81a9\u98f2\u98df\u65cf\u3001\u9ad4\u614b\u7ba1\u7406\u65cf\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a\u9ea9\u8cea\u904e\u654f\u8005\u3001\u5b55\u5a66\u3001\u5e7c\u5152\u3001\u751f\u9577\u767c\u80b2\u671f\u9752\u5c11\u5e74\u3001\u814e\u529f\u80fd\u4e0d\u5168\u8005\u9700\u8a55\u4f30\n**\u6ce8\u610f\u4e8b\u9805**\uff1a(\u4e00)\u8acb\u4f9d\u7167\u5efa\u8b70\u98df\u7528\u91cf\u98df\u7528\u3002\n(\u4e8c)\u672c\u7522\u54c1\u542b\u6709\u9ea9\u8cea\u4e4b\u7a40\u7269\u53ca\u5176\u88fd\u54c1\uff0c\u4e0d\u9069\u5408\u5c0d\u5176\u904e\u654f\u9ad4\u8cea\u8005\u98df\u7528\u3002\n(\u4e09)\u5b55\u5a66\u3001\u5e7c\u5152\u8207\u751f\u9577\u767c\u80b2\u671f\u4e4b\u9752\u5c11\u5e74\u4e0d\u5b9c\u4f7f\u7528\u3002\n(\u56db)\u82e5\u6709\u75be\u75c5\u3001\u814e\u529f\u80fd\u4e0d\u5168\u6216\u904e\u654f\u9ad4\u8cea\u8005\uff0c\u8acb\u5148\u8aee\u8a62\u91ab\u85e5\u5c08\u696d\u4eba\u58eb\u518d\u98df\u7528\u3002\n(\u4e94)\u98df\u7528\u5f8c\u82e5\u7522\u751f\u4e0d\u9069\u75c7\u72c0\uff0c\u8acb\u7acb\u5373\u505c\u6b62\u98df\u7528\u3002\n**\u904e\u654f\u539f**\uff1a\u9ea9\u8cea\u7a40\u7269\u53ca\u5176\u88fd\u54c1\n**\u98a8\u96aa\u6a19\u7c64**\uff1a\u9ea9\u8cea\u904e\u654f, \u5b55\u5a66\u7981\u7528, \u814e\u529f\u80fd, \u8349\u672c, \u4ee3\u8b1d, \u8178\u80c3\u53cd\u61c9\n**\u5ba2\u670d\u5099\u8a3b**\uff1a\u8acb\u8207\u5176\u4ed6\u85e5\u7269\u9593\u96942\u5c0f\u6642\uff1b\u7570\u5e38\u7522\u54c1\u52ff\u98df\u7528\u3002\n\n## Diu+ \u96d9\u8259\u4ed9\u5973\u98f2 \n**\u54c1\u724c**\uff1aDiu+\n**\u7522\u54c1\u5206\u985e**\uff1a\u4fdd\u5065\u98df\u54c1\n**\u5291\u578b**\uff1a\u96d9\u8259\n**\u898f\u683c**\uff1a\u4e0a\u82592\u9846\u81a0\u56ca\uff0b\u4e0b\u825930ml\u98f2\u54c1\n**\u4fdd\u5b58\u671f\u9650**\uff1a2\u5e74\n**\u4fdd\u5b58\u65b9\u5f0f**\uff1a\u9670\u6dbc\u4e7e\u71e5\u8655\uff0c\u907f\u514d\u967d\u5149\u76f4\u5c04\n**\u7522\u5730**\uff1a\u53f0\u7063\n**\u4e3b\u8981\u6210\u5206**\uff1a\u9b5a\u81a0\u539f\u86cb\u767d\u3001\u7dad\u751f\u7d20C\u3001\u7a40\u80f1\u7518\u80bd\u3001\u8d8a\u6854\u8403\u53d6\u7269\u3001\u6d41\u884c\u93c8\u7403\u83cc\u767c\u9175\u7269\u3001\u5c08\u5229\u7384\u7c73\u8403\u53d6\u7269\n**\u5168\u6210\u5206**\uff1a\u4e0b\u8259\uff1a\u6c34\u3001\u9b5a\u81a0\u539f\u86cb\u767d\u3001\u7d9c\u5408\u8393\u6fc3\u7e2e\u6c41\u3001\u6f84\u6e05\u6c34\u871c\u6843\u6fc3\u7e2e\u6c41\u3001\u6ab8\u6aac\u9178\u3001\u7dad\u751f\u7d20C\u3001\u9999\u6599\u3001\u751c\u83ca\u91a3\u82f7\u3001\u8d8a\u6854\u8403\u53d6\u7269\u3001\u6d41\u884c\u93c8\u7403\u83cc\u767c\u9175\u7269\u3001\u5c08\u5229\u7384\u7c73\u8403\u53d6\u7269\u3002\u4e0a\u8259\u7a40\u80f1\u7518\u80bd\u81a0\u56ca\uff1a\u9ea5\u82bd\u7cca\u7cbe\u3001\u7a40\u80f1\u7518\u80bd\u3001\u4e8c\u6c27\u5316\u77fd\uff1b\u81a0\u56ca\u6bbc\uff1a\u660e\u81a0\u3001\u786b\u9178\u6708\u6842\u916f\u9209\u3001\u7d14\u6c34\u3001\u7518\u6cb9\u3001\u4e8c\u6c27\u5316\u9226\u3001\u98df\u7528\u8272\u7d20\u3002\u4e0a\u8259Vit C\u81a0\u56ca\uff1a\u9ea5\u82bd\u7cca\u7cbe\u3001\u7a40\u5fae\u7d20\u3001\u7dad\u751f\u7d20C\u3001\u4e8c\u6c27\u5316\u77fd\uff1b\u81a0\u56ca\u6bbc\uff1a\u660e\u81a0\u3001\u786b\u9178\u6708\u6842\u916f\u9209\u3001\u7d14\u6c34\u3001\u7518\u6cb9\u3001\u4e8c\u6c27\u5316\u9226\u3001\u98df\u7528\u8272\u7d20\u3002\n**\u529f\u6548\u8a34\u6c42**\uff1a\u81a0\u539f\u88dc\u5145\u3001\u4eae\u767d\u6297\u6c27\u5316\u3001\u808c\u819a\u4fdd\u6fd5\u3001\u4fc3\u9032\u81a0\u539f\u751f\u6210\n**\u5efa\u8b70\u98df\u7528\u91cf/\u4f7f\u7528\u65b9\u5f0f**\uff1a\u6bcf\u65e51\u6b21\uff0c\u6bcf\u6b211\u74f6\u642d\u914d2\u9846\u81a0\u56ca\uff1b\u5efa\u8b70\u5148\u98df\u7528\u81a0\u56ca\uff0c\u518d\u98f2\u7528\u6db2\u614b\n**\u98df\u7528\u6642\u6a5f**\uff1a\u65e5\u5e38\u4fdd\u990a\uff1b\u958b\u5c01\u5f8c\u7acb\u5373\u98df\u7528\n**\u9069\u7528\u65cf\u7fa4**\uff1a\u60f3\u88dc\u5145\u81a0\u539f\u3001\u4eae\u91c7\u4fdd\u990a\u65cf\u7fa4\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a\u9b5a\u985e\u904e\u654f\u8005\u3001\u5b55\u5a66\u3001\u5e7c\u5152\u3001\u751f\u9577\u767c\u80b2\u671f\u9752\u5c11\u5e74\u3001\u814e\u529f\u80fd\u4e0d\u5168\u8005\u9700\u8a55\u4f30\u3001\u7a40\u80f1\u7518\u80bd\u904e\u654f\u8005\n**\u6ce8\u610f\u4e8b\u9805**\uff1a(\u4e00)\u8acb\u4f9d\u7167\u5efa\u8b70\u98df\u7528\u91cf\u98df\u7528\uff0c\u98df\u7528\u5f8c\u82e5\u7522\u751f\u4e0d\u9069\u8acb\u7acb\u5373\u505c\u6b62\u3002\n(\u4e8c)\u82e5\u6709\u75be\u75c5\u3001\u814e\u529f\u80fd\u4e0d\u5168\u6216\u904e\u654f\u9ad4\u8cea\u8005\uff0c\u8acb\u5148\u8aee\u8a62\u91ab\u85e5\u5c08\u696d\u4eba\u58eb\u518d\u98df\u7528\u3002\n(\u4e09)\u5b55\u5a66\u3001\u5e7c\u5152\u8207\u751f\u9577\u767c\u80b2\u671f\u4e4b\u9752\u5c11\u5e74\u4e0d\u5b9c\u98df\u7528\u3002\n(\u56db)\u672c\u7522\u54c1\u542b\u6709\u9b5a\u985e\u53ca\u5176\u88fd\u54c1\uff0c\u4e0d\u9069\u5408\u5c0d\u5176\u904e\u654f\u9ad4\u8cea\u8005\u98df\u7528\u3002\n(\u4e94)\u5c0d\u7a40\u80f1\u7518\u80bd\u904e\u654f\u8005\u61c9\u907f\u514d\u98df\u7528\u3002\n**\u904e\u654f\u539f**\uff1a\u9b5a\u985e\u53ca\u5176\u88fd\u54c1\n**\u98a8\u96aa\u6a19\u7c64**\uff1a\u9b5a\u985e\u904e\u654f, \u5b55\u5a66\u7981\u7528, \u814e\u529f\u80fd, \u81a0\u539f\u86cb\u767d, \u7a40\u80f1\u7518\u80bd\n**\u5ba2\u670d\u5099\u8a3b**\uff1a\u9ad8\u968e\u7f8e\u5bb9\u96d9\u5291\u578b\uff1b\u8207\u81a0\u598d\u7c89\u5dee\u7570\uff1a\u96d9\u8259\u4ed9\u5973\u98f2\u4e3b\u6253\u81a0\u539f\uff0b\u4eae\u767d\uff0b\u5206\u96e2\u9396\u6d3b\u3002\n\n## \u5927\u6fc0\u8cde \u82e6\u74dc\u80dc\u80bd\u83cc\u7d72\u81a0\u56ca \n**\u54c1\u724c**\uff1a\u5927\u6fc0\u8cde\n**\u7522\u54c1\u5206\u985e**\uff1a\u4fdd\u5065\u98df\u54c1\n**\u5291\u578b**\uff1a\u81a0\u56ca\n**\u898f\u683c**\uff1a0.5g/\u9846\n**\u4fdd\u5b58\u671f\u9650**\uff1a2\u5e74\n**\u4fdd\u5b58\u65b9\u5f0f**\uff1a\u9670\u6dbc\u4e7e\u71e5\u8655\n**\u7522\u5730**\uff1a\u53f0\u7063\n**\u4e3b\u8981\u6210\u5206**\uff1a\u5c71\u82e6\u74dc\u80dc\u80bd\u3001\u51ac\u87f2\u590f\u8349\u83cc\u7d72\u9ad4\u3001\u9175\u6bcd\u927b\u3001\u9175\u6bcd\u92c5\u3001\u4f59\u7518\u5b50\n**\u5168\u6210\u5206**\uff1a\u7389\u7c73\u4f86\u6e90\u53ef\u6eb6\u6027\u7e96\u7dad\u3001\u5c08\u5229\u56fa\u614b\u767c\u9175\u51ac\u87f2\u590f\u8349\u83cc\u7d72\u9ad4\u3001\u83ca\u82e3\u7e96\u7dad\u3001\u5c08\u5229\u5c71\u82e6\u74dc\u8403\u53d6\u7c89\u3001\u9175\u6bcd\u92c5\u3001\u9175\u6bcd\u927b\u3001\u4f59\u7518\u5b50\u8403\u53d6\u7269\u3001\u786c\u8102\u9178\u9382\u3001\u4e8c\u6c27\u5316\u77fd\uff1b\u81a0\u56ca\u6210\u5206\uff1a\u660e\u81a0\u3001\u4e8c\u6c27\u5316\u9226\u3001\u7518\u6cb9\u3001\u786b\u9178\u6708\u6842\u916f\u9209\u3001\u98df\u7528\u8272\u7d20\u3001\u7d14\u6c34\n**\u529f\u6548\u8a34\u6c42**\uff1a\u8840\u7cd6\u8207\u4ee3\u8b1d\u8abf\u6574\n**\u5efa\u8b70\u98df\u7528\u91cf/\u4f7f\u7528\u65b9\u5f0f**\uff1a\u6bcf\u65e5\u4e00\u6b21\uff0c\u6bcf\u6b21\u4e00\u9846\uff0c\u591a\u98df\u7121\u76ca\n**\u98df\u7528\u6642\u6a5f**\uff1a\u9910\u524d/\u4f9d\u6a19\u793a\n**\u9069\u7528\u65cf\u7fa4**\uff1a\u98f2\u98df\u8207\u8840\u7cd6\u7ba1\u7406\u65cf\u7fa4\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a\u5b30\u5e7c\u5152\u3001\u5152\u7ae5\u3001\u5b55\u5a66\u3001\u771f\u83cc\u904e\u654f\u8005\u3001\u670d\u7528MAO\u6291\u5236\u5291\u6216\u6297\u51dd\u8840\u5291\u8005\u9700\u5148\u8aee\u8a62\u91ab\u5e2b\n**\u6ce8\u610f\u4e8b\u9805**\uff1a\u4e0d\u5efa\u8b70\u5b30\u5e7c\u5152\u3001\u5152\u7ae5\u3001\u5b55\u5a66\u8207\u771f\u83cc\u904e\u654f\u8005\u4f7f\u7528\uff1b\u670d\u7528MAO\u6291\u5236\u5291\u3001\u6297\u51dd\u8840\u5291\u75c5\u4eba\u98df\u7528\u524d\u8acb\u6d3d\u8a62\u91ab\u5e2b\u3002\n**\u904e\u654f\u539f**\uff1a\u771f\u83cc\u76f8\u95dc\n**\u98a8\u96aa\u6a19\u7c64**\uff1a\u8840\u7cd6, \u771f\u83cc\u904e\u654f, \u5b55\u5a66\u7981\u7528, \u85e5\u7269\u4ea4\u4e92\u4f5c\u7528\n**\u5ba2\u670d\u5099\u8a3b**\uff1a\u975e\u4e2d\u85e5\u6750\u51ac\u87f2\u590f\u8349\u88fd\u54c1\u3002\n\n## \u5927\u6fc0\u8cde \u5143\u6c23\u7d05\u6f64\u81a0\u56ca \n**\u54c1\u724c**\uff1a\u5927\u6fc0\u8cde\n**\u7522\u54c1\u5206\u985e**\uff1a\u4fdd\u5065\u98df\u54c1\n**\u5291\u578b**\uff1a\u81a0\u56ca\n**\u898f\u683c**\uff1a0.5g/\u9846\n**\u4fdd\u5b58\u671f\u9650**\uff1a3\u5e74\n**\u4fdd\u5b58\u65b9\u5f0f**\uff1a\u9670\u6dbc\u4e7e\u71e5\u8655\n**\u7522\u5730**\uff1a\u53f0\u7063\n**\u4e3b\u8981\u6210\u5206**\uff1a\u7dad\u751f\u7d20B\u7fa4\u3001\u7dad\u751f\u7d20C\u3001\u9435\u3001\u92c5\u3001\u7852\n**\u5168\u6210\u5206**\uff1a\u78f7\u9178\u6c2b\u9223\u3001\u5fae\u7d50\u6676\u7e96\u7dad\u7d20\u3001\u5564\u9152\u9175\u6bcdB\u7fa4\u3001\u7852\u9175\u6bcd\u3001\u8907\u65b9\u7dad\u751f\u7d20C\u3001\u7518\u80fa\u9178\u4e9e\u9435\u3001\u92c5\u9175\u6bcd\u3001\u91cd\u9152\u77f3\u9178\u81bd\u9e7c\uff1b\u81a0\u56ca\u6210\u5206\uff1a\u660e\u81a0\u3001\u4e8c\u6c27\u5316\u9226\u3001\u7518\u6cb9\u3001\u786b\u9178\u6708\u6842\u916f\u9209\u3001\u7d14\u6c34\n**\u529f\u6548\u8a34\u6c42**\uff1a\u71df\u990a\u88dc\u5145\u3001\u6c23\u8272\u7d05\u6f64\n**\u5efa\u8b70\u98df\u7528\u91cf/\u4f7f\u7528\u65b9\u5f0f**\uff1a\u6bcf\u65e5\u4e00\u6b21\uff0c\u6bcf\u6b21\u4e00\u9846\uff0c\u591a\u98df\u7121\u76ca\n**\u98df\u7528\u6642\u6a5f**\uff1a\u9910\u5f8c\n**\u9069\u7528\u65cf\u7fa4**\uff1a\u6c23\u8272\u4fdd\u990a\u3001\u71df\u990a\u88dc\u5145\u65cf\u7fa4\n**\u904e\u654f\u539f**\uff1a\u542b\u9175\u6bcd\uff08\u5564\u9152\u9175\u6bcd\u3001\u92c5\u9175\u6bcd\uff09\uff0c\u5c0d\u9175\u6bcd\u904e\u654f\u8005\u9700\u6ce8\u610f\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a\u5b55\u5a66\u9700\u8a55\u4f30\uff0c\u9435\u5291\u654f\u611f\u8005\u9700\u6ce8\u610f\n**\u6ce8\u610f\u4e8b\u9805**\uff1a\u7279\u6b8a\u9ad4\u8cea\u3001\u5b55\u54fa\u6216\u670d\u85e5\u4e2d\u8acb\u5148\u8aee\u8a62\u5c08\u696d\u4eba\u58eb\u3002\n**\u98a8\u96aa\u6a19\u7c64**\uff1a\u88dc\u9435, \u5b55\u5a66\u9700\u8a55\u4f30, \u71df\u990a\u88dc\u5145\n\n## \u6a39\u98db\u96ea \u91d1\u76de\u82b1\u8449\u9ec3\u7d20 \n**\u54c1\u724c**\uff1a\u6a39\u98db\u96ea\n**\u7522\u54c1\u5206\u985e**\uff1a\u4fdd\u5065\u98df\u54c1\n**\u5291\u578b**\uff1a\u81a0\u56ca\n**\u898f\u683c**\uff1a0.5g/\u9846\n**\u4fdd\u5b58\u671f\u9650**\uff1a3\u5e74\n**\u4fdd\u5b58\u65b9\u5f0f**\uff1a\u9670\u6dbc\u4e7e\u71e5\u8655\n**\u7522\u5730**\uff1a\u53f0\u7063\n**\u4e3b\u8981\u6210\u5206**\uff1a\u8449\u9ec3\u7d20\u3001\u7389\u7c73\u9ec3\u7d20\u3001\u82b1\u9752\u7d20\u3001\u8766\u7d05\u7d20\u3001\u8702\u81a0\n**\u5168\u6210\u5206**\uff1a\u5fae\u7d50\u6676\u7e96\u7dad\u7d20\u3001\u85cd\u8393\u8403\u53d6\u7c89\u3001\u91d1\u76de\u82b1\u8403\u53d6\u7269\u3001\u5564\u9152\u9175\u6bcd\u767c\u9175\u7269\u3001\u9ed1\u8c46\u76ae\u8403\u53d6\u7269\u3001\u7da0\u8702\u81a0\u8403\u53d6\u7c89\u3001\u9175\u6bcd\u92c5\u3001\u5c71\u6851\u5b50\u8403\u53d6\u7c89\u3001\u8766\u7d05\u7d20\uff1b\u81a0\u56ca\u6210\u5206\uff1a\u660e\u81a0\u3001\u7518\u6cb9\u3001\u786b\u9178\u6708\u6842\u916f\u9209\u3001\u98df\u7528\u8272\u7d20\u3001\u7d14\u6c34\n**\u529f\u6548\u8a34\u6c42**\uff1a\u8b77\u773c\u3001\u6676\u4eae\u4fdd\u990a\n**\u5efa\u8b70\u98df\u7528\u91cf/\u4f7f\u7528\u65b9\u5f0f**\uff1a\u6bcf\u5929\u4e00\u6b21\uff0c\u6bcf\u6b21\u4e00\u9846\uff0c\u591a\u98df\u7121\u76ca\n**\u98df\u7528\u6642\u6a5f**\uff1a\u65e5\u5e38/\u9910\u5f8c\n**\u9069\u7528\u65cf\u7fa4**\uff1a\u9577\u6642\u9593\u7528\u773c\u65cf\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a\u5b30\u5152\u3001\u5b55\u5a66\u3001\u8702\u81a0\u904e\u654f\u8005\n**\u6ce8\u610f\u4e8b\u9805**\uff1a\u5b30\u5152\u3001\u5b55\u5a66\u53ca\u5c0d\u8702\u81a0\u7522\u54c1\u904e\u654f\u8005\u4e0d\u5b9c\u98df\u7528\u3002\n**\u904e\u654f\u539f**\uff1a\u8702\u81a0\n**\u98a8\u96aa\u6a19\u7c64**\uff1a\u8702\u81a0\u904e\u654f, \u5b55\u5a66\u7981\u7528, \u8b77\u773c\n\n## \u5927\u6fc0\u8cde \u8461\u8404\u7cd6\u80fa\u6b65\u6b65\u9806\u81a0\u56ca \n**\u54c1\u724c**\uff1a\u5927\u6fc0\u8cde\n**\u7522\u54c1\u5206\u985e**\uff1a\u4fdd\u5065\u98df\u54c1\n**\u5291\u578b**\uff1a\u81a0\u56ca\n**\u898f\u683c**\uff1a0.6g/\u9846\n**\u4fdd\u5b58\u671f\u9650**\uff1a2\u5e74\n**\u4fdd\u5b58\u65b9\u5f0f**\uff1a\u9670\u6dbc\u4e7e\u71e5\u8655\n**\u7522\u5730**\uff1a\u53f0\u7063\n**\u4e3b\u8981\u6210\u5206**\uff1a\u8461\u8404\u7cd6\u80fa\u3001\u8edf\u9aa8\u7d20\u3001MSM\u3001\u4e8c\u578b\u81a0\u539f\u86cb\u767d\u3001\u7dad\u751f\u7d20D\n**\u5168\u6210\u5206**\uff1a\u8461\u8404\u7cd6\u80fa\u3001\u9cf3\u68a8\u8403\u53d6\u7269\u3001\u9bca\u9b5a\u8edf\u9aa8\u7d20\u3001\u78b3\u9178\u9223\u3001MSM\u3001\u8591\u9ec3\u8403\u53d6\u7c89\u3001\u4e8c\u578b\u81a0\u539f\u86cb\u767d\u3001\u9b5a\u9c57\u9223\u3001\u786c\u8102\u9178\u9382\u3001\u7dad\u751f\u7d20D\u3001\u7d9c\u5408\u7926\u7269\u8cea\uff1b\u81a0\u56ca\u6210\u5206\uff1a\u660e\u81a0\u3001\u4e8c\u6c27\u5316\u9226\u3001\u98df\u7528\u8272\u7d20\u3001\u7518\u6cb9\u3001\u786b\u9178\u6708\u6842\u916f\u9209\u3001\u7d14\u6c34\n**\u529f\u6548\u8a34\u6c42**\uff1a\u95dc\u7bc0\u4fdd\u990a\u3001\u884c\u52d5\u652f\u6301\n**\u5efa\u8b70\u98df\u7528\u91cf/\u4f7f\u7528\u65b9\u5f0f**\uff1a\u6bcf\u5929\u4e8c\u6b21\uff0c\u6bcf\u6b21\u4e00\u9846\uff0c\u591a\u98df\u7121\u76ca\n**\u98df\u7528\u6642\u6a5f**\uff1a\u907f\u514d\u7761\u524d\n**\u9069\u7528\u65cf\u7fa4**\uff1a\u95dc\u7bc0\u4fdd\u990a\u65cf\u7fa4\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a\u725b\u4e73/\u7532\u6bbc\u985e/\u9b5a\u985e\u904e\u654f\u8005\u3001\u5b55\u54fa\u9700\u8aee\u8a62\u91ab\u5e2b\n**\u6ce8\u610f\u4e8b\u9805**\uff1a\u672c\u7522\u54c1\u542b\u725b\u4e73\u3001\u7532\u6bbc\u985e\u3001\u9b5a\u985e\u53ca\u5176\u88fd\u54c1\u3002\u907f\u514d\u7761\u524d\u98df\u7528\uff0c\u5b55\u5a66\u53ca\u54fa\u4e73\u671f\u5a66\u5973\u4f7f\u7528\u524d\u61c9\u5148\u8aee\u8a62\u91ab\u5e2b\u3002\n**\u904e\u654f\u539f**\uff1a\u725b\u4e73\u3001\u7532\u6bbc\u985e\u3001\u9b5a\u985e\n**\u98a8\u96aa\u6a19\u7c64**\uff1a\u904e\u654f, \u725b\u4e73, \u7532\u6bbc\u985e, \u9b5a\u985e, \u5b55\u5a66\u9700\u8a55\u4f30\n\n## \u6a39\u98db\u96ea GSH\u7a40\u80f1\u7518\u80bd\u81a0\u56ca \n**\u54c1\u724c**\uff1a\u6a39\u98db\u96ea\n**\u7522\u54c1\u5206\u985e**\uff1a\u4fdd\u5065\u98df\u54c1\n**\u5291\u578b**\uff1a\u81a0\u56ca\n**\u898f\u683c**\uff1a0.5g/\u9846\n**\u4fdd\u5b58\u671f\u9650**\uff1a3\u5e74\n**\u4fdd\u5b58\u65b9\u5f0f**\uff1a\u9670\u6dbc\u4e7e\u71e5\u8655\n**\u7522\u5730**\uff1a\u53f0\u7063\n**\u4e3b\u8981\u6210\u5206**\uff1a\u7a40\u80f1\u7518\u80bd\u3001\u897f\u5370\u5ea6\u6afb\u6843\u3001\u8461\u8404\u7c7d\u3001\u7da0\u8336\u591a\u915a\u3001\u73bb\u5c3f\u9178\u4f86\u6e90\n**\u5168\u6210\u5206**\uff1a\u858f\u4ec1\u8403\u53d6\u7269\u3001\u7d9c\u5408\u852c\u679c\u7c89\u3001\u5fae\u7d50\u6676\u7e96\u7dad\u7d20\u3001DL-\u86cb\u80fa\u9178\u3001\u8461\u8404\u7c7d\u8403\u53d6\u7269\u3001\u897f\u5370\u5ea6\u6afb\u6843\u8403\u53d6\u7269\u3001\u7da0\u8336\u8403\u53d6\u7269\u3001\u9ea5\u82bd\u7cca\u7cbe\u3001\u5713\u9175\u6bcd\u7a40\u80f1\u7518\u80bd\u3001\u5375\u6bbc\u819c\u3001\u93c8\u7403\u83cc\u767c\u9175\u7269\u3001\u4e8c\u6c27\u5316\u77fd\uff1b\u81a0\u56ca\u6210\u5206\uff1a\u660e\u81a0\u3001\u4e8c\u6c27\u5316\u9226\u3001\u7518\u6cb9\u3001\u786b\u9178\u6708\u6842\u916f\u9209\u3001\u98df\u7528\u8272\u7d20\u3001\u7d14\u6c34\n**\u529f\u6548\u8a34\u6c42**\uff1a\u6297\u6c27\u5316\u3001\u7f8e\u984f\u4fdd\u990a\n**\u5efa\u8b70\u98df\u7528\u91cf/\u4f7f\u7528\u65b9\u5f0f**\uff1a\u6bcf\u65e5\u4e00\u6b21\uff0c\u6bcf\u6b21\u4e00\u9846\uff0c\u591a\u98df\u7121\u76ca\n**\u98df\u7528\u6642\u6a5f**\uff1a\u65e5\u5e38\n**\u9069\u7528\u65cf\u7fa4**\uff1a\u7f8e\u984f\u4fdd\u990a\u65cf\u7fa4\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a\u725b\u5976\u3001\u86cb\u3001\u9ea9\u8cea\u904e\u654f\u8005\uff1b\u5b55\u5a66/\u54fa\u4e73/\u5b30\u5e7c\u5152\uff1b\u7a40\u80f1\u7518\u80bd\u904e\u654f\u8005\n**\u6ce8\u610f\u4e8b\u9805**\uff1a\u672c\u7522\u54c1\u542b\u725b\u5976\u3001\u9ea9\u8cea\u4e4b\u7a40\u7269\u3001\u86cb\u53ca\u5176\u88fd\u54c1\u3002\u5c0d\u7a40\u80f1\u7518\u80bd\u904e\u654f\u8005\u3001\u5b55\u5a66\u3001\u54fa\u4e73\u5a66\u5973\u53ca\u5b30\u5e7c\u5152\u61c9\u907f\u514d\u98df\u7528\u3002\n**\u904e\u654f\u539f**\uff1a\u725b\u5976\u3001\u9ea9\u8cea\u3001\u86cb\n**\u98a8\u96aa\u6a19\u7c64**\uff1a\u7a40\u80f1\u7518\u80bd, \u5b55\u5a66\u7981\u7528, \u86cb\u904e\u654f, \u725b\u5976, \u9ea9\u8cea\n\n---\n\n# \u88dc\u5145\u7522\u54c1\u8cc7\u6599\uff08\u65b0\u54c1\uff0f\u66f4\u65b0\u7248\uff09\n\n\n\n---\n## \u3010\u5927\u6fc0\u8cde\u8461\u8404\u7cd6\u80fa\u6b65\u6b65\u9806\u81a0\u56ca\u3011\uff08\u66f4\u65b0\u7248\uff09\n**\u7522\u54c1\u540d\u7a31**\uff1a\u5927\u6fc0\u8cde \u8461\u8404\u7cd6\u80fa\u6b65\u6b65\u9806\u81a0\u56ca\n**\u54c1\u724c**\uff1a\u706b\u661f\u751f\u6280 / \u5927\u6fc0\u8cde\n**\u898f\u683c**\uff1a0.6\u516c\u514b/\u7c92 \u00d7 30\u7c92/\u74f6\n**\u7522\u5730**\uff1a\u53f0\u7063\n**\u4fdd\u5b58\u671f\u9650**\uff1a2\u5e74\n**\u4fdd\u5b58\u65b9\u5f0f**\uff1a\u9670\u6dbc\u4e7e\u71e5\u8655\uff0c\u907f\u514d\u9ad8\u6eab\u53ca\u967d\u5149\u76f4\u5c04\n\n**\u6210\u5206**\uff1a\u8461\u8404\u7cd6\u80fa\uff08\u8461\u8404\u7cd6\u80fa\u9e7d\u9178\u9e7d\u3001\u805a\u4e59\u70ef\u5421\u54af\u70f7\u916e\uff09\u3001\u9cf3\u68a8\u8403\u53d6\u7269\uff08\u542b\u9cf3\u68a8\u9175\u7d20\uff09\uff08\u4e73\u7cd6\u3001\u9ea5\u82bd\u7cca\u7cbe\u3001\u9cf3\u68a8\u8403\u53d6\u7269\uff09\u3001\u9bca\u9b5a\u8edf\u9aa8\u7d20\u3001\u78b3\u9178\u9223\u3001\u7532\u57fa\u786b\u91af\u57fa\u7532\u70f7\uff08MSM\uff09\u3001\u8591\u9ec3\u8403\u53d6\u7c89\uff08\u542b\u8591\u9ec3\u7d20\uff09\u3001\u4e8c\u578b\u81a0\u539f\u86cb\u767d\uff08U.C-KOLLA-II\uff09\u3001\u9b5a\u9c57\u9223\u3001\u786c\u8102\u9178\u9382\u3001\u7dad\u751f\u7d20D\u3001\u7d9c\u5408\u7926\u7269\u8cea\uff08\u78b3\u9178\u9223\u3001\u6c27\u5316\u9382\u3001\u8461\u8404\u7cd6\u9178\u92c5\u3001\u7126\u78f7\u9178\u9435\u3001\u7852\u9175\u6bcd\u3001\u927b\u9175\u6bcd\uff09\n**\u81a0\u56ca\u6210\u5206**\uff1a\u660e\u81a0\u3001\u4e8c\u6c27\u5316\u9226\u3001\u98df\u7528\u7d05\u8272\u516d\u865f\u3001\u7518\u6cb9\u3001\u786b\u9178\u6708\u6842\u916f\u9209\u3001\u98df\u7528\u9ec3\u8272\u56db\u865f\u3001\u7d14\u6c34\u3001\u98df\u7528\u85cd\u8272\u4e00\u865f\n\n**\u98df\u7528\u65b9\u5f0f**\uff1a\u6bcf\u59292\u6b21\uff0c\u6bcf\u6b211\u9846\uff0c\u591a\u98df\u7121\u76ca\n**\u98df\u7528\u6642\u6a5f**\uff1a\u5efa\u8b70\u65e9\u9910\u5f8c1\u9846\u3001\u665a\u9910\u5f8c1\u9846\uff0c**\u907f\u514d\u7761\u524d\u98df\u7528**\n**\u904e\u654f\u539f**\uff1a\u542b\u725b\u4e73\u3001\u7532\u6bbc\u985e\u3001\u9b5a\u985e\u53ca\u5176\u88fd\u54c1\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a\u5b55\u5a66\u53ca\u54fa\u4e73\u671f\u5a66\u5973\u4f7f\u7528\u524d\u61c9\u5148\u8aee\u8a62\u91ab\u5e2b\n\n---\n## \u3010\u6a39\u98db\u96ea GSH\u7a40\u80f1\u7518\u80bd\u7f8e\u984fC\u81a0\u56ca\u3011\uff08\u65b0\u54c1\uff09\n**\u7522\u54c1\u540d\u7a31**\uff1a\u6a39\u98db\u96ea GSH\uff08\u7a40\u80f1\u7518\u80bd\uff09\u7f8e\u984fC\u81a0\u56ca\n**\u54c1\u724c**\uff1a\u6a39\u98db\u96ea\n**\u898f\u683c**\uff1a0.5\u516c\u514b \u00d7 30\u9846\n**\u7522\u5730**\uff1a\u53f0\u7063\n**\u4fdd\u5b58\u671f\u9650**\uff1a3\u5e74\n**\u4fdd\u5b58\u65b9\u5f0f**\uff1a\u9670\u6dbc\u4e7e\u71e5\u8655\uff0c\u907f\u514d\u9ad8\u6eab\u53ca\u967d\u5149\u76f4\u5c04\n\n**\u6210\u5206**\uff1a\u858f\u4ec1\u8403\u53d6\u7269\u3001\u7d9c\u5408\u852c\u679c\u7c89\u3001\u5fae\u7d50\u6676\u7e96\u7dad\u7d20\u3001DL-\u86cb\u80fa\u9178\u3001\u8461\u8404\u7c7d\u8403\u53d6\u7269\uff08\u542b\u539f\u82b1\u9752\u7d20\uff09\u3001\u897f\u5370\u5ea6\u6afb\u6843\u8403\u53d6\u7269\uff08\u542b\u7dad\u4ed6\u547dC\uff09\u3001\u7da0\u8336\u8403\u53d6\u7269\uff08\u542b\u8336\u591a\u915a\uff09\u3001\u9ea5\u82bd\u7cca\u7cbe\u3001\u5713\u9175\u6bcd\u7a40\u80f1\u7518\u80bd\u3001\u5375\u6bbc\u819c\uff08\u542b\u900f\u660e\u8cea\u9178\uff09\u3001\u93c8\u7403\u83cc\u767c\u9175\u7269\uff08\u542b\u900f\u660e\u8cea\u9178\uff09\u3001\u4e8c\u6c27\u5316\u77fd\n**\u81a0\u56ca\u6210\u5206**\uff1a\u660e\u81a0\u3001\u4e8c\u6c27\u5316\u9226\u3001\u7518\u6cb9\u3001\u786b\u9178\u6708\u6842\u916f\u9209\u3001\u98df\u7528\u7d05\u8272\u516d\u865f\u3001\u7d14\u6c34\u3001\u98df\u7528\u9ec3\u8272\u56db\u865f\n\n**\u98df\u7528\u65b9\u5f0f**\uff1a\u6bcf\u65e51\u6b21\uff0c\u6bcf\u6b211\u9846\uff0c\u591a\u98df\u7121\u76ca\n**\u904e\u654f\u539f**\uff1a\u542b\u725b\u5976\u3001\u9ea9\u8cea\u4e4b\u7a40\u7269\u3001\u86cb\u53ca\u5176\u88fd\u54c1\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a\u5c0d\u7a40\u80f1\u7518\u80bd\u904e\u654f\u8005\u3001\u5b55\u5a66\u3001\u54fa\u4e73\u5a66\u5973\u53ca\u5b30\u5e7c\u5152\u61c9\u907f\u514d\u98df\u7528\uff1b\u5c0d\u86cb\u904e\u654f\u8005\u61c9\u907f\u514d\u98df\u7528\n\n---\n## \u3010\u6a39\u98db\u96ea \u91d1\u76de\u82b1\u8449\u9ec3\u7d20\u81a0\u56ca\u3011\uff08\u65b0\u54c1\uff09\n**\u7522\u54c1\u540d\u7a31**\uff1a\u6a39\u98db\u96ea \u91d1\u76de\u82b1\u8449\u9ec3\u7d20\n**\u54c1\u724c**\uff1a\u6a39\u98db\u96ea\n**\u898f\u683c**\uff1a0.5\u516c\u514b/\u9846 \u00d7 30\u9846\n**\u7522\u5730**\uff1a\u53f0\u7063\n**\u4fdd\u5b58\u671f\u9650**\uff1a3\u5e74\n**\u4fdd\u5b58\u65b9\u5f0f**\uff1a\u9670\u6dbc\u4e7e\u71e5\u8655\uff0c\u907f\u514d\u9ad8\u6eab\u53ca\u967d\u5149\u76f4\u5c04\n\n**\u6210\u5206**\uff1a\u5fae\u7d50\u6676\u7e96\u7dad\u7d20\u3001\u85cd\u8393\u8403\u53d6\u7c89\uff08\u542b\u85cd\u8393\u591a\u915a\uff09\u3001\u91d1\u76de\u82b1\u8403\u53d6\u7269\uff08\u542b\u6e38\u96e2\u578b\u8449\u9ec3\u7d20\u3001\u7389\u7c73\u9ec3\u7d20\uff09\u3001\u5564\u9152\u9175\u6bcd\u767c\u9175\u7269\uff08\u542b\u7dad\u751f\u7d20B\u7fa4\uff09\u3001\u9ed1\u8c46\u76ae\u8403\u53d6\u7269\u3001\u7da0\u8702\u81a0\u8403\u53d6\u7c89\uff08\u542b\u7570\u620a\u4e8c\u70ef\u985e\u9ec3\u916e\uff09\u3001\u9175\u6bcd\u92c5\u3001\u5c71\u6851\u5b50\u8403\u53d6\u7c89\u3001\u8766\u7d05\u7d20\n**\u81a0\u56ca\u6210\u5206**\uff1a\u660e\u81a0\u3001\u7518\u6cb9\u3001\u786b\u9178\u6708\u6842\u916f\u9209\u3001\u98df\u7528\u9ec3\u8272\u56db\u865f\u3001\u98df\u7528\u9ec3\u8272\u4e94\u865f\u3001\u7d14\u6c34\n\n**\u98df\u7528\u65b9\u5f0f**\uff1a\u6bcf\u59291\u6b21\uff0c\u6bcf\u6b211\u9846\uff0c\u591a\u98df\u7121\u76ca\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a\u5b30\u5152\u3001\u5b55\u5a66\u53ca\u5c0d\u8702\u81a0\u7522\u54c1\u904e\u654f\u8005\u4e0d\u5b9c\u98df\u7528\n**\u570b\u969b\u5c08\u5229**\uff1aWO2020212867A1\n\n---\n## \u3010\u5927\u6fc0\u8cde\u82e6\u74dc\u80dc\u80bd\u83cc\u7d72\u81a0\u56ca\u3011\uff08\u88dc\u5145\u66f4\u65b0\uff09\n**\u98df\u7528\u65b9\u5f0f**\uff1a\u6bcf\u65e51\u6b21\uff0c\u6bcf\u6b211\u9846\uff0c\u591a\u98df\u7121\u76ca\n**\u88dc\u5145\u6ce8\u610f\u4e8b\u9805**\uff1a\n- \u670d\u7528MAO\u6291\u5236\u5291\u3001\u6297\u51dd\u8840\u5291\u75c5\u4eba\uff0c\u98df\u7528\u524d\u8acb\u6d3d\u8a62\u91ab\u5e2b\u5efa\u8b70\n- \u9ad4\u8cea\u7279\u6b8a\u8005\u53ef\u63a1\u5c11\u91cf\u9593\u65b7\u65b9\u5f0f\u98df\u7528\n- \u672c\u7522\u54c1\u975e\u4e2d\u85e5\u6750\u51ac\u87f2\u590f\u8349\u4e4b\u88fd\u54c1\n- \u4e0d\u5efa\u8b70\u5b30\u5e7c\u5152\u3001\u5152\u7ae5\u3001\u5b55\u5a66\u8207\u771f\u83cc\u904e\u654f\u8005\u4f7f\u7528\n**\u5c08\u5229**\uff1a\u6fb3\u5927\u5229\u4e9e\u3001\u52a0\u62ff\u5927\u3001\u6b50\u76df\u3001\u65e5\u672c\u3001\u7f8e\u570b\u7b49\u591a\u570b\u5c08\u5229\n\n\n---\n\n\n---\n\n## \u3010Diu+ \u96d9\u8259\u4ed9\u5973\u98f2\u3011\uff08\u66f4\u65b0\u7248\uff09\n**\u7522\u54c1\u540d\u7a31**\uff1aDiu+ \u96d9\u8259\u4ed9\u5973\u98f2 LUMINOUS RADIANCE DUAL SYSTEM\n**\u54c1\u724c**\uff1aDiu+\n**\u7522\u5730**\uff1a\u53f0\u7063\n**\u4fdd\u5b58\u671f\u9650**\uff1a18\u500b\u6708\uff08\u672a\u958b\u5c01\uff09\n**\u4fdd\u5b58\u65b9\u5f0f**\uff1a\u9670\u6dbc\u4e7e\u71e5\u8655\uff0c\u907f\u514d\u9ad8\u6eab\u53ca\u967d\u5149\u7167\u5c04\uff0c\u62c6\u5c01\u5f8c\u5118\u901f\u98df\u7528\n\n**\u7522\u54c1\u7279\u8272**\uff1a\u96d9\u8259\u8a2d\u8a08\uff0c\u7531\u5167\u900f\u4eae\n- \u4e0a\u8259\uff08\u767d\u8272\u81a0\u56ca\uff09\uff1a\u7a40\u80f1\u7518\u80bd\n- \u4e0a\u8259\uff08\u7c89\u8272\u81a0\u56ca\uff09\uff1a\u7dad\u751f\u7d20C\n- \u4e0b\u8259\uff08\u6c34\u5291\uff09\uff1a\u81a0\u539f\u86cb\u767d\u98f2\n\n**\u4e0a\u8259-\u7a40\u80f1\u7518\u80bd\u81a0\u56ca\uff08\u767d\u8272\uff09\u6210\u5206**\uff1a\n\u9ea5\u82bd\u7cca\u7cbe\u3001\u7389\u7c73\u6fb1\u7c89\u3001\u7a40\u80f1\u7518\u80bd\u3001\u5fae\u7d50\u6676\u72c0\u03b1-\u7e96\u7dad\u7d20\u3001\u4e8c\u6c27\u5316\u77fd\u3001\u786c\u8102\u9178\u9382\n\u81a0\u56ca\u6bbc\uff1a\u660e\u81a0\u3001\u786b\u9178\u6708\u6842\u916f\u9209\u3001\u7d14\u6c34\u3001\u7518\u6cb9\u3001\u4e8c\u6c27\u5316\u9226\u3001\u98df\u7528\u8272\u7d20\n\n**\u4e0a\u8259-\u7dad\u751f\u7d20C\u81a0\u56ca\uff08\u7c89\u8272\uff09\u6210\u5206**\uff1a\n\u9ea5\u82bd\u7cca\u7cbe\u3001L-\u6297\u58de\u8840\u9178\uff08\u7dad\u751f\u7d20C\uff09\uff08\u6297\u6c27\u5316\u5291\uff09\u3001\u7389\u7c73\u6fb1\u7c89\u3001\u5fae\u7d50\u6676\u72c0\u03b1-\u7e96\u7dad\u7d20\u3001\u4e8c\u6c27\u5316\u77fd\u3001\u786c\u8102\u9178\u9382\n\n**\u4e0b\u8259-\u81a0\u539f\u86cb\u767d\u98f2\u6210\u5206**\uff1a\n\u6c34\u3001\u9b5a\u81a0\u539f\u86cb\u767d\u3001\u7d9c\u5408\u8393\u6fc3\u7e2e\u6c41\uff08\u860b\u679c\u3001\u8513\u8d8a\u8393\u3001\u8349\u8393\u3001\u8986\u76c6\u8393\u3001\u6afb\u6843\u3001\u9ed1\u918b\u6817\u3001\u918b\u6817\uff09\u3001\u6c34\u871c\u6843\u6fc3\u7e2e\u6c41\u3001\u6ab8\u6aac\u9178\u3001L-\u6297\u58de\u8840\u9178\uff08\u7dad\u751f\u7d20C\uff09\uff08\u6297\u6c27\u5316\u5291\uff09\u3001\u9999\u6599\u3001\u751c\u83ca\u91a3\u82f7\uff08\u751c\u5473\u5291\uff09\u3001\u6d41\u884c\u93c8\u7403\u83cc\u767c\u9175\u7269\uff08\u542b\u900f\u660e\u8cea\u9178\u9209\uff09\u3001\u8d8a\u6854\u8403\u53d6\u7269\uff08\u542b\u718a\u679c\u7d20\uff09\uff08\u8d8a\u6854\u8403\u53d6\u7269\u3001\u9ea5\u82bd\u7cca\u7cbe\uff09\u3001\u5c08\u5229\u7c73\u8403\u53d6\u7269\uff08\u03b1-\u74b0\u7cca\u7cbe\u3001\u7c73\u8403\u53d6\u7269\uff09\n\n**\u98df\u7528\u65b9\u5f0f**\uff1a\u6bcf\u65e51\u6b21\uff0c\u6bcf\u6b21\u4e0a\u8259\u54041\u9846\uff08\u767d\u8272+\u7c89\u8272\uff09\uff0c\u4e0b\u82591\u74f6\n**\u529f\u6548\u8a34\u6c42**\uff1a\u7dad\u751f\u7d20C\u3001\u7a40\u80f1\u7518\u80bd\u3001\u81a0\u539f\u86cb\u767d\uff0c\u7531\u5167\u900f\u4eae\n\n**\u904e\u654f\u539f**\uff1a\u542b\u7a40\u80f1\u7518\u80bd\u3001\u9b5a\u985e\u53ca\u5176\u88fd\u54c1\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a\u5b55\u5a66\u3001\u54fa\u4e73\u5a66\u5973\u3001\u5b30\u5e7c\u5152\u3001\u5e7c\u5152\u53ca\u751f\u9577\u767c\u80b2\u671f\u4e4b\u9752\u5c11\u5e74\u4e0d\u5b9c\u98df\u7528\n**\u75be\u75c5/\u7528\u85e5\u6ce8\u610f**\uff1a\u82e5\u6709\u75be\u75c5\u3001\u814e\u529f\u80fd\u4e0d\u5168\u3001\u904e\u654f\u9ad4\u8cea\uff0c\u6216\u6b63\u5728\u670d\u7528\u6162\u6027\u75c5\u85e5\u7269\u8005\uff0c\u98df\u7528\u524d\u8acb\u5148\u8aee\u8a62\u91ab\u5e2b\n**\u85e5\u7269\u9593\u9694**\uff1a\u8acb\u8207\u5176\u4ed6\u85e5\u7269\u9593\u96942\u5c0f\u6642\u670d\u7528\n\n**\u5ba2\u670d\u5099\u8a3b**\uff1a\n- \u9846\u7c92\u8272\u6fa4\u6703\u6709\u6df1\u6dfa\u4e0d\u540c\u4e4b\u81ea\u7136\u8b8a\u5316\uff0c\u5c6c\u6b63\u5e38\u73fe\u8c61\n- \u5546\u54c1\u82e5\u6709\u7570\u7269\u3001\u8b8a\u8cea\u3001\u7834\u88c2\u3001\u5916\u6f0f\u3001\u51f8\u84cb\u7b49\u73fe\u8c61\uff0c\u61c9\u907f\u514d\u98df\u7528\u4e26\u901a\u77e5\u5ba2\u670d\u63db\u8ca8\n\n---\n\n## \u3010Diu+ \u96d9\u8259\u5b88\u5bae\u98f2\u3011\uff08\u5168\u65b0\u7522\u54c1\uff09\n**\u7522\u54c1\u540d\u7a31**\uff1aDiu+ \u96d9\u8259\u5b88\u5bae\u98f2 FEMININE BALANCE DUAL SYSTEM\n**\u54c1\u724c**\uff1aDiu+\n**\u7522\u5730**\uff1a\u53f0\u7063\n**\u4fdd\u5b58\u671f\u9650**\uff1a18\u500b\u6708\uff08\u672a\u958b\u5c01\uff09\n**\u4fdd\u5b58\u65b9\u5f0f**\uff1a\u9670\u6dbc\u4e7e\u71e5\u8655\uff0c\u907f\u514d\u9ad8\u6eab\u53ca\u967d\u5149\u7167\u5c04\uff0c\u62c6\u5c01\u5f8c\u5118\u901f\u98df\u7528\n\n**\u7522\u54c1\u7279\u8272**\uff1a\u96d9\u8259\u8a2d\u8a08\uff0c\u5168\u9762\u5b88\u8b77\n- \u4e0a\u8259\uff08\u81a0\u56ca\uff09\uff1a\u6696\u5bae\u81a0\u56ca\uff08\u6f22\u65b9\uff09\n- \u4e0b\u8259\uff08\u6c34\u5291\uff09\uff1a\u5b88\u5bae\u98f2\uff08\u8513\u8d8a\u8393\uff0b\u7518\u9732\u7cd6\uff0b\u76ca\u751f\u83cc\uff09\n\n**\u4e0a\u8259-\u6696\u5bae\u81a0\u56ca\u6210\u5206**\uff1a\n\u6f22\u65b9\u8403\u53d6\u7269\uff08\u9ea5\u82bd\u7cca\u7cbe\u3001\u4e39\u53c3\u3001\u76ca\u6bcd\u8349\u3001\u5c71\u6942\u3001\u7576\u6b78\u3001\u5ddd\u828e\u3001\u719f\u5730\u9ec3\u3001\u7518\u8349\u3001\u767d\u828d\uff09\u3001\u7d05\u68d7\u8403\u53d6\u7269\u3001\u7389\u7c73\u6fb1\u7c89\u3001\u4e8c\u6c27\u5316\u77fd\u3001\u786c\u8102\u9178\u9382\n\u81a0\u56ca\u6bbc\uff1a\u7fa5\u4e19\u57fa\u7532\u57fa\u7e96\u7dad\u7d20\u3001\u7d14\u6c34\u3001\u9e7f\u89d2\u83dc\u81a0\u3001\u4e8c\u6c27\u5316\u9226\u3001\u6c2f\u5316\u9240\u3001\u98df\u7528\u7d05\u8272\u516d\u865f\u3001\u98df\u7528\u9ec3\u8272\u4e94\u865f\n\n**\u4e0b\u8259-\u5b88\u5bae\u98f2\u6210\u5206**\uff1a\n\u6c34\u3001\u7570\u9ea5\u82bd\u5be1\u7cd6\u6f3f\u3001\u7802\u7cd6\u3001\u8513\u8d8a\u8393\u6fc3\u7e2e\u6c41\u3001\u8461\u8404\u6fc3\u7e2e\u6c41\u3001D-\u7518\u9732\u7cd6\u3001\u9999\u6599\u3001\u5c08\u5229\u8513\u8d8a\u8393\u62bd\u51fa\u7269\uff08\u8513\u8d8a\u8393\u62bd\u51fa\u7269\u3001\u8513\u8d8a\u8393\u6fc3\u7e2e\u6c41\u3001\u6c2b\u6c27\u5316\u9382\u3001\u78f7\u9178\u9223\uff09\u3001\u4e73\u9178\u83cc\u767c\u9175\u7269\uff08\u52a0\u6c0f\u4e73\u687f\u83cc\u3001\u4fdd\u52a0\u5229\u4e9e\u4e73\u687f\u83cc\u3001\u745e\u58eb\u4e73\u9178\u83cc\u3001\u4e73\u9178\u4e73\u7403\u83cc\u3001\u9f20\u674e\u7cd6\u4e73\u687f\u83cc\u3001\u55dc\u71b1\u93c8\u7403\u83cc\u3001\u9f8d\u6839\u83cc\u3001\u6bd4\u83f2\u5fb7\u6c0f\u83cc\u3001\u9752\u6625\u96d9\u6b67\u687f\u83cc\uff09\n\n**\u98df\u7528\u65b9\u5f0f**\uff1a\u6bcf\u65e51\u6b21\uff0c\u6bcf\u6b21\u4e0a\u82592\u9846\uff0c\u4e0b\u82591\u74f6\n**\u904e\u654f\u539f**\uff1a\u7121\u5e38\u898b\u904e\u654f\u539f\uff0c\u542b\u4e73\u9178\u83cc\n**\u529f\u6548\u8a34\u6c42**\uff1a\u8513\u8d8a\u8393\u3001\u7518\u9732\u7cd6\u30019\u7a2e\u76ca\u751f\u83cc\uff0c\u5168\u9762\u5b88\u8b77\u5973\u6027\u79c1\u5bc6\u5065\u5eb7\n**\u7d20\u98df**\uff1a\u4e0a\u4e0b\u8259\u5747\u70ba\u7d20\u98df\u53ef\u98df\uff08\u4e0a\u8259\u81a0\u56ca\u6bbc\u70ba\u690d\u7269\u81a0\u56ca\uff09\n\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a\u5b55\u5a66\u3001\u54fa\u4e73\u5a66\u5973\n**\u9069\u7528\u5e74\u9f61**\uff1a18\u6b72\u4ee5\u4e0a\u5efa\u8b70\u7a69\u5b9a\u88dc\u5145\uff1b\u521d\u7d93\u5f8c\u9752\u5c11\u5e74\u5076\u723e\u88dc\u5145\u53ef\uff0c\u4f46\u56e0\u751f\u9577\u677f\u672a\u5b8c\u5168\u5bc6\u5408\uff0c\u4e0d\u5efa\u8b70\u9577\u671f\u7a69\u5b9a\u98f2\u7528\uff08\u4f9d\u85e5\u5e2b\u5efa\u8b70\uff09\n**\u9ad8\u98a8\u96aa\u6ce8\u610f**\uff1a\u26a0\ufe0f \u4e0a\u8259\u6696\u5bae\u81a0\u56ca\u542b\u6f22\u65b9\u6d3b\u8840\u6210\u5206\uff0c\u7d93\u671f\u4e2d\u5efa\u8b70\u5148\u8aee\u8a62\u91ab\u5e2b\u6216\u5c08\u696d\u4eba\u58eb\uff1b\u4e0b\u8259\u5b88\u5bae\u98f2\u7d93\u671f\u4e2d\u4e00\u822c\u53ef\u88dc\u5145\n**\u51dd\u8840\u6ce8\u610f**\uff1a\u51dd\u8840\u529f\u80fd\u7570\u5e38\u8005\u6216\u670d\u7528\u6297\u51dd\u8840\u85e5\u7269\u8005\uff0c\u8acb\u5148\u8aee\u8a62\u91ab\u5e2b\n**\u75be\u75c5/\u7528\u85e5\u6ce8\u610f**\uff1a\u82e5\u6709\u75be\u75c5\u3001\u814e\u529f\u80fd\u4e0d\u5168\u6216\u904e\u654f\u9ad4\u8cea\u8005\uff0c\u8acb\u5148\u8aee\u8a62\u91ab\u85e5\u5c08\u696d\u4eba\u58eb\u518d\u98df\u7528\n**\u85e5\u7269\u9593\u9694**\uff1a\u8acb\u8207\u5176\u4ed6\u85e5\u7269\u9593\u96942\u5c0f\u6642\u670d\u7528\n\n**\u5ba2\u670d\u5099\u8a3b**\uff1a\n- \u9846\u7c92\u8272\u6fa4\u6703\u6709\u6df1\u6dfa\u4e0d\u540c\u4e4b\u81ea\u7136\u8b8a\u5316\uff0c\u5c6c\u6b63\u5e38\u73fe\u8c61\n- \u5546\u54c1\u82e5\u6709\u7570\u7269\u3001\u8b8a\u8cea\u3001\u7834\u88c2\u3001\u5916\u6f0f\u3001\u51f8\u84cb\u7b49\u73fe\u8c61\uff0c\u61c9\u907f\u514d\u98df\u7528\u4e26\u901a\u77e5\u5ba2\u670d\u63db\u8ca8\n- \u7d93\u671f\u4e2d\uff1a\u4e0b\u8259\u53ef\u88dc\u5145\uff0c\u4e0a\u8259\u5efa\u8b70\u8aee\u8a62\u91ab\u5e2b\uff1b\u82e5\u6709\u9867\u616e\u53ef\u66ab\u505c\u4e0a\u8259\u3001\u55ae\u7368\u88dc\u5145\u4e0b\u8259\n- \u96d9\u8259\u4ed9\u5973\u98f2\u4e0b\u8259\u542b\u81a0\u539f\u86cb\u767d\u98f2\uff08\u52d5\u7269\u4f86\u6e90\uff09\uff0c\u975e\u7d20\u98df\n\n\n---\n\n\n---\n\n## \u3010\u5927\u6fc0\u8cde \u9583\u9583\u91d1\u81a0\u56ca\u3011\n**\u7522\u54c1\u540d\u7a31**\uff1a\u5927\u6fc0\u8cde \u9583\u9583\u91d1\u81a0\u56ca\n**\u54c1\u724c**\uff1a\u5927\u6fc0\u8cde\n**\u898f\u683c**\uff1a0.5\u516c\u514b/\u7c92\uff1b20\u7c92/\u888b\uff1b3\u888b/\u76d2\n**\u7522\u5730**\uff1a\u53f0\u7063\n**\u4fdd\u5b58\u65b9\u5f0f**\uff1a\u9670\u6dbc\u8655\u4fdd\u5b58\uff0c\u6298\u5c01\u5f8c\u8acb\u76e1\u5feb\u98df\u7528\u5b8c\u7562\n**\u5152\u7ae5\u98df\u7528**\uff1a\u5efa\u8b70\u6eff6\u6b72\u4ee5\u4e0a\n\n**\u4e3b\u8981\u529f\u6548**\uff1a\n- \u6e1b\u5c11\u9ad4\u5167\u6162\u6027\u767c\u708e\n- \u8abf\u52d5\u8102\u8cea\u4ee3\u8b1d\u8207\u5438\u6536\n- \u6539\u5584\u8178\u9053\u83cc\u76f8\n- \u5305\u8986\u8207\u5438\u9644\u6cb9\u8102\n- \u6709\u52a9\u65bc\u964d\u4f4e\u9ad4\u8102\u80aa\n\n**\u6210\u5206**\uff1a\n\u9748\u829d\u83cc\u7d72\u9ad4\u767c\u9175\u9175\u7c89\u3014\u9748\u829d\u83cc\u7d72\u9ad4\u767c\u9175\u6db2(Ganoderma lucidum\uff0c\u6db2\u614b\u767c\u9175)\u3001\u96e3\u6d88\u5316\u6027\u9ea5\u82bd\u7cca\u7cbe\u3015\u3001\u96f2\u829d\u83cc\u7d72\u9ad4\u767c\u9175\u9175\u7c89\u3014\u96f2\u829d\u83cc\u7d72\u9ad4\u767c\u9175\u6db2(Trametes versicolor\uff0c\u6db2\u614b\u767c\u9175)\u3001\u96e3\u6d88\u5316\u6027\u9ea5\u82bd\u7cca\u7cbe\u3015\u3001\u9bae\u679c\u8403\u53d6\u7269\uff08\u9bae\u679c\u679c\u8403\u53d6\u7269\u3001\u9ea5\u82bd\u7cca\u7cbe\uff09\u3001\u9ed1\u82e6\u74dc\u8403\u53d6\u7c89\u3001\u6d0b\u8525\u8403\u53d6\u7269\uff08\u7cca\u7cbe\u3001L-\u7cbe\u80fa\u9178\uff09\u3001\u6a44\u6b16\u7c89\u3001\u5c71\u8475\u8449\u8403\u53d6\u7269\uff08\u5c71\u8475\u8449\u8403\u53d6\u7269\u3001\u5fae\u7d50\u6676\u72c0\u03b1-\u7e96\u7dad\u7d20\uff09\u3001\u6d0b\u83c7\u8403\u53d6\u7c89\n\n**\u81a0\u56ca\u6210\u5206**\uff1a\u7fa5\u4e19\u57fa\u7532\u57fa\u7e96\u7dad\u7d20\u3001\u7d14\u6c34\u3001\u9e7f\u89d2\u83dc\u81a0\u3001\u7126\u7cd6\u8272\u7d20\u3001\u6c2f\u5316\u9240\u3001\u4e8c\u6c27\u5316\u9226\n\n**\u98df\u7528\u65b9\u5f0f**\uff1a\u6bcf\u65e52\u6b21\uff0c\u6bcf\u6b211\uff5e2\u7c92\uff0c\u9910\u524d\u98df\u7528\uff0c\u8acb\u4f9d\u5efa\u8b70\u91cf\u98df\u7528\uff0c\u591a\u98df\u7121\u76ca\n\n---\n\n## \u3010\u5927\u6fc0\u8cde \u9583\u9583\u9280\u81a0\u56ca\u3011\n**\u7522\u54c1\u540d\u7a31**\uff1a\u5927\u6fc0\u8cde \u9583\u9583\u9280\u81a0\u56ca\n**\u54c1\u724c**\uff1a\u5927\u6fc0\u8cde\n**\u898f\u683c**\uff1a0.5\u516c\u514b/\u7c92\uff1b20\u7c92/\u888b\uff1b3\u888b/\u76d2\n**\u7522\u5730**\uff1a\u53f0\u7063\n**\u4fdd\u5b58\u65b9\u5f0f**\uff1a\u9670\u6dbc\u8655\u4fdd\u5b58\uff0c\u6298\u5c01\u5f8c\u8acb\u76e1\u5feb\u98df\u7528\u5b8c\u7562\n**\u5152\u7ae5\u98df\u7528**\uff1a\u5efa\u8b70\u6eff6\u6b72\u4ee5\u4e0a\n\n**\u4e3b\u8981\u529f\u6548**\uff1a\n- \u6e1b\u5c11\u9ad4\u5167\u6162\u6027\u767c\u708e\n- \u8abf\u7bc0\u8207\u7a69\u5b9a\u8840\u7cd6\n- \u6e1b\u5c11\u9ad4\u91cd\u8207\u9ad4\u8102\u80aa\n- \u63d0\u5347\u7d30\u80de\u7cd6\u5206\u7684\u5229\u7528\u7387\n- \u963b\u65b7\u91a3\u985e\u5438\u6536\n\n**\u6210\u5206**\uff1a\n\u9748\u829d\u83cc\u7d72\u9ad4\u767c\u9175\u9175\u7c89\u3014\u9748\u829d\u83cc\u7d72\u9ad4\u767c\u9175\u6db2(Ganoderma lucidum\uff0c\u6db2\u614b\u767c\u9175)\u3001\u96e3\u6d88\u5316\u6027\u9ea5\u82bd\u7cca\u7cbe\u3015\u3001\u7389\u7c73\u9b1a\u8403\u53d6\u7269\uff08\u7389\u7c73\u9b1a\u8403\u53d6\u7269\u3001\u7389\u7c73\u7c73\u7cca\u7cbe\uff09\u3001\u767d\u8170\u8c46\u8403\u53d6\u7269\uff08\u767d\u8170\u8c46\u8403\u53d6\u7269\u3001\u9ea5\u82bd\u7cca\u7cbe\uff09\u3001\u5564\u9152\u9175\u6bcd\u9187\u6bcd\u80dc\u80bd\uff08\u5564\u9152\u9175\u6bcd\u6bcd\u80dc\u80bd\u3001\u7cca\u7cbe\uff09\u3001\u53ef\u53ef\u7c89\uff08\u53ef\u53ef\u8403\u53d6\u7269\u3001\u6728\u85af\u6fb1\u7c89\uff09\u3001\u5929\u7136\u9999\u8349\u9999\u6599\u3001\u8591\u3001\u591a\u9999\u679c\u3001\u8089\u6842\u3001\u6817\u5b50\u7a2e\u76ae\u8403\u53d6\u7269\u3001\u5c71\u82e6\u74dc\u8403\u53d6\u7269\u3001\u83f8\u9e7c\u9178\u927b\n\n**\u81a0\u56ca\u6210\u5206**\uff1a\u7fa5\u4e19\u57fa\u7532\u57fa\u7e96\u7dad\u7d20\u3001\u7d14\u6c34\u3001\u9e7f\u89d2\u83dc\u81a0\u3001\u6c27\u5316\u9226\u3001\u6c2f\u5316\u9240\u3001\u7d05\u8272\u6c27\u5316\u9435\u3001\u9ed1\u8272\u6c27\u5316\u9435\n\n**\u98df\u7528\u65b9\u5f0f**\uff1a\u6bcf\u65e52\u6b21\uff0c\u6bcf\u6b211\uff5e2\u7c92\uff0c\u9910\u524d\u98df\u7528\uff0c\u8acb\u4f9d\u5efa\u8b70\u91cf\u98df\u7528\uff0c\u591a\u98df\u7121\u76ca\n\n---\n\n## \u3010\u9583\u9583\u91d1 vs \u9583\u9583\u9280 \u5dee\u7570\u5c0d\u7167\u3011\n\n| \u9805\u76ee | \u9583\u9583\u91d1 | \u9583\u9583\u9280 |\n|------|--------|--------|\n| \u4e3b\u653b\u65b9\u5411 | \u6cb9\u8102\u4ee3\u8b1d\u3001\u964d\u9ad4\u8102 | \u8840\u7cd6\u8abf\u7bc0\u3001\u963b\u65b7\u91a3\u985e |\n| \u6838\u5fc3\u6210\u5206 | \u9748\u829d\u3001\u96f2\u829d\u3001\u9ed1\u82e6\u74dc\u3001\u6d0b\u8525\u3001\u6a44\u6b16 | \u9748\u829d\u3001\u7389\u7c73\u9b1a\u3001\u767d\u8170\u8c46\u3001\u8089\u6842\u3001\u5c71\u82e6\u74dc |\n| \u9069\u5408\u65cf\u7fa4 | \u6cb9\u81a9\u98f2\u98df\u3001\u9ad4\u8102\u504f\u9ad8\u65cf | \u6fb1\u7c89\u651d\u53d6\u591a\u3001\u8840\u7cd6\u9700\u8abf\u7bc0\u65cf |\n| \u642d\u914d\u5efa\u8b70 | \u53ef\u8207\u9583\u9583\u9280\u642d\u914d\u4f7f\u7528 | \u53ef\u8207\u9583\u9583\u91d1\u642d\u914d\u4f7f\u7528 |\n| \u98df\u7528\u6642\u6a5f | \u9910\u524d | \u9910\u524d |\n\n**\u642d\u914d\u8aaa\u660e**\uff1a\u9583\u9583\u91d1\uff08\u653b\u6cb9\uff09\uff0b\u9583\u9583\u9280\uff08\u653b\u7cd6\uff09\u53ef\u540c\u6642\u4f7f\u7528\uff0c\u4e00\u6b21\u54041\uff5e2\u7c92\uff0c\u9910\u524d\u670d\u7528\u6548\u679c\u6700\u4f73\u3002\n\n\n---\n\n\n## \u5927\u6fc0\u8cde \u5927\u9910\u9632\u5b88\u5c0d\u7b56 FEAST PROTECTION STRATEGY\n**\u54c1\u724c**\uff1a\u5927\u6fc0\u8cde\n**\u898f\u683c**\uff1a4\u7c92/\u5305\uff08\u91d1\u8272\u81a0\u56ca2\u7c92\uff0b\u7d05\u8272\u81a0\u56ca2\u7c92\uff09\n**\u7522\u5730**\uff1a\u53f0\u7063\n**\u4fdd\u5b58\u65b9\u5f0f**\uff1a\u9670\u6dbc\u4e7e\u71e5\u8655\uff0c\u907f\u514d\u9ad8\u6eab\u53ca\u967d\u5149\u7167\u5c04\n**\u5152\u7ae5\u98df\u7528**\uff1a\u5efa\u8b70\u6eff6\u6b72\u4ee5\u4e0a\n**\u7d20\u98df**\uff1a\u5168\u7d20\u53ef\u98df\n\n**\u91d1\u8272\u81a0\u56ca\uff08\u4ee3\u8b1d\u6cb9\uff09\u6210\u5206**\uff1a\n\u6d0b\u83c7\u8403\u53d6\u7269\u3001\u5c71\u8336\u82b1\u8403\u53d6\u7c89\uff08\u5c71\u8336\u82b1\u8403\u53d6\u7269\u3001\u9ea5\u82bd\u7cca\u7cbe\uff09\u3001\u79cb\u8475\u8403\u53d6\u7c89\uff08\u79cb\u8475\u8403\u53d6\u7269\u3001\u83ca\u7cd6\u3001\u6ab8\u6aac\u9178\uff09\u3001\u99ac\u9234\u85af\u6fb1\u7c89\u3001\u786c\u8102\u9178\u9382\u3001\u73ab\u7470\u679c\u8403\u53d6\u7c89\uff08\u03b3-\u74b0\u72c0\u7cca\u7cbe\u3001\u73ab\u7470\u679c\u8403\u53d6\u7269\u3001\u7cca\u7cbe\uff09\u3001\u719f\u6210\u82e6\u74dc\u7c89\u3001\u85e4\u9ec3\u679c\u62bd\u51fa\u7269\uff08\u542b\u7fa5\u57fa\u6ab8\u6aac\u9178\u9223\u9240\u9e7d\uff09\u3001\u4e8c\u6c27\u5316\u77fd\n\u81a0\u56ca\u6210\u5206\uff1a\u7fa5\u4e19\u57fa\u7532\u57fa\u7e96\u7dad\u7d20\u3001\u7d14\u6c34\u3001\u9e7f\u89d2\u83dc\u81a0\u3001\u7126\u7cd6\u8272\u7d20\u3001\u6c2f\u5316\u9240\u3001\u4e8c\u6c27\u5316\u9226\n\n**\u7d05\u8272\u81a0\u56ca\uff08\u4ee3\u8b1d\u7cd6\uff09\u6210\u5206**\uff1a\n\u5fae\u7d50\u6676\u72c0\u03b1-\u7e96\u7dad\u7d20\u3001\u7389\u7c73\u9b1a\u8403\u53d6\u7c89\uff08\u7389\u7c73\u9b1a\u8403\u53d6\u7269\u3001\u9ea5\u82bd\u7cca\u7cbe\uff09\u3001\u9748\u829d\u83cc\u7d72\u9ad4\u7c89\uff08Ganoderma lucidum\uff0c\u6db2\u614b\u91b1\u9175\uff09\u3001\u99ac\u9234\u85af\u6fb1\u7c89\u3001\u7518\u80fa\u9178\u92c5\u3001\u767d\u814e\u8c46\u8403\u53d6\u7c89\uff08\u767d\u814e\u8c46\u8403\u53d6\u7269\u3001\u963f\u62c9\u4f2f\u81a0\uff09\u3001\u786c\u8102\u9178\u9382\u3001\u4e8c\u6c27\u5316\u77fd\u3001\u5cf6\u80e1\u6912\u8403\u53d6\u7c89\uff08\u7cca\u7cbe\u3001\u5cf6\u80e1\u6912\u8403\u53d6\uff09\u3001\u6817\u5b50\u76ae\u8403\u53d6\u7269\u3001\u83f8\u9e7c\u9178\u927b\u8907\u5408\u7269\n\u81a0\u56ca\u6210\u5206\uff1a\u7fa5\u4e19\u57fa\u7532\u57fa\u7e96\u7dad\u7d20\u3001\u7d14\u6c34\u3001\u9e7f\u89d2\u83dc\u81a0\u3001\u4e8c\u6c27\u5316\u9226\u3001\u6c2f\u5316\u9240\u3001\u7d05\u8272\u6c27\u5316\u9435\u3001\u9ed1\u8272\u6c27\u5316\u9435\n\n**\u98df\u7528\u65b9\u5f0f**\uff1a\u6bcf\u65e51\u6b21\uff0c\u6bcf\u6b211\u5305\uff08\u91d1\u82722\u7c92\uff0b\u7d05\u82722\u7c92\uff09\uff0c\u5927\u9910\u524d\u670d\u7528\n**\u529f\u6548\u8a34\u6c42**\uff1a\u6cb9\u8102\u4ee3\u8b1d\u3001\u6fb1\u7c89\u963b\u65b7\u3001\u9ad4\u614b\u7ba1\u7406\n**\u9069\u7528\u65cf\u7fa4**\uff1a\u5916\u98df\u65cf\u3001\u805a\u9910\u65cf\u3001\u98f2\u98df\u4e0d\u898f\u5f8b\u3001\u9ad4\u614b\u7ba1\u7406\u65cf\n**\u904e\u654f\u539f**\uff1a\u7121\u5e38\u898b\u904e\u654f\u539f\uff08\u7d14\u690d\u7269\u8403\u53d6\uff09\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a\u5b55\u5a66\u5efa\u8b70\u8aee\u8a62\u91ab\u5e2b\n\n**\u5dee\u7570\u8aaa\u660e**\uff1a\n- \u91d1\u8272\u81a0\u56ca\u2192 \u5c08\u653b\u6cb9\u8102\u4ee3\u8b1d\uff08\u85e4\u9ec3\u679c\u3001\u5c71\u8336\u82b1\u3001\u79cb\u8475\u3001\u73ab\u7470\u679c\uff09\n- \u7d05\u8272\u81a0\u56ca\u2192 \u5c08\u653b\u6fb1\u7c89\u63a7\u5236\uff08\u767d\u814e\u8c46\u3001\u9748\u829d\u3001\u7389\u7c73\u9b1a\u3001\u8089\u6842\uff09\n\n\n\n---\n\n## \u3010\u5927\u6fc0\u8cde \u9583\u9583\u91d1\u81a0\u56ca\u3011\n**\u7522\u54c1\u540d\u7a31**\uff1a\u5927\u6fc0\u8cde \u9583\u9583\u91d1\u81a0\u56ca\n**\u54c1\u724c**\uff1a\u5927\u6fc0\u8cde\n**\u898f\u683c**\uff1a0.5\u516c\u514b/\u7c92\uff1b20\u7c92/\u888b\uff1b3\u888b/\u76d2\n**\u7522\u5730**\uff1a\u53f0\u7063\n**\u4fdd\u5b58\u65b9\u5f0f**\uff1a\u9670\u6dbc\u8655\u4fdd\u5b58\uff0c\u6298\u5c01\u5f8c\u8acb\u76e1\u5feb\u98df\u7528\u5b8c\u7562\n**\u5152\u7ae5\u98df\u7528**\uff1a\u5efa\u8b70\u6eff6\u6b72\u4ee5\u4e0a\n\n**\u4e3b\u8981\u529f\u6548**\uff1a\n- \u6e1b\u5c11\u9ad4\u5167\u6162\u6027\u767c\u708e\n- \u8abf\u52d5\u8102\u8cea\u4ee3\u8b1d\u8207\u5438\u6536\n- \u6539\u5584\u8178\u9053\u83cc\u76f8\n- \u5305\u8986\u8207\u5438\u9644\u6cb9\u8102\n- \u6709\u52a9\u65bc\u964d\u4f4e\u9ad4\u8102\u80aa\n\n**\u6210\u5206**\uff1a\n\u9748\u829d\u83cc\u7d72\u9ad4\u767c\u9175\u9175\u7c89\u3014\u9748\u829d\u83cc\u7d72\u9ad4\u767c\u9175\u6db2(Ganoderma lucidum\uff0c\u6db2\u614b\u767c\u9175)\u3001\u96e3\u6d88\u5316\u6027\u9ea5\u82bd\u7cca\u7cbe\u3015\u3001\u96f2\u829d\u83cc\u7d72\u9ad4\u767c\u9175\u9175\u7c89\u3014\u96f2\u829d\u83cc\u7d72\u9ad4\u767c\u9175\u6db2(Trametes versicolor\uff0c\u6db2\u614b\u767c\u9175)\u3001\u96e3\u6d88\u5316\u6027\u9ea5\u82bd\u7cca\u7cbe\u3015\u3001\u9bae\u679c\u8403\u53d6\u7269\uff08\u9bae\u679c\u679c\u8403\u53d6\u7269\u3001\u9ea5\u82bd\u7cca\u7cbe\uff09\u3001\u9ed1\u82e6\u74dc\u8403\u53d6\u7c89\u3001\u6d0b\u8525\u8403\u53d6\u7269\uff08\u7cca\u7cbe\u3001L-\u7cbe\u80fa\u9178\uff09\u3001\u6a44\u6b16\u7c89\u3001\u5c71\u8475\u8449\u8403\u53d6\u7269\uff08\u5c71\u8475\u8449\u8403\u53d6\u7269\u3001\u5fae\u7d50\u6676\u72c0\u03b1-\u7e96\u7dad\u7d20\uff09\u3001\u6d0b\u83c7\u8403\u53d6\u7c89\n\n**\u81a0\u56ca\u6210\u5206**\uff1a\u7fa5\u4e19\u57fa\u7532\u57fa\u7e96\u7dad\u7d20\u3001\u7d14\u6c34\u3001\u9e7f\u89d2\u83dc\u81a0\u3001\u7126\u7cd6\u8272\u7d20\u3001\u6c2f\u5316\u9240\u3001\u4e8c\u6c27\u5316\u9226\n\n**\u98df\u7528\u65b9\u5f0f**\uff1a\u6bcf\u65e52\u6b21\uff0c\u6bcf\u6b211\uff5e2\u7c92\uff0c\u9910\u524d\u98df\u7528\uff0c\u8acb\u4f9d\u5efa\u8b70\u91cf\u98df\u7528\uff0c\u591a\u98df\u7121\u76ca\n\n---\n\n## \u3010\u5927\u6fc0\u8cde \u9583\u9583\u9280\u81a0\u56ca\u3011\n**\u7522\u54c1\u540d\u7a31**\uff1a\u5927\u6fc0\u8cde \u9583\u9583\u9280\u81a0\u56ca\n**\u54c1\u724c**\uff1a\u5927\u6fc0\u8cde\n**\u898f\u683c**\uff1a0.5\u516c\u514b/\u7c92\uff1b20\u7c92/\u888b\uff1b3\u888b/\u76d2\n**\u7522\u5730**\uff1a\u53f0\u7063\n**\u4fdd\u5b58\u65b9\u5f0f**\uff1a\u9670\u6dbc\u8655\u4fdd\u5b58\uff0c\u6298\u5c01\u5f8c\u8acb\u76e1\u5feb\u98df\u7528\u5b8c\u7562\n**\u5152\u7ae5\u98df\u7528**\uff1a\u5efa\u8b70\u6eff6\u6b72\u4ee5\u4e0a\n\n**\u4e3b\u8981\u529f\u6548**\uff1a\n- \u6e1b\u5c11\u9ad4\u5167\u6162\u6027\u767c\u708e\n- \u8abf\u7bc0\u8207\u7a69\u5b9a\u8840\u7cd6\n- \u6e1b\u5c11\u9ad4\u91cd\u8207\u9ad4\u8102\u80aa\n- \u63d0\u5347\u7d30\u80de\u7cd6\u5206\u7684\u5229\u7528\u7387\n- \u963b\u65b7\u91a3\u985e\u5438\u6536\n\n**\u6210\u5206**\uff1a\n\u9748\u829d\u83cc\u7d72\u9ad4\u767c\u9175\u9175\u7c89\u3014\u9748\u829d\u83cc\u7d72\u9ad4\u767c\u9175\u6db2(Ganoderma lucidum\uff0c\u6db2\u614b\u767c\u9175)\u3001\u96e3\u6d88\u5316\u6027\u9ea5\u82bd\u7cca\u7cbe\u3015\u3001\u7389\u7c73\u9b1a\u8403\u53d6\u7269\uff08\u7389\u7c73\u9b1a\u8403\u53d6\u7269\u3001\u7389\u7c73\u7c73\u7cca\u7cbe\uff09\u3001\u767d\u8170\u8c46\u8403\u53d6\u7269\uff08\u767d\u8170\u8c46\u8403\u53d6\u7269\u3001\u9ea5\u82bd\u7cca\u7cbe\uff09\u3001\u5564\u9152\u9175\u6bcd\u9187\u6bcd\u80dc\u80bd\uff08\u5564\u9152\u9175\u6bcd\u6bcd\u80dc\u80bd\u3001\u7cca\u7cbe\uff09\u3001\u53ef\u53ef\u7c89\uff08\u53ef\u53ef\u8403\u53d6\u7269\u3001\u6728\u85af\u6fb1\u7c89\uff09\u3001\u5929\u7136\u9999\u8349\u9999\u6599\u3001\u8591\u3001\u591a\u9999\u679c\u3001\u8089\u6842\u3001\u6817\u5b50\u7a2e\u76ae\u8403\u53d6\u7269\u3001\u5c71\u82e6\u74dc\u8403\u53d6\u7269\u3001\u83f8\u9e7c\u9178\u927b\n\n**\u81a0\u56ca\u6210\u5206**\uff1a\u7fa5\u4e19\u57fa\u7532\u57fa\u7e96\u7dad\u7d20\u3001\u7d14\u6c34\u3001\u9e7f\u89d2\u83dc\u81a0\u3001\u6c27\u5316\u9226\u3001\u6c2f\u5316\u9240\u3001\u7d05\u8272\u6c27\u5316\u9435\u3001\u9ed1\u8272\u6c27\u5316\u9435\n\n**\u98df\u7528\u65b9\u5f0f**\uff1a\u6bcf\u65e52\u6b21\uff0c\u6bcf\u6b211\uff5e2\u7c92\uff0c\u9910\u524d\u98df\u7528\uff0c\u8acb\u4f9d\u5efa\u8b70\u91cf\u98df\u7528\uff0c\u591a\u98df\u7121\u76ca\n\n---\n\n## \u3010\u9583\u9583\u91d1 vs \u9583\u9583\u9280 \u5dee\u7570\u5c0d\u7167\u3011\n\n| \u9805\u76ee | \u9583\u9583\u91d1 | \u9583\u9583\u9280 |\n|------|--------|--------|\n| \u4e3b\u653b\u65b9\u5411 | \u6cb9\u8102\u4ee3\u8b1d\u3001\u964d\u9ad4\u8102 | \u8840\u7cd6\u8abf\u7bc0\u3001\u963b\u65b7\u91a3\u985e |\n| \u6838\u5fc3\u6210\u5206 | \u9748\u829d\u3001\u96f2\u829d\u3001\u9ed1\u82e6\u74dc\u3001\u6d0b\u8525\u3001\u6a44\u6b16 | \u9748\u829d\u3001\u7389\u7c73\u9b1a\u3001\u767d\u8170\u8c46\u3001\u8089\u6842\u3001\u5c71\u82e6\u74dc |\n| \u9069\u5408\u65cf\u7fa4 | \u6cb9\u81a9\u98f2\u98df\u3001\u9ad4\u8102\u504f\u9ad8\u65cf | \u6fb1\u7c89\u651d\u53d6\u591a\u3001\u8840\u7cd6\u9700\u8abf\u7bc0\u65cf |\n| \u642d\u914d\u5efa\u8b70 | \u53ef\u8207\u9583\u9583\u9280\u642d\u914d\u4f7f\u7528 | \u53ef\u8207\u9583\u9583\u91d1\u642d\u914d\u4f7f\u7528 |\n| \u98df\u7528\u6642\u6a5f | \u9910\u524d | \u9910\u524d |\n\n**\u642d\u914d\u8aaa\u660e**\uff1a\u9583\u9583\u91d1\uff08\u653b\u6cb9\uff09\uff0b\u9583\u9583\u9280\uff08\u653b\u7cd6\uff09\u53ef\u540c\u6642\u4f7f\u7528\uff0c\u4e00\u6b21\u54041\uff5e2\u7c92\uff0c\u9910\u524d\u670d\u7528\u6548\u679c\u6700\u4f73\u3002\n\n\n\n---\n\n## \u5927\u6fc0\u8cde \u5143\u6c23\u7d05\u6f64\u81a0\u56ca\uff08\u5b8c\u6574\u7248\uff09\n**\u54c1\u724c**\uff1a\u5927\u6fc0\u8cde\n**\u898f\u683c**\uff1a0.5\u516c\u514b/\u9846 \u00d7 30\u9846\n**\u4fdd\u5b58\u671f\u9650**\uff1a3\u5e74\n**\u4fdd\u5b58\u65b9\u5f0f**\uff1a\u9670\u6dbc\u4e7e\u71e5\u8655\uff0c\u907f\u514d\u9ad8\u6eab\u53ca\u967d\u5149\u76f4\u5c04\n**\u7522\u5730**\uff1a\u53f0\u7063\n**\u5c08\u5229**\uff1a\u7f8e\u570b\u5c08\u5229\uff08\u80fa\u57fa\u9178\u87af\u5408\u9435\u76f8\u95dc\u4e09\u9805\u5c08\u5229\uff09\n\n**\u6210\u5206**\uff1a\u78f7\u9178\u6c2b\u9223\u3001\u5fae\u7d50\u6676\u7e96\u7dad\u7d20\u3001\u5564\u9152\u9175\u6bcdB\u7fa4\u3001\u7852\u9175\u6bcd\u3001\u8907\u65b9\u7dad\u751f\u7d20C\uff08\u6297\u58de\u8840\u9178\uff08\u7dad\u751f\u7d20C\uff09\u3001\u67d1\u6a58\u8403\u53d6\u7269\u3001\u7c73\u7ce0\u7c89\uff09\u3001\u7518\u80fa\u9178\u4e9e\u9435\uff08\u7518\u80fa\u9178\u4e9e\u9435\u3001\u6ab8\u6aac\u9178\u3001\u9ea5\u82bd\u7cca\u7cbe\u3001\u4e8c\u6c27\u5316\u77fd\uff09\u3001\u92c5\u9175\u6bcd\uff08\u975e\u6d3b\u6027\u9175\u6bcd\u3001\u786b\u9178\u92c5\uff09\u3001\u91cd\u9152\u77f3\u9178\u81bd\u9e7c\n**\u81a0\u56ca\u6210\u5206**\uff1a\u660e\u81a0\u3001\u4e8c\u6c27\u5316\u9226\u3001\u7518\u6cb9\u3001\u786b\u9178\u6708\u6842\u916f\u9209\u3001\u7d14\u6c34\n\n**\u4e3b\u8981\u6210\u5206**\uff1a\u7dad\u751f\u7d20B\u7fa4\u3001\u7dad\u751f\u7d20C\u3001\u9435\uff08\u7518\u80fa\u9178\u4e9e\u9435\uff09\u3001\u92c5\u9175\u6bcd\u3001\u7852\u9175\u6bcd\n**\u529f\u6548\u8a34\u6c42**\uff1a\u6c23\u8272\u7d05\u6f64\u3001\u88dc\u5145\u7dad\u751f\u7d20B\u7fa4\u3001\u9435\u3001\u92c5\u3001\u7852\u7b49\u5fc5\u9700\u71df\u990a\u7d20\n**\u98df\u7528\u65b9\u5f0f**\uff1a\u6bcf\u5929\u4e00\u6b21\uff0c\u6bcf\u6b21\u4e00\u9846\uff0c\u591a\u98df\u7121\u76ca\n**\u98df\u7528\u6642\u6a5f**\uff1a\u9910\u5f8c\n**\u9069\u7528\u65cf\u7fa4**\uff1a\u6c23\u8272\u4fdd\u990a\u65cf\u3001\u71df\u990a\u88dc\u5145\u65cf\u3001\u7d20\u98df\u8005\uff08\u81a0\u56ca\u542b\u660e\u81a0\uff0c\u975e\u5168\u7d20\uff09\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a\u5b55\u5a66\u5efa\u8b70\u5148\u8aee\u8a62\u91ab\u5e2b\u3001\u9435\u5291\u654f\u611f\u8005\u9700\u6ce8\u610f\n**\u6ce8\u610f\u4e8b\u9805**\uff1a\u7279\u6b8a\u9ad4\u8cea\u3001\u5b55\u54fa\u6216\u670d\u85e5\u4e2d\u8acb\u5148\u8aee\u8a62\u5c08\u696d\u4eba\u58eb\uff1b\u542b\u9435\u5291\uff0c\u80c3\u8178\u654f\u611f\u8005\u5efa\u8b70\u9910\u5f8c\u670d\u7528\n\n---\n\n## \u5927\u6fc0\u8cde \u7d0d\u8c46Q10\u81a0\u56ca\uff08\u5b8c\u6574\u7248\uff09\n**\u54c1\u724c**\uff1a\u5927\u6fc0\u8cde\n**\u898f\u683c**\uff1a550\u6beb\u514b/\u7c92 \u00d7 90\u7c92/\u76d2\n**\u4fdd\u5b58\u671f\u9650**\uff1a\u672a\u958b\u5c012\u5e74\n**\u4fdd\u5b58\u65b9\u5f0f**\uff1a\u9670\u6dbc\u4e7e\u71e5\u8655\uff0c\u907f\u514d\u9ad8\u6eab\u53ca\u967d\u5149\u7167\u5c04\uff0c\u62c6\u5c01\u5f8c\u5118\u901f\u98df\u7528\n**\u7522\u5730**\uff1a\u53f0\u7063\n\n**\u6210\u5206**\uff1a\u5c08\u5229\u756a\u7d05\u82b1\u8403\u53d6\u7269\uff081mg/\u7c92\uff09\u3001\u7d05\u9eb4\u8403\u53d6\u7c89\uff081.5mg/\u7c92\uff09\u3001\u7d0d\u8c46\u767c\u9175\u7269\uff08\u7d0d\u8c46\u6fc0\u9176\u6d3b\u602720000FU/g\uff1b\u9ea5\u82bd\u7cca\u7cbe\u3001\u7d0d\u8c46\u767c\u9175\u7269\uff09\uff0815mg/\u7c92\uff09\u3001\u8f14\u9175\u7d20Q10\uff085mg/\u7c92\uff09\u3001\u786c\u8102\u9178\u9382\u3001\u4e8c\u6c27\u5316\u77fd\n**\u81a0\u56ca\u6210\u5206**\uff1a\u660e\u81a0\u3001\u786b\u9178\u6708\u6842\u916f\u9209\u3001\u7d14\u6c34\u3001\u4e8c\u6c27\u5316\u9226\u3001\u7518\u6cb9\u3001\u98df\u7528\u7d05\u8272\u4e03\u865f\u3001\u98df\u7528\u7d05\u8272\u516d\u865f\u3001\u98df\u7528\u9ec3\u8272\u56db\u865f\u3001\u98df\u7528\u85cd\u8272\u4e00\u865f\n\n**\u98df\u7528\u65b9\u5f0f**\uff1a\u6bcf\u65e52\u7c92\uff0c\u642d\u914d\u6eab\u958b\u6c34\u98df\u7528\n**\u98df\u7528\u6642\u6a5f**\uff1a\u9910\u5f8c\n**\u529f\u6548\u8a34\u6c42**\uff1a\u5fc3\u8840\u7ba1\u4fdd\u5065\u3001\u8840\u6db2\u5faa\u74b0\u3001\u7d0d\u8c46\u6fc0\u9176\u3001\u8f14\u9175\u7d20Q10\u88dc\u5145\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a15\u6b72\u4ee5\u4e0b\u5c0f\u5b69\u3001\u5b55\u5a66\u3001\u54fa\u4e73\u671f\u5a66\u5973\u3001\u670d\u7528\u6297\u51dd\u8840\u85e5\u54c1\uff08warfarin\uff09\u4e4b\u75c5\u60a3\u4e0d\u5b9c\u98df\u7528\n**\u6ce8\u610f\u4e8b\u9805**\uff1a\n1. 15\u6b72\u4ee5\u4e0b\u5c0f\u5b69\u3001\u5b55\u5a66\u3001\u54fa\u4e73\u671f\u5a66\u5973\u53ca\u670d\u7528\u6297\u51dd\u8840\u85e5\u54c1\uff08warfarin\uff09\u4e4b\u75c5\u60a3\u4e0d\u5b9c\u98df\u7528\n2. \u91cd\u5927\u75be\u75c5\u53ca\u9ad4\u8cea\u904e\u654f\u8005\u61c9\u5148\u8acb\u6559\u5c08\u696d\u91ab\u85e5\u4eba\u54e1\u5f8c\u9078\u64c7\u98df\u7528\n3. \u672c\u7522\u54c1\u975e\u85e5\u54c1\uff0c\u4f9b\u4fdd\u5065\u7528\uff0c\u7f79\u75c5\u8005\u4ecd\u9700\u5c31\u91ab\n**\u98a8\u96aa\u6a19\u7c64**\uff1a\u6297\u51dd\u8840\u85e5\u3001\u5b55\u5a66\u7981\u7528\u300115\u6b72\u4ee5\u4e0b\u7981\u7528\u3001\u7d0d\u8c46\u6fc0\u9176\n\n---\n\n## Diu+ \u660e\u5b88\u5c0d\u7b56\uff08\u66f4\u65b0\u7248\uff09\n**\u54c1\u724c**\uff1aDiu+\n**\u898f\u683c**\uff1a40\u5165\uff08\u65e5\u5b88\u81a0\u56ca20\u7c92\uff0b\u591c\u5b88\u81a0\u56ca20\u7c92\uff09\n**\u4fdd\u5b58\u671f\u9650**\uff1a2\u5e74\n**\u4fdd\u5b58\u65b9\u5f0f**\uff1a\u9670\u6dbc\u4e7e\u71e5\u8655\uff08100\u2103\u4ee5\u4e0b\uff09\n**\u7522\u5730**\uff1a\u53f0\u7063\n**\u5c08\u5229**\uff1a\u7368\u5bb6\u5c08\u5229\u914d\u65b9\n\n**\u65e5\u5b88\u81a0\u56ca\u6210\u5206**\uff1a\n\u03b2-\u80e1\u863f\u8514\u7d20\u3001DHA\u85fb\u6cb9\u3001\u91d1\u76de\u82b1\u8403\u53d6\u7269\uff08\u542b\u8449\u9ec3\u7d20\uff09\u3001\u4e2d\u83ef\u4e09\u8449\u8349\u6cb9\u3001\u8461\u8404\u7cd6\u9178\u92c5\u3001\u7dad\u751f\u7d20B\u7fa4\uff08B1\u3001B2\u3001B6\u3001B12\u3001\u83f8\u9e7c\u7d20\u3001\u8449\u9178\uff09\u3001\u03b1-\u6b21\u4e9e\u9ebb\u6cb9\u9178\u66ff\u88dc\uff08\u6297\u6c27\u5316\u5291\uff09\u3001\u4ee3\u73ca\u745a\u85fb\u9223\uff08\u78f7\u9178\u4e8c\u6c2b\u9223\uff09\u3001\u7dad\u751f\u7d20A\u3001\u7dad\u751f\u7d20E\n\n**\u591c\u5b88\u81a0\u56ca\u6210\u5206**\uff1a\n\u7dad\u751f\u7d20A\u3001\u5c71\u6851\u5b50\u8403\u53d6\u3001\u73bb\u5c3f\u9178\u4f86\u6e90\uff08\u93c8\u7403\u83cc\u767c\u9175\u7269\uff09\u3001\u03b1-\u4e9e\u9ebb\u4ec1\u6cb9\u9178\u3001\u7dad\u751f\u7d20E\n\n**\u98df\u7528\u65b9\u5f0f**\uff1a\u6bcf\u65e5\u54041\u7c92\uff0c\u65e5\u5b88\u81a0\u56ca\u65e9\u4e0a\u98df\u7528\uff0c\u591c\u5b88\u81a0\u56ca\u665a\u4e0a\u98df\u7528\n**\u98df\u7528\u6642\u6a5f**\uff1a\u65e5\u5b88\u2192\u65e9\u9910\u5f8c\uff0c\u591c\u5b88\u2192\u665a\u9910\u5f8c\u6216\u7761\u524d\n**\u529f\u6548\u8a34\u6c42**\uff1a\u65e5\u591c\u5206\u8259\u8b77\u773c\uff0c\u65e5\u9593\u9632\u8b77\u85cd\u5149\uff0c\u591c\u9593\u4fee\u8b77\u6ecb\u6f64\n**\u9069\u7528\u65cf\u7fa4**\uff1a\u9577\u6642\u9593\u7528\u773c\u65cf\u30013C\u91cd\u5ea6\u4f7f\u7528\u8005\u3001\u4e0a\u73ed\u65cf\u3001\u5b78\u751f\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a12\u6b72\u4ee5\u4e0b\u4e0d\u5efa\u8b70\u3001\u5b55\u5a66\u4f9d\u9ad4\u8cea\u8a55\u4f30\u5f8c\u98df\u7528\n**\u6ce8\u610f\u4e8b\u9805**\uff1a\n1. \u8acb\u52ff\u904e\u91cf\u670d\u7528\n2. \u672c\u7522\u54c1\u70ba\u98df\u54c1\uff0c\u975e\u85e5\u54c1\uff0c\u5207\u52ff\u81ea\u884c\u505c\u85e5\n3. 12\u6b72\u4ee5\u4e0a\u9069\u7528\n**\u98a8\u96aa\u6a19\u7c64**\uff1a12\u6b72\u4ee5\u4e0b\u4e0d\u5efa\u8b70\u3001\u5b55\u5a66\u9700\u8a55\u4f30\n\n---\n\n## \u6a59\u9577\u9223\uff08\u66f4\u65b0\u5b8c\u6574\u7248\uff09\n**\u54c1\u724c**\uff1a\u6a39\u98db\u96ea\n**\u898f\u683c**\uff1a2\u516c\u514b/\u5305 \u00d7 30\u5305/\u76d2\n**\u4fdd\u5b58\u671f\u9650**\uff1a3\u5e74\n**\u4fdd\u5b58\u65b9\u5f0f**\uff1a\u9670\u6dbc\u4e7e\u71e5\u8655\uff0c\u907f\u514d\u9ad8\u6eab\u53ca\u967d\u5149\u76f4\u5c04\n**\u7522\u5730**\uff1a\u53f0\u7063\n\n**\u5b8c\u6574\u6210\u5206**\uff1a\u67f3\u6a59\u679c\u6c41\u7c89\uff08\u7802\u7cd6\u3001\u67f3\u6a59\u6fc3\u7e2e\u679c\u6c41\u3001\u9ea5\u82bd\u7cca\u7cbe\u3001\u8f9b\u70ef\u57fa\u4e01\u4e8c\u9178\u9209\u6fb1\u7c89\u3001\u6ab8\u6aac\u9178\u3001\u6ab8\u6aac\u9178\u9209\u3001\u7389\u7c73\u6fb1\u7c89\u3001\u860b\u679c\u9178\u3001\u6a58\u5b50\u6cb9\u3001\u03b2-\u80e1\u863f\u8514\u7d20\u3001\u963f\u62c9\u4f2f\u81a0\u3001\u4e2d\u93c8\u4e09\u9178\u7518\u6cb9\u916f\u3001\u7dad\u751f\u7d20C\uff08\u6297\u6c27\u5316\u5291\uff09\u3001\u4e8c\u6c27\u5316\u77fd\u3001\u7dad\u751f\u7d20E\uff08\u6297\u6c27\u5316\u5291\uff09\uff09\u3001\u6d77\u85fb\u9223\u3001\u6d77\u6d0b\u6df1\u5c64\u6c34\u6fc3\u7e2e\u7269\uff08\u5fae\u7d50\u6676\u7e96\u7dad\u7d20\u3001\u6d77\u6d0b\u6df1\u5c64\u6c34\u6fc3\u7e2e\u6db2\u3001\u7fa5\u4e19\u57fa\u7532\u57fa\u7e96\u7dad\u7d20\u3001\u4e8c\u6c27\u5316\u77fd\uff09\u3001\u83ca\u82e3\u7e96\u7dad\u3001\u7dad\u751f\u7d20D3\uff08\u8f9b\u70ef\u57fa\u4e01\u4e8c\u9178\u9209\u6fb1\u7c89\u3001\u8517\u7cd6\u3001\u7dad\u751f\u7d20C\uff08\u6297\u6c27\u5316\u5291\uff09\u3001\u4e2d\u93c8\u4e09\u9178\u7518\u6cb9\u916f\u3001\u4e8c\u6c27\u5316\u77fd\u3001\u7dad\u751f\u7d20E\uff08\u6297\u6c27\u5316\u5291\uff09\u3001\u7dad\u751f\u7d20D3\u3001\u9ea5\u82bd\u7cca\u7cbe\uff09\u3001\u916a\u86cb\u767d\u78f7\u9178\u80bd\n\n**\u98df\u7528\u65b9\u5f0f**\uff1a\u65e9\u9910\u98ef\u5f8c\u4e00\u6b21\uff0c\u6bcf\u6b21\u4e00\u5305\n**\u98df\u7528\u6642\u6a5f**\uff1a\u65e9\u9910\u5f8c\n**\u529f\u6548\u8a34\u6c42**\uff1a\u88dc\u9223\u3001\u9aa8\u9abc\u4fdd\u5065\uff0c\u542b\u6d77\u85fb\u9223172mg\uff0b\u938285mg\uff0b\u7dad\u751f\u7d20D3\n**\u904e\u654f\u539f**\uff1a\u542b\u725b\u4e73\u53ca\u5176\u88fd\u54c1\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a\u5c0d\u725b\u4e73\u904e\u654f\u8005\u8acb\u907f\u514d\u98df\u7528\n**\u6ce8\u610f\u4e8b\u9805**\uff1a\u8acb\u653e\u7f6e\u9670\u6dbc\u4e7e\u71e5\u8655\uff0c\u4e26\u907f\u514d\u9ad8\u6eab\u53ca\u967d\u5149\u76f4\u5c04\n\n---\n\n## Diu+ \u660e\u5b88\u5c0d\u7b56\uff08\u6700\u7d42\u5b8c\u6574\u7248\uff0c\u4f9d\u7522\u54c1\u8aaa\u660e\u66f8 2026/3/30\uff09\n\n**\u54c1\u724c**\uff1aDiu+\uff08\u706b\u661f\u751f\u6280\uff09\n**\u898f\u683c**\uff1a\u65e5\u5291 0.8\u516c\u514b/\u7c92 \u00d7 20\u7c92\uff1b\u591c\u5291 0.6\u516c\u514b/\u7c92 \u00d7 20\u7c92\uff0c\u517140\u5165/\u76d2\n**\u4fdd\u5b58\u65b9\u5f0f**\uff1a25\u2103\u4ee5\u4e0b\u4e7e\u71e5\u74b0\u5883\uff0c\u907f\u514d\u967d\u5149\u76f4\u63a5\u7167\u5c04\uff0c\u7f6e\u65bc\u5152\u7ae5\u7121\u6cd5\u62ff\u5230\u7684\u5730\u65b9\n**\u7522\u5730**\uff1a\u53f0\u7063\n\n**\u65e5\u5291\u5b8c\u6574\u6210\u5206**\uff1a\n\u4e9e\u9ebb\u4ec1\u6cb9\u3001\u91d1\u76de\u82b1\u8403\u53d6\u7269\uff08\u8475\u82b1\u6cb9\u3001\u91d1\u76de\u82b1\u8403\u53d6\u7269\u3001\u4e2d\u93c8\u4e09\u9178\u7518\u6cb9\u916f\u3001\u7dad\u751f\u7d20E\uff08\u6297\u6c27\u5316\u5291\uff09\uff09\u3001DHA\u85fb\u6cb9\uff08DHA\u85fb\u6cb9\u3001\u6df7\u5408\u6fc3\u7e2e\u751f\u80b2\u9187\uff08\u6297\u6c27\u5316\u5291\uff09\u3001\u4e2d\u93c8\u4e09\u9178\u7518\u6cb9\u916f\u3001\u5375\u78f7\u8102\u3001L-\u6297\u58de\u8840\u9178\u68d5\u6ada\u9178\u916f\uff08\u6297\u6c27\u5316\u5291\uff09\u3001\u8ff7\u8fed\u9999\uff09\u3001\u8461\u8404\u7cd6\u9178\u92c5\u3001\u03b1\u91a3\u5316\u6a59\u76ae\u82f7\uff08\u03b1\u91a3\u5316\u6a59\u76ae\u82f7\u3001\u7cca\u7cbe\uff09\u3001\u9175\u6bcd\u7852\u3001\u7dad\u751f\u7d20E\uff08\u4e59\u9178dl-\u03b1-\u751f\u80b2\u9187\u916f\u3001\u9ea5\u82bd\u7cca\u7cbe\u3001\u8f9b\u70ef\u57fa\u4e01\u4e8c\u9178\u9209\u6fb1\u7c89\u3001\u4e8c\u6c27\u5316\u77fd\uff09\u3001\u5357\u8591\u8403\u53d6\u7269\uff08\u5357\u8591\u8403\u53d6\u7269\u3001\u9ea5\u82bd\u7cca\u7cbe\u3001\u4e8c\u6c27\u5316\u77fd\uff09\u3001\u7dad\u751f\u7d20B6\u3001\u7dad\u751f\u7d20B1\u3001\u7dad\u751f\u7d20B2\u3001\u7dad\u751f\u7d20A\uff08\u7dad\u751f\u7d20A\u68d5\u6ada\u9178\u9e7d\u3001\u751f\u80b2\u9187\u3001\u82b1\u751f\u6cb9\uff09\u3001(6S)-5-\u7532\u57fa\u56db\u6c2b\u8449\u9178\u8461\u8404\u7cd6\u80fa\u9e7d\u3001\u7dad\u751f\u7d20B12\n\u81a0\u76ae\u6210\u5206\uff1a\u660e\u81a0\u3001\u7518\u6cb9\u3001\u7d14\u6c34\u3001\u4e8c\u6c27\u5316\u9226\u3001\u98df\u7528\u7d05\u8272\u516d\u865f\u3001\u98df\u7528\u9ec3\u8272\u56db\u865f\u3001\u98df\u7528\u85cd\u8272\u4e00\u865f\n\n**\u591c\u5291\u5b8c\u6574\u6210\u5206**\uff1a\n\u9ea5\u82bd\u7cca\u7cbe\u3001\u5c71\u6851\u5b50\u8403\u53d6\u7269\u3001\u91d1\u76de\u82b1\u8403\u53d6\u7269\uff08\u5fae\u7d50\u6676\u72c0\u03b1-\u7e96\u7dad\u7d20\u3001\u91d1\u76de\u82b1\u8403\u53d6\u7269\uff08\u542b\u8449\u9ec3\u7d20\u916f\u548c\u7389\u7c73\u9ec3\u7d20\uff09\u3001\u7fa5\u4e19\u57fa\u7532\u57fa\u7e96\u7dad\u7d20\u3001\u7dad\u751f\u7d20E\uff08\u6297\u6c27\u5316\u5291\uff09\uff09\u3001\u03b1\u91a3\u5316\u6a59\u76ae\u82f7\uff08\u03b1\u91a3\u5316\u6a59\u76ae\u82f7\u3001\u7cca\u7cbe\uff09\u3001\u6d41\u884c\u93c8\u7403\u83cc\u767c\u9175\u7269\uff08\u542b\u900f\u660e\u8cea\u9178\u9209\uff09\u3001\u4e8c\u6c27\u5316\u77fd\u3001\u7dad\u751f\u7d20E\uff08\u4e59\u9178dl-\u03b1-\u751f\u80b2\u9187\u916f\u3001\u9ea5\u82bd\u7cca\u7cbe\u3001\u8f9b\u70ef\u57fa\u4e01\u4e8c\u9178\u9209\u6fb1\u7c89\u3001\u4e8c\u6c27\u5316\u77fd\uff09\u3001(6S)-5-\u7532\u57fa\u56db\u6c2b\u8449\u9178\u8461\u8404\u7cd6\u80fa\u9e7d\u3001\u7dad\u751f\u7d20A\uff08\u660e\u81a0\u3001\u7389\u7c73\u6fb1\u7c89\u3001\u7dad\u751f\u7d20A\u3001\u8517\u7cd6\u3001\u4e8c\u4e01\u57fa\u7fa5\u57fa\u7532\u82ef\uff09\n\u81a0\u76ae\u6210\u5206\uff1a\u660e\u81a0\u3001\u7518\u6cb9\u3001\u786b\u9178\u6708\u6842\u916f\u9209\u3001\u98df\u7528\u7d05\u8272\u516d\u865f\u3001\u98df\u7528\u9ec3\u8272\u4e94\u865f\u3001\u98df\u7528\u85cd\u8272\u4e00\u865f\u3001\u7d14\u6c34\n\n**\u98df\u7528\u65b9\u5f0f**\uff1a\u65e5\u5291\u3001\u591c\u5291\u6bcf\u65e5\u54041\u7c92\uff0c\u65bc\u9910\u5f8c\u642d\u914d\u958b\u6c34\u98df\u7528\uff0c\u6bcf\u65e5\u8acb\u52ff\u8d85\u904e1\u7c92\uff0c\u591a\u98df\u7121\u76ca\n**\u98df\u7528\u6642\u6a5f**\uff1a\u65e5\u5291\u2192\u65e9\u9910\u5f8c\uff1b\u591c\u5291\u2192\u665a\u9910\u5f8c\n\n**\u904e\u654f\u539f**\uff1a\u26a0\ufe0f \u672c\u7522\u54c1\u542b\u82b1\u751f\u88fd\u54c1\uff08\u65e5\u5291\u6210\u5206\u4e2d\u542b\u82b1\u751f\u6cb9\uff09\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a\u82b1\u751f\u904e\u654f\u8005\u7981\u7528\uff1b12\u6b72\u4ee5\u4e0b\u4e0d\u5efa\u8b70\uff1b\u5b55\u5a66\u4f9d\u9ad4\u8cea\u8a55\u4f30\n\n**\u71df\u990a\u6a19\u793a\uff08\u65e5\u5291\uff0c\u6bcf\u7c92\uff09**\uff1a\n- \u7dad\u751f\u7d20A\uff1a144\u5fae\u514bRE\uff08480IU\uff09\n- \u7dad\u751f\u7d20B1\uff1a1.2\u6beb\u514b\n- \u7dad\u751f\u7d20B2\uff1a1.2\u6beb\u514b\n- \u7dad\u751f\u7d20B6\uff1a1.5\u6beb\u514b\n- \u7dad\u751f\u7d20B12\uff1a2.4\u5fae\u514b\n- \u7dad\u751f\u7d20E\uff1a2.2\u6beb\u514b-TE\uff083.3IU\uff09\n- \u8449\u9178\uff1a200\u5fae\u514b\n- \u92c5\uff1a3.9\u6beb\u514b\n- \u7852\uff1a33\u5fae\u514b\n- \u8449\u9ec3\u7d20\uff1a15\u6beb\u514b\n\n**\u71df\u990a\u6a19\u793a\uff08\u591c\u5291\uff0c\u6bcf\u7c92\uff09**\uff1a\n- \u7dad\u751f\u7d20A\uff1a72\u5fae\u514bRE\uff08240IU\uff09\n- \u7dad\u751f\u7d20E\uff1a2.2\u6beb\u514b-TE\uff083.3IU\uff0 a3\u5e74\n**\u529f\u6548**\uff1a\u85cd\u9285\u80dc\u80bd\u6df1\u5165\u88dc\u6c34\u4fee\u8b77\uff0c\u8f15\u76c8\u8cea\u5730\u8fc5\u901f\u5438\u6536\uff0c\u63d0\u5347\u808c\u819a\u5f48\u6027\u5149\u6fa4\n\n**\u4e3b\u8981\u6210\u5206**\uff1a\u6c34\u3001\u8606\u8588\u8449\u8403\u53d6\u3001\u9285\u80dc\u80bd\uff08GHK-Cu\uff09\u3001\u73bb\u5c3f\u9178\u9209\u3001\u7518\u6cb9\u3001\u8d64\u829d\u8403\u53d6\n\n**\u4f7f\u7528\u65b9\u5f0f**\uff1a\n\u6e05\u6f54\u5f8c\u53d6\u9069\u91cf\u8f15\u62cd\u81c9\u90e8\u81f3\u5438\u6536\uff0c\u518d\u9032\u884c\u5f8c\u7e8c\u7cbe\u83ef\u6db2\u6216\u4e73\u6db2\u6b65\u9a5f\n\n**\u5ba2\u670d\u5099\u8a3b**\uff1a\u9577\u6642\u9593\u975c\u7f6e\u6216\u6eab\u5ea6\u8b8a\u5316\u53ef\u80fd\u51fa\u73fe\u4e9b\u5fae\u5206\u5c64\u6216\u6210\u5206\u805a\u96c6\uff0c\u4f7f\u7528\u524d\u8f15\u8f15\u6416\u6643\u5747\u52fb\u5373\u53ef\uff0c\u7121\u7570\u5473\u6216\u660e\u986f\u8b8a\u8272\u5247\u6b63\u5e38\u53ef\u4f7f\u7528\n\n---\n\n## \u3010\u7480\u74a8\u85cd\u9285\u5f48\u6f64\u7cbe\u83ef\u6db2\u3011\n**\u54c1\u724c**\uff1aDiu+ \u7f8e\u599d\u54c1\n**\u7522\u5730**\uff1a\u53f0\u7063\n**\u5bb9\u91cf**\uff1a30ml\n**\u4fdd\u5b58\u671f\u9650**\uff1a3\u5e74\n**\u529f\u6548**\uff1a\u5fae\u8102\u56ca\u5305\u8986\u6280\u8853\uff0c\u85cd\u9285\u80dc\u80bd\u6df1\u5165\u5e95\u5c64\u91cb\u653e\uff0c\u4fee\u8b77\u808c\u819a\u63d0\u5347\u5f48\u6027\u8207\u7dca\u7dfb\n\n**\u4e3b\u8981\u6210\u5206**\uff1a\u6c34\u3001\u9285\u80dc\u80bd\uff08GHK-Cu\uff09\u3001\u73bb\u5c3f\u9178\u9209\u3001\u795e\u7d93\u91af\u80fa\u3001\u8d64\u829d\u8403\u53d6\n\n**\u4f7f\u7528\u65b9\u5f0f**\uff1a\u5316\u599d\u6c34\u5f8c\uff0c\u4f7f\u7528\u524d\u6416\u6643\u5747\u52fb\uff0c\u53d6\u9069\u91cf\u8f15\u67d4\u6309\u58d3\u65bc\u5168\u81c9\uff0c\u5f85\u7522\u54c1\u5438\u6536\u5373\u53ef\n\n---\n\n## \u3010\u85cd\u9285\u5f48\u529b\u7dca\u7dfb\u6c34\u51dd\u971c\u3011\n**\u54c1\u724c**\uff1aDiu+ \u7f8e\u599d\u54c1\n**\u7522\u5730**\uff1a\u53f0\u7063\n**\u5bb9\u91cf**\uff1a50ml\n**\u4fdd\u5b58\u671f\u9650**\
