**風險等級：低**
**Q：** 橙長鈣最小幾歲可以吃？
**A：** 橙長鈣屬於營養補充品，一般建議1歲以上兒童即可補充。由於1歲前的寶寶仍以母乳、配方奶及副食品為主要營養來源，因此未滿1歲的寶寶，建議先諮詢兒科醫師後再補充較為合適。若已滿1歲，則可依照建議量補充喔😊 提供給您參考～

### FAQ163｜大激賞 元氣紅潤膠囊
**問題分類：成分詢問**
**風險等級：低**
**Q：** 大激賞元氣紅潤膠囊素食可以吃嗎？
**A：** 元氣紅潤膠囊的膠囊殼成分含有明膠（動物來源），所以不是全素喔！蛋奶素或一般素食者需要注意這點，建議確認自己的素食類型後再決定是否食用😊

### FAQ164｜Clean Coffee
**問題分類：不良反應/副作用**
**風險等級：高｜需轉人工確認**
**Q：** 第一次喝Clean Coffee（加400ml豆漿），昨天感覺有些奇怪，今天喝了之後明顯心跳加速，正常嗎？
**A：** 您好～😊 若平常沒有喝咖啡、茶或其他含咖啡因飲品的習慣，第一次飲用Clean Coffee後出現心跳加快、精神較亢奮或感覺怪怪的情況，是有可能發生的喔。因為Clean Coffee每包含有咖啡因成分，對於平常較少接觸咖啡因的人來說，身體感受通常會比較明顯。建議您可以先嘗試：✔ 先從半包開始飲用 ✔ 早上或白天飲用為主 ✔ 避免空腹飲用 ✔ 暫時避免同時飲用其他含咖啡因飲品。若減量後狀況改善，通常代表是對咖啡因較敏感所造成的反應😊 不過如果心悸、胸悶、不舒服的情況持續，或症狀較明顯，建議先停止飲用，並諮詢專業醫師評估喔

### FAQ165｜Diu+系列、孅孅凍、樹飛雪納豆Q10
**問題分類：疾病/用藥**
**風險等級：高｜需轉人工確認**
**Q：** Diu+系列產品是否有添加會誘發子宮肌瘤或纖維囊腫的成分？孅孅凍有輕瀉成分嗎？樹飛雪納豆可以吃嗎？
**A：** 您好～😊 關於您擔心的子宮肌瘤、乳房纖維囊腫以及代謝產品補充的問題，這邊幫您說明一下。目前 Diu+ 系列產品（包含孅孅飲、孅孅凍、咕嚕咕嚕超纖酵素、康普茶、丟丟茶、Clean Coffee 等）配方中，並未添加大豆異黃酮、蜂王乳（食用）、胎盤素等較常被討論與女性荷爾蒙相關的成分。因此從產品配方來看，並沒有特別以荷爾蒙調節為設計方向。至於孅孅凍，配方中含有決明子萃取物、蘆薈萃取物、羊角豆萃取物及多種膳食纖維來源，因此部分消費者食用後可能會感受到排便較順暢，這屬於產品特性的一部分。建議依照每日建議量補充即可，並維持均衡飲食及充足水分攝取，讓腸道維持自然的調整節奏😊 另外許多人也會擔心長期補充酵素、纖維或代謝類產品是否會產生依賴性，目前這類產品主要是透過膳食纖維、酵素、益生質等營養成分作為日常補充，並非透過藥物機制作用。至於樹飛雪納豆Q10，產品含有納豆激酶成分，若正在服用抗凝血藥物、準備接受手術，或有特殊疾病治療需求者，建議先諮詢醫師後再食用會較為合適。這部分主要是考量納豆激酶與凝血機制相關，而非與子宮肌瘤或乳房纖維囊腫有直接關聯。當然，每個人的身體狀況不同，若本身已有子宮肌瘤、乳房纖維囊腫或其他婦科疾病，也建議將產品成分提供給主治醫師評估，並依照醫師建議補充會較安心😊 提供給您參考～

let apiKey = localStorage.getItem('gemini_api_key') || '';
let conversations = JSON.parse(localStorage.getItem('diu_conversations') || '[]');
let currentConvId = null;
let pendingImages = [];
let isLoading = false;

window.onload = () => {
  if (apiKey) {
    document.getElementById('apiKey').value = apiKey;
    setStatus(true);
  }
  renderHistory();
};

function saveKey() {
  const key = document.getElementById('apiKey').value.trim();
  if (!key) return alert('請填入 API Key');
  apiKey = key;
  localStorage.setItem('gemini_api_key', key);
  setStatus(true);
}

function setStatus(ok) {
  document.getElementById('statusDot').style.background = ok ? 'var(--success)' : 'var(--error)';
  document.getElementById('statusText').textContent = ok ? '已連線 · Gemini 2.5 Flash' : '未連線';
}

function newChat() {
  currentConvId = null;
  document.getElementById('messages').innerHTML = '<div class="empty-state" id="emptyState"><div class="empty-icon">💬</div><div class="empty-title">Diu+ AI 客服助理</div><div class="empty-sub">知識庫已完整內建（產品資料、FAQ 165筆、客訴SOP 18個）<br><br>貼上客戶問題，AI 直接產生回覆草稿。</div></div>';
  document.querySelectorAll('.history-item').forEach(el => el.classList.remove('active'));
}

function renderHistory() {
  const list = document.getElementById('historyList');
  list.innerHTML = '';
  [...conversations].reverse().forEach(conv => {
    const item = document.createElement('div');
    item.className = 'history-item' + (conv.id === currentConvId ? ' active' : '');
    item.innerHTML = '<div class="history-q">' + conv.firstQ + '</div><div class="history-time">' + conv.time + '</div>';
    item.onclick = () => loadConv(conv.id);
    list.appendChild(item);
  });
}

function loadConv(id) {
  currentConvId = id;
  const conv = conversations.find(c => c.id === id);
  if (!conv) return;
  document.getElementById('messages').innerHTML = '';
  conv.messages.filter(m => m.role !== 'system').forEach(m => appendMsg(m.role, m.content, false));
  renderHistory();
}

function appendMsg(role, content, anim = true) {
  const e = document.getElementById('emptyState');
  if (e) e.remove();
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'message ' + role;
  const roleLabel = role === 'user' ? '客服人員（問題）' : 'AI 回覆草稿';
  div.innerHTML = '<div class="message-role">' + roleLabel + '</div><div class="message-content">' + esc(content) + '</div>' +
    (role === 'assistant' ? '<button class="copy-btn" onclick="doCopy(this, this.closest('.message').querySelector('.message-content').textContent)">📋 複製草稿</button>' : '');
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function doCopy(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ 已複製';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 複製草稿'; btn.classList.remove('copied'); }, 2000);
  });
}

function esc(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function handleImages(e) {
  Array.from(e.target.files).forEach(file => {
    const r = new FileReader();
    r.onload = ev => { pendingImages.push({ base64: ev.target.result.split(',')[1], mimeType: file.type }); renderPreviews(); };
    r.readAsDataURL(file);
  });
  e.target.value = '';
}

function renderPreviews() {
  const p = document.getElementById('imagePreview');
  p.innerHTML = '';
  pendingImages.forEach((img, i) => {
    const d = document.createElement('div');
    d.className = 'preview-item';
    d.innerHTML = '<img src="data:' + img.mimeType + ';base64,' + img.base64 + '"><button class="remove-img" onclick="pendingImages.splice(' + i + ',1);renderPreviews()">×</button>';
    p.appendChild(d);
  });
}

function handleKeydown(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 200) + 'px'; }

async function sendMessage() {
  if (!apiKey) { alert('請先設定 API Key'); return; }
  if (isLoading) return;
  const input = document.getElementById('questionInput');
  const q = input.value.trim();
  if (!q && pendingImages.length === 0) return;

  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  const displayQ = q || '[圖片問題]';
  appendMsg('user', displayQ);

  if (!currentConvId) {
    currentConvId = Date.now().toString();
    const now = new Date();
    conversations.push({ id: currentConvId, firstQ: displayQ.slice(0, 30), time: (now.getMonth()+1) + '/' + now.getDate() + ' ' + now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0'), messages: [] });
  }

  const conv = conversations.find(c => c.id === currentConvId);
  conv.messages.push({ role: 'user', content: displayQ });

  input.value = ''; input.style.height = 'auto';
  const imgs = [...pendingImages]; pendingImages = []; renderPreviews();

  const msgs = document.getElementById('messages');
  const ld = document.createElement('div');
  ld.className = 'message assistant';
  ld.innerHTML = '<div class="message-role">AI 回覆草稿</div><div class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  msgs.appendChild(ld);
  msgs.scrollTop = msgs.scrollHeight;

  try {
    const contents = [];
    for (let i = 0; i < conv.messages.length - 1; i++) {
      const m = conv.messages[i];
      contents.push({ role: m.role === 'user' ? 'user' : 'model', parts: [{ text: m.content }] });
    }
    const userParts = [];
    imgs.forEach(img => userParts.push({ inlineData: { mimeType: img.mimeType, data: img.base64 } }));
    if (q) userParts.push({ text: q });
    contents.push({ role: 'user', parts: userParts });

    const res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-05-20:generateContent?key=' + apiKey, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
        contents,
        generationConfig: { temperature: 0.7, maxOutputTokens: 2048 }
      })
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || '抱歉，無法取得回覆，請重試。';

    ld.remove();
    appendMsg('assistant', reply);
    conv.messages.push({ role: 'assistant', content: reply });
    localStorage.setItem('diu_conversations', JSON.stringify(conversations));
    renderHistory();

  } catch (err) {
    ld.remove();
    appendMsg('assistant', '❌ 錯誤：' + err.message);
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
}
</script>
