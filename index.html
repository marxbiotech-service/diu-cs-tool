<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'Noto Sans TC', sans-serif; background: #f0f2f5; height: 100vh; display: flex; flex-direction: column; }

.topbar { background: #fff; border-bottom: 1px solid #e5e7eb; padding: 10px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }

.cat-label { font-size: 11px; color: #9ca3af; font-weight: 600; margin-right: 2px; white-space: nowrap; }
.cat-btn { padding: 5px 12px; border-radius: 16px; border: 1.5px solid #d1d5db; background: #fff; font-size: 12px; cursor: pointer; color: #374151; transition: all 0.2s; white-space: nowrap; font-weight: 500; user-select: none; }
.cat-btn:hover { border-color: #6366f1; color: #6366f1; }
.cat-btn.selected.diu { background: #6366f1; border-color: #6366f1; color: #fff; }

.cat-btn.selected.daiji { background: #d97706; border-color: #d97706; color: #fff; }
.cat-btn.selected.snow-b { background: #0891b2; border-color: #0891b2; color: #fff; }

.token-info { margin-left: auto; display: flex; align-items: center; gap: 6px; }
.token-badge { font-size: 11px; padding: 3px 8px; border-radius: 10px; background: #f3f4f6; color: #6b7280; white-space: nowrap; }
.token-badge.low { background: #d1fae5; color: #065f46; }
.token-badge.mid { background: #fef3c7; color: #92400e; }
.token-badge.high { background: #fee2e2; color: #991b1b; }
.hint { font-size: 11px; color: #9ca3af; }

.main { display: flex; flex: 1; overflow: hidden; }
.sidebar { width: 175px; background: #fff; border-right: 1px solid #e5e7eb; padding: 10px; overflow-y: auto; flex-shrink: 0; }
.sidebar-title { font-size: 11px; color: #9ca3af; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; padding: 0 4px; }
.quick-btn { display: block; width: 100%; text-align: left; padding: 6px 8px; border-radius: 6px; border: none; background: transparent; font-size: 12px; color: #374151; cursor: pointer; margin-bottom: 2px; line-height: 1.4; transition: background 0.15s; }

.chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.brand-indicator { padding: 6px 16px; background: #f9fafb; border-bottom: 1px solid #e5e7eb; font-size: 11px; color: #6b7280; display: flex; align-items: center; gap: 6px; flex-shrink: 0; flex-wrap: wrap; }

.messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; }
.msg { max-width: 82%; padding: 10px 14px; border-radius: 12px; font-size: 13.5px; line-height: 1.7; white-space: pre-wrap; }
.msg.user { align-self: flex-end; background: #6366f1; color: #fff; border-bottom-right-radius: 4px; }
.msg.assistant { align-self: flex-start; background: #fff; border: 1px solid #e5e7eb; border-bottom-left-radius: 4px; color: #111; }
.msg.sys { align-self: center; background: #f9fafb; border: 1px dashed #e5e7eb; color: #9ca3af; font-size: 11px; padding: 5px 12px; border-radius: 16px; max-width: 92%; text-align: center; }

.risk-badge { display: inline-block; padding: 2px 7px; border-radius: 8px; font-size: 11px; font-weight: 600; margin-right: 6px; }
.risk-high { background: #fee2e2; color: #dc2626; }
.risk-mid { background: #fef3c7; color: #d97706; }
.risk-low { background: #d1fae5; color: #059669; }
.copy-btn { padding: 3px 10px; border: 1px solid #e5e7eb; border-radius: 5px; background: #fff; font-size: 11px; color: #6b7280; cursor: pointer; transition: all 0.2s; }
.copy-btn:hover { background: #f3f4f6; }
.copy-btn.copied { background: #d1fae5; color: #059669; border-color: #a7f3d0; }
.msg-wrap { align-self: flex-start; max-width: 82%; }
.msg-meta { display: flex; align-items: center; gap: 6px; margin-top: 5px; }

.input-area { padding: 12px 16px; background: #fff; border-top: 1px solid #e5e7eb; flex-shrink: 0; }
.input-row { display: flex; gap: 8px; align-items: flex-end; }
textarea { flex: 1; padding: 10px 14px; border: 1.5px solid #e5e7eb; border-radius: 10px; font-size: 13.5px; resize: none; font-family: inherit; line-height: 1.5; min-height: 44px; max-height: 140px; transition: border-color 0.2s; background: #f9fafb; }
textarea:focus { outline: none; border-color: #6366f1; background: #fff; }
.send-btn { padding: 10px 18px; background: #6366f1; color: #fff; border: none; border-radius: 10px; font-size: 13.5px; font-weight: 600; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
.send-btn:hover { background: #4f46e5; }
.send-btn:disabled { background: #c7d2fe; cursor: not-allowed; }

.loading { display: flex; gap: 4px; align-items: center; padding: 12px 14px; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: #6366f1; animation: bounce 1.2s infinite; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,100%{transform:translateY(0);opacity:.5} 50%{transform:translateY(-5px);opacity:1} }
.empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #9ca3af; gap: 6px; }
.empty-icon { font-size: 40px; }
.no-select-warning { background: #fef3c7; border: 1px solid #fde68a; color: #92400e; font-size: 12px; padding: 6px 14px; border-radius: 8px; text-align: center; margin: 8px 16px 0; flex-shrink: 0; display: none; }
</style>
</head>

<script>

**\n**風險等級：低**\n**Q：** 中午食用孅孅凍還適合飲用酵素+玫瑰孅孅飲嗎？\n**A：** 您好～可以喔😊 如果中午有食用孅孅凍，酵素和玫瑰孅孅飲仍然可以搭配補充。比較建議的方式是：✔ 早上空腹：咕嚕咕嚕超纖酵素 1包 ✔ 中午飯前：孅孅凍 1包 ✔ 晚餐前或晚上：玫瑰孅孅飲 1包。這樣分開時段食用，身體較容易適應，也能避免一次攝取太多膳食纖維造成腸胃負擔😊 另外記得多補充水分，建議每天至少2000cc以上，效果會更好喔～提供給您參考😊\n\n### FAQ149｜超纖酵素、孅孅凍（甲狀腺藥物）\n**問題分類：疾病/用藥**\n**風險等級：高｜需轉人工確認**\n**Q：** 原本睡前吃酵素，現在睡前有孅孅凍要吃，早上空腹要吃甲狀腺的藥物，酵素要在什麼時候吃比較好？\n**A：** 您好～這邊幫您說明一下😊 因為您早上空腹需要服用甲狀腺藥物，建議還是以藥物服用為優先喔！酵素則可以改成：✔ 早餐後30分鐘～1小時，或 ✔ 午餐前30分鐘左右，與甲狀腺藥物錯開會比較理想😊 另外孅孅凍維持晚上食用即可，不需要刻意跟酵素同時吃。若醫師有特別交代甲狀腺藥物與其他食品或保健品需間隔多久，建議依照醫師指示為主喔～提供給您參考😊\n\n### FAQ150｜超纖酵素、玫瑰孅孅飲、康普茶、丟丟茶\n**問題分類：食用/使用方式**\n**風險等級：低**\n**Q：** 每天泡丟丟茶，中午康普茶跟丟丟茶一起喝，中午用康普茶泡酵素和玫瑰孅孅飲一起喝，喝了一陣子瘦了2公斤就定格，吃多一點體重又胖回來，要如何改善？\n**A：** 您好～感謝您這麼詳細分享😊 這邊幫您看了一下目前的搭配方式，有幾個地方或許可以微調看看👇 👉 關於酵素和孅孅飲的沖泡方式：✔ 酵素和孅孅飲建議用常溫水分開沖泡飲用 ✔ 這樣各產品的效果會更穩定😊 👉 建議調整搭配時段：✔ 早上空腹：酵素 1包 ✔ 午餐前：玫瑰孅孅飲 1包 ✔ 下午茶：康普茶 1包 ✔ 晚餐前：丟丟茶 1包。分開時段通常身體感受會更穩定😊 💡 關於停滯期：👉 身體適應同樣搭配一段時間後，有時會進入停滯期，這是很常見的現象 👉 調整搭配方式後，再持續觀察2～3週，通常會有新的變化😊 👉 我們的產品主要是幫助腸道調整與日常代謝，搭配均衡飲食和適度運動，整體效果會更明顯😊 👉 全天水分維持2000cc以上，纖維類產品一定要多喝水。提供給您參考～\n\n### FAQ151｜超纖酵素、玫瑰孅孅飲、苦瓜胜肽菌絲膠囊\n**問題分類：食用/使用方式**\n**風險等級：低**\n**Q：** 早上空腹吃酵素1包、中餐前孅孅飲1包飯後苦瓜胜肽1顆、晚餐前孅孅飲1包飯後苦瓜胜肽1顆、最後再酵素1包，沒瘦還更胖，怎麼改善？\n**A：** 您好～感謝您這麼詳細分享😊 這邊幫您看了一下目前的搭配方式，有幾個地方或許可以微調看看👇 👉 關於酵素的食用時機：✔ 酵素早上空腹1包很好，但晚上睡前的1包可以拿掉 ✔ 建議一天1包就好，早上空腹食用幫助腸道啟動即可。👉 關於孅孅飲：✔ 中餐前＋晚餐前各1包，膳食纖維量偏高 ✔ 建議先從一天1包開始，讓身體慢慢適應後再評估 ✔ 孅孅飲搭配苦瓜胜肽是OK的，這部分不需要調整。👉 關於體重變化：✔ 膳食纖維攝取量突然增加，腸胃適應期間有時會有脹氣或水分滯留的狀況，這可能是短期體重波動的原因之一 ✔ 建議先減量、多喝水，讓身體慢慢適應。💡 補充說明：👉 我們的產品主要是幫助腸道調整與日常代謝，搭配均衡飲食和適度運動，整體效果會更明顯😊 👉 全天水分至少2000cc以上，纖維類產品一定要多喝水 👉 調整後持續觀察2～3週，通常會慢慢有感。提供給您參考～\n\n### FAQ152｜超纖酵素\n**問題分類：不良反應/副作用**\n**風險等級：低**\n**Q：** 收到商品就開始使用，基本一包，水一天3000cc以上，沒吃宵夜，喝無糖飲料，單獨喝酵素，但沒有感覺到效果？\n**A：** 感謝您補充說明😊 看起來您在水分補充與日常飲食方面其實都維持得不錯，酵素也有持續補充。酵素主要是幫助日常調整與維持順暢，不同的人感受也會有所差異。若已經持續補充一段時間，目前沒有感受到明顯變化，建議可以搭配其他產品一起使用，例如孅孅飲、孅孅凍或康普茶等，透過不同方向的搭配來進行日常管理。另外除了體重之外，也可以一起觀察：✔ 排便是否較順暢 ✔ 飽足感是否有提升 ✔ 腰圍或衣褲鬆緊度是否有變化。有些時候身體的調整會先反映在生活感受與體態變化上，而不一定立即呈現在體重數字上😊 提供給您參考喔～\n\n### FAQ153｜蜂王乳全能卸妝淨顏霜、皇家胺基酸保濕洗顏蜜、維他命C美白奈米粉\n**問題分類：食用/使用方式**\n**風險等級：低**\n**Q：** 蜂王乳全能卸妝淨顏霜、皇家胺基酸保濕洗顏蜜、維他命C美白奈米粉要怎麼使用？還有自己的膠原蛋白面膜。\n**A：** 您好～這邊幫您說明一下使用順序😊 👉 Step 1：卸妝 ✔ 蜂王乳全能卸妝淨顏霜：乾臉取適量，均勻塗抹全臉，畫圈按摩至乳化後，以清水洗淨。👉 Step 2：潔顏 ✔ 皇家胺基酸保濕洗顏蜜：取適量於手掌加少量水，按摩方式洗臉後以清水洗淨。👉 Step 3：面膜 ✔ 膠原蛋白面膜（您自備的）：敷臉15～20分鐘後取下，不需沖洗。👉 Step 4：保養精華 ✔ 維他命C美白奈米粉：可加入化妝水、精華液或乳霜中混合使用，均勻塗抹全臉至吸收即可。⚠️ 小提醒：✔ 奈米C粉建議晚上使用為主，白天使用需做好防曬 ✔ 若有發紅或過敏反應，請停止使用並諮詢皮膚科醫師。提供給您參考😊\n\n### FAQ154｜藍銅保濕養膚水\n**問題分類：產品外觀/品質**\n**風險等級：低**\n**Q：** 藍銅保濕養膚水上面有白色浮層，是正常的嗎？\n**A：** 您好～感謝您提供照片😊 從照片看起來，白色部分較像是成分經過靜置後產生的自然聚集現象。藍銅保濕養膚水因含有多種保養成分，在長時間靜置或溫度變化下，偶爾可能出現些微分層或成分聚集的情況。建議您可以先輕輕搖晃均勻後再使用看看😊 若沒有異味、明顯變色或其他異常情況，這類成分聚集現象一般不影響正常使用喔～提供給您參考😊\n\n### FAQ155｜璀璨藍銅彈潤精華液、美國專利黃金膠原蛋白凝膠\n**問題分類：產品搭配**\n**風險等級：低**\n**Q：** 璀璨藍銅彈潤精華液可以搭配美國專利黃金膠原蛋白凝膠一起用嗎？怎麼用？\n**A：** 您好～可以搭配使用喔😊 璀璨藍銅彈潤精華液與美國專利黃金膠原蛋白凝膠的產品屬性不同，可以一起作為日常保養使用。👉 建議使用順序：✔ 洗臉後 1️⃣ 化妝水 2️⃣ 璀璨藍銅彈潤精華液 3️⃣ 美國專利黃金膠原蛋白凝膠 4️⃣ 乳霜（如有使用）。由於藍銅精華液質地較輕盈，建議先使用；黃金膠原蛋白凝膠則可於後續加強保濕與彈潤保養。💡 建議順序邏輯：👉 一般由質地較輕薄的先用、較濃稠的後用，較能幫助產品均勻吸收😊 早晚皆可使用，並可依個人膚況調整用量喔😊 提供給您參考～\n\n### FAQ156｜飽包（可可/奶茶/香蕉）\n**問題分類：食用/使用方式**\n**風險等級：低**\n**Q：** 飽包13歲可以吃嗎？\n**A：** 可以喔！飽包建議12歲以上食用，13歲沒問題😊 不過有幾點小提醒：✔ 以正常均衡飲食為主，飽包作為輔助補充 ✔ 不要用來取代正餐 ✔ 飽包含有大豆、牛奶、堅果、麩質，若有過敏體質請先確認成分。提供給您參考😊\n\n### FAQ157｜飽包（可可/奶茶/香蕉）\n**問題分類：疾病/用藥**\n**風險等級：低**\n**Q：** 請問飽包為什麼要跟藥物間隔兩小時？\n**A：** 您好～😊 建議飽包與藥物間隔約2小時，主要是因為飽包含有膳食纖維、蛋白質、維生素及礦物質等營養成分，部分藥物若同時食用，可能會影響吸收效率。因此一般會建議：✔ 先服用藥物，再間隔約2小時後食用飽包，或 ✔ 先食用飽包，再間隔約2小時後服用藥物。讓藥物與營養補充品都能有較好的吸收空間😊 若您有固定服用慢性病藥物、甲狀腺藥物或其他特殊藥物，也建議依照醫師或藥師指示為主喔～提供給您參考😊\n\n### FAQ158｜明守對策\n**問題分類：特殊族群**\n**風險等級：中**\n**Q：** 明守對策11歲小孩能吃嗎？\n**A：** 您好～😊 明守對策目前是以成人日常保養需求設計的產品，包含葉黃素、DHA藻油、亞麻仁油、鋅、硒、維生素E等成分。11歲兒童因仍處於生長發育階段，營養需求與成人不同，因此目前不建議自行補充成人劑量的明守對策。若有視力保養需求，建議可先從均衡飲食、充足睡眠及適當用眼習慣開始調整；若希望補充相關營養素，建議先諮詢兒科醫師或專業醫事人員評估後再食用較為合適喔😊 提供給您參考～\n\n### FAQ159｜超纖酵素、孅孅凍\n**問題分類：成分詢問**\n**風險等級：低**\n**Q：** 酵素跟孅孅凍有抑制食慾的功效嗎？\n**A：** 您好～😊 酵素與孅孅凍本身並非以抑制食慾為主要訴求的產品喔。其中孅孅凍含有膳食纖維成分，搭配足夠水分食用後，有些人會覺得較有飽足感，因此在飲食管理上較容易控制食量。酵素則主要作為日常保養與調整使用，不同體質的感受也會有所差異。建議依照產品建議方式食用，並搭配均衡飲食及充足水分補充，較能幫助日常飲食管理😊 提供給您參考～\n\n### FAQ160｜孅孅凍、超纖酵素\n**問題分類：食用/使用方式**\n**風險等級：低**\n**Q：** 孅孅凍除了睡前吃，大餐後也可以吃一包嗎？還是吃咕嚕咕嚕超纖酵素？\n**A：** 可以喔😊 大餐後兩款都可以選擇，這邊幫您說明一下各自的方向：👉 孅孅凍：✔ 含膳食纖維，大餐後食用有助於腸胃調整 ✔ 記得搭配足量水分。👉 咕嚕咕嚕超纖酵素：✔ 含多種酵素成分，大餐後補充較符合產品設計方向 ✔ 許多消費者會選擇在聚餐或大餐後補充。👉 如果只能選一個：大餐後建議優先選酵素，方向更直接；孅孅凍維持睡前習慣即可。當然兩款一起搭配也沒問題，間隔30分鐘以上😊 提供給您參考～\n\n### FAQ161｜膠妍粉、Clean Coffee\n**問題分類：產品搭配**\n**風險等級：低**\n**Q：** 吃完膠原粉能馬上喝Clean Coffee嗎？\n**A：** 可以喔😊 膠妍粉（膠原蛋白粉）與 Clean Coffee 可以搭配使用。若想讓兩款產品分開補充，也可以間隔15～30分鐘左右再飲用，會比較理想😊 提供給您參考～\n\n### FAQ162｜橙長鈣（樹飛雪）\n**問題分類：特殊族群**\n**風險等級：低**\n**Q：** 橙長鈣最小幾歲可以吃？\n**A：** 橙長鈣屬於營養補充品，一般建議1歲以上兒童即可補充。由於1歲前的寶寶仍以母乳、配方奶及副食品為主要營養來源，因此未滿1歲的寶寶，建議先諮詢兒科醫師後再補充較為合適。若已滿1歲，則可依照建議量補充喔😊 提供給您參考～\n\n### FAQ162｜橙長鈣（樹飛雪）\n**問題分類：特殊族群**\n**風險等級：低**\n**Q：** 橙長鈣最小幾歲可以吃？\n**A：** 橙長鈣屬於營養補充品，一般建議1歲以上兒童即可補充。由於1歲前的寶寶仍以母乳、配方奶及副食品為主要營養來源，因此未滿1歲的寶寶，建議先諮詢兒科醫師後再補充較為合適。若已滿1歲，則可依照建議量補充喔😊 提供給您參考～\n\n### FAQ163｜大激賞 元氣紅潤膠囊\n**問題分類：成分詢問**\n**風險等級：低**\n**Q：** 大激賞元氣紅潤膠囊素食可以吃嗎？\n**A：** 元氣紅潤膠囊的膠囊殼成分含有明膠（動物來源），所以不是全素喔！蛋奶素或一般素食者需要注意這點，建議確認自己的素食類型後再決定是否食用😊\n\n### FAQ164｜Clean Coffee\n**問題分類：不良反應/副作用**\n**風險等級：高｜需轉人工確認**\n**Q：** 第一次喝Clean Coffee（加400ml豆漿），昨天感覺有些奇怪，今天喝了之後明顯心跳加速，正常嗎？\n**A：** 您好～😊 若平常沒有喝咖啡、茶或其他含咖啡因飲品的習慣，第一次飲用Clean Coffee後出現心跳加快、精神較亢奮或感覺怪怪的情況，是有可能發生的喔。因為Clean Coffee每包含有咖啡因成分，對於平常較少接觸咖啡因的人來說，身體感受通常會比較明顯。建議您可以先嘗試：✔ 先從半包開始飲用 ✔ 早上或白天飲用為主 ✔ 避免空腹飲用 ✔ 暫時避免同時飲用其他含咖啡因飲品。若減量後狀況改善，通常代表是對咖啡因較敏感所造成的反應😊 不過如果心悸、胸悶、不舒服的情況持續，或症狀較明顯，建議先停止飲用，並諮詢專業醫師評估喔\n\n### FAQ165｜Diu+系列、孅孅凍、樹飛雪納豆Q10\n**問題分類：疾病/用藥**\n**風險等級：高｜需轉人工確認**\n**Q：** Diu+系列產品是否有添加會誘發子宮肌瘤或纖維囊腫的成分？孅孅凍有輕瀉成分嗎？樹飛雪納豆可以吃嗎？\n**A：** 您好～😊 關於您擔心的子宮肌瘤、乳房纖維囊腫以及代謝產品補充的問題，這邊幫您說明一下。目前 Diu+ 系列產品（包含孅孅飲、孅孅凍、咕嚕咕嚕超纖酵素、康普茶、丟丟茶、Clean Coffee 等）配方中，並未添加大豆異黃酮、蜂王乳（食用）、胎盤素等較常被討論與女性荷爾蒙相關的成分。因此從產品配方來看，並沒有特別以荷爾蒙調節為設計方向。至於孅孅凍，配方中含有決明子萃取物、蘆薈萃取物、羊角豆萃取物及多種膳食纖維來源，因此部分消費者食用後可能會感受到排便較順暢，這屬於產品特性的一部分。建議依照每日建議量補充即可，並維持均衡飲食及充足水分攝取，讓腸道維持自然的調整節奏😊 另外許多人也會擔心長期補充酵素、纖維或代謝類產品是否會產生依賴性，目前這類產品主要是透過膳食纖維、酵素、益生質等營養成分作為日常補充，並非透過藥物機制作用。至於樹飛雪納豆Q10，產品含有納豆激酶成分，若正在服用抗凝血藥物、準備接受手術，或有特殊疾病治療需求者，建議先諮詢醫師後再食用會較為合適。這部分主要是考量納豆激酶與凝血機制相關，而非與子宮肌瘤或乳房纖維囊腫有直接關聯。當然，每個人的身體狀況不同，若本身已有子宮肌瘤、乳房纖維囊腫或其他婦科疾病，也建議將產品成分提供給主治醫師評估，並依照醫師建議補充會較安心😊 提供給您參考～\n\n---\n\n### FAQ166｜孅孅凍\n**問題分類：不良反應/副作用**\n**風險等級：中**\n**Q：** 吃孅孅凍肚子疼痛，會悶痛一天，是正常的嗎？\n**A：** 您好～這邊幫您說明一下😊 孅孅凍的成分中含有決明子萃取物、蘆薈萃取物及多種膳食纖維，部分體質較敏感的消費者在初次食用後，可能會感受到腸胃蠕動加快、輕微腹脹或腸道不適的反應。不過悶痛持續一整天的話，建議您：✔ 先暫停食用，讓腸胃休息一下 ✔ 補充足夠水分（每日2000cc以上）✔ 若狀況在停用後1～2天內緩解，之後若想再次補充，可先改為隔天1包或減少食用頻率觀察看看😊 另外，若本身有正在追蹤中的腸胃疾病、腸胃較敏感，或有長期服用藥物的情況，也建議先暫停使用並與主治醫師確認後再補充會較安心喔😊 若停用後仍持續不適或疼痛加劇，也建議盡快就醫評估，確認身體狀況會較安心。提供給您參考～\n\n**需要轉人工**\n- 腹痛持續超過2天\n- 本身有腸胃疾病病史\n- 出現血便、嘔吐或發燒\n\n---\n\n### FAQ167｜多產品搭配\n**問題分類：食用/使用方式**\n**風險等級：低**\n**Q：** 像酵素、咖啡、飽包這類產品，是每樣都要間隔嗎？還是只有特定某些產品需要？\n**A：** 不一定每一種產品都需要特別間隔喔！😊 大部分產品（例如康普茶、丟丟茶、孅孅凍、膠妍粉等）成分之間沒有明顯衝突，原則上都可以依照建議時段搭配補充。比較建議間隔食用的情況，通常是：✔ 飽包與藥物：飽包含有蛋白質、膳食纖維及多種營養素，建議與藥物間隔約2小時，避免影響藥物吸收。✔ 甲狀腺藥物與保健食品：建議與酵素、孅孅飲、飽包等產品間隔至少2小時以上。✔ Clean Coffee 與膠妍粉：雖然可以一起使用，但若希望兩者都有較好的吸收空間，建議間隔15～30分鐘會更理想😊 一般來說，不需要把每樣產品都刻意錯開，只要依照建議的食用時段補充即可喔～提供給您參考～\n\n---\n\n### FAQ168｜樹飛雪精油（兒童使用）\n**問題分類：特殊族群**\n**風險等級：中**\n**Q：** 請問排水精油和補氣精油小孩可以用嗎？\n**A：** 您好～這邊幫您說明一下😊 樹飛雪精油系列（包含排水精油、補氣精油）依產品注意事項，一般標示為「嬰幼兒不適用」，部分滾珠精油系列則建議「12歲以上兒童或成人」使用。建議您確認手邊產品包裝上的注意事項，確認適用年齡後再使用。若小朋友年齡未滿12歲，或有特殊體質、皮膚敏感的情況，建議先諮詢小兒科醫師或皮膚科醫師評估後再使用，以確保安全😊 提供給您參考～\n\n**需要轉人工**\n- 嬰幼兒使用後出現皮膚紅疹、過敏等不適反應\n\n---\n\n### FAQ169｜多產品搭配（便秘無改善）\n**問題分類：不良反應/副作用、食用/使用方式**\n**風險等級：中**\n**Q：** 原本便秘就很嚴重，買了產品喝了兩個禮拜，還是沒有正常排便，兩週大概只有上三次，該怎麼改變喝法？\n**A：** 您好～謝謝您這麼詳細分享使用狀況😊 因為本身就有較嚴重的便秘困擾，腸道調整通常會需要比較長的時間，除了產品補充外，也建議同步留意以下幾個方向：✔ 每日飲水量：建議一天至少2000～3000cc，水分不足對於較嚴重便秘體質來說影響很大 ✔ 飲食內容：建議留意蔬菜、水果及蛋白質是否足夠，長期纖維或水分不足也可能影響排便 ✔ 生活作息與活動量：規律運動、充足睡眠及固定排便習慣，都會影響腸道蠕動。若方便的話，也想了解您目前一天大約喝多少水、飲食內容以及平常是否有運動習慣，我們再幫您看看是否有更適合調整的方向😊 若長期便秘一直沒有改善，或伴隨腹痛、腹脹等不適，也建議進一步諮詢專業醫師評估會較安心喔～\n\n**需要轉人工**\n- 使用超過2週完全無排便改善\n- 伴隨腹痛、腹脹等明顯不適\n- 客人情緒明顯不滿或要求退貨\n\n---\n\n### FAQ170｜多產品搭配（一天兩餐作息調整）\n**問題分類：食用/使用方式**\n**風險等級：低**\n**Q：** 客人只吃兩餐，建議的搭配方式要怎麼調整？\n**A：** 您好～😊 如果目前一天習慣吃兩餐的話，可以依照起床及用餐時間調整，不一定要完全照早餐、中餐、晚餐的時間安排喔！建議可以這樣搭配：✔ 起床後：咕嚕咕嚕超纖酵素1包，間隔10分鐘後飽包1包，再間隔20～30分鐘後吃第一餐 ✔ 第一餐前：玫瑰孅孅飲1包 ✔ 第二餐前：玫瑰孅孅飲1包、康普茶1包（餐前或餐後皆可）✔ 睡前：孅孅凍1條 ✔ 丟丟茶：全天分次飲用即可，建議搭配足夠水分補充。💡 由於一天只有兩餐，建議每餐都要有足夠蛋白質（豆魚蛋肉類），避免因為進食次數較少，反而讓蛋白質攝取不足，影響身體代謝與調整喔😊 提供給您參考～\n\n---\n\n### FAQ171｜奈米C粉（孕婦／兒童使用）\n**問題分類：特殊族群**\n**風險等級：低**\n**Q：** 請問Diu+ 維他命C美白奈米粉孕婦可以使用嗎？小朋友幾歲可以使用？\n**A：** 您好～😊\nDiu+ 維他命C美白奈米粉為外用保養品，目前產品並無孕婦禁用標示，若孕期膚況穩定，一般可依正常保養方式使用。不過因每個人體質及孕期狀況不同，建議可先於局部肌膚少量測試，確認無不適反應後再使用會較安心😊\n至於小朋友使用方面，因兒童肌膚較成人嬌嫩敏感，建議由家長評估膚況後少量使用，並先於局部肌膚測試，確認無不適反應後再正常使用。\n使用時請避免接觸眼睛及黏膜部位；若為學齡前幼童、敏感性肌膚或有特殊皮膚狀況者，建議先諮詢醫師評估喔😊\n提供給您參考～\n\n---\n\n### FAQ172｜酵素＋纖纖飲（吃了反胖＋便秘／水分不足）\n**問題分類：不良反應/副作用、食用/使用方式**\n**風險等級：中**\n**Q：** 吃超纖酵素和玫瑰纖纖飲快一個禮拜都沒有效果，結果反而胖起來，而且還便秘。\n**A：** 您好～😊\n感謝您提供資訊。\n酵素及纖纖飲中的膳食纖維成分，需要搭配足夠水分一起補充，才能幫助腸道順暢調整。若目前一天飲水量約為2～3瓶小瓶礦泉水，建議可先將每日飲水量提高至2000cc以上，並持續補充及觀察1～2週看看😊\n另外，每個人的體質、飲食習慣及生活作息不同，對產品的感受時間也會有所差異。除了水分補充外，蔬菜、水果及日常活動量也都會影響排便狀況。\n以上提供給您參考～\n\n**需要轉人工**\n- 客人明確要求退貨\n- 使用超過2週仍無改善且情緒不滿\n\n---\n\n### FAQ173｜苦瓜胜肽菌絲膠囊（糖尿病族群食用方式）\n**問題分類：特殊族群、食用/使用方式**\n**風險等級：中**\n**Q：** 請問一下有糖尿病的一天要吃幾顆？要怎麼吃？\n**A：** 您好～😊\n苦瓜胜肽菌絲膠囊建議每日1顆，餐前食用😊\n產品標示為每日一次、每次1顆，多食無益，不建議自行增加食用量。\n若目前有糖尿病、正在服用降血糖藥物或定期追蹤中，建議先與主治醫師確認後再補充會較安心喔🙏\n提供給您參考～\n\n**需要轉人工**\n- 正在使用胰島素或多種降血糖藥物\n- 血糖控制不穩定者\n\n---\n\n### FAQ174｜丟丟茶（兒童使用）\n**問題分類：特殊族群**\n**風險等級：中**\n**Q：** 請問丟丟茶小孩可以喝嗎？7跟11歲\n**A：** 您好～😊\n丟丟茶因含有多種體態管理相關成分，產品注意事項中標示「孕婦、幼兒及生長發育期青少年不宜食用」。\n因此7歲及11歲的小朋友目前都不建議飲用喔😊\n成長中的孩子建議以均衡飲食、規律作息及充足運動為主，會比較適合。\n提供給您參考～\n\n**需要轉人工**\n- 兒童飲用後出現不適反應\n\n---\n\n### FAQ175｜雙艙守宮飲（經期使用）\n**問題分類：特殊族群、食用/使用方式**\n**風險等級：中**\n**Q：** 經期可以喝雙艙守宮飲嗎？\n**A：** 您好～😊\n雙艙守宮飲下艙飲品於經期期間一般可以補充。\n不過上艙暖宮膠囊含有丹參、益母草、當歸、川芎等漢方成分，產品注意事項中也提醒經期中建議先諮詢醫師或專業人士後再食用。\n因個人體質不同，補充後可能影響經血量或經期狀況，因此若經期期間有顧慮，建議可先暫停上艙膠囊，單獨補充下艙守宮飲即可😊\n提供給您參考～\n\n**需要轉人工**\n- 凝血功能異常或服用抗凝血藥物者\n- 經期中食用後出現明顯不適\n\n---\n\n### FAQ176｜雙艙守宮飲、雙艙仙女飲、樹飛雪元氣紅潤膠囊（食用時機）\n**問題分類：食用/使用方式**\n**風險等級：低**\n**Q：** 守宮飲、仙女飲、樹飛雪元氣紅潤膠囊都是早上吃嗎？\n**A：** 您好～😊\n三款都不一定要固定早上食用喔！\n✔ 雙艙守宮飲：白天補充即可\n✔ 雙艙仙女飲：白天補充即可，餐前餐後皆可\n✔ 樹飛雪元氣紅潤膠囊：建議餐後食用，早、午、晚餐後皆可\n若擔心一次補充太多，也可以分開時段食用😊\n提供給您參考～\n\n---\n\n### FAQ177｜樹飛雪靈芝多醣體發泡錠（兒童使用）\n**問題分類：特殊族群**\n**風險等級：低**\n**Q：** 樹飛雪靈芝多醣體發泡錠小學二年級可以吃嗎？\n**A：** 您好～😊\n樹飛雪靈芝多醣體發泡錠，4歲以上即可正常食用喔！\n因此國小二年級的小朋友可以補充😊\n若本身有特殊疾病、正在服藥或體質較敏感，建議先諮詢醫師後再食用會較安心喔。\n提供給您參考～\n\n---\n\n### FAQ178｜長期飲控運動但體重居高不下（含飲食紀錄）\n**問題分類：不良反應/副作用、食用/使用方式**\n**風險等級：低**\n**Q：** 6月開始很認真飲控，有走路跟運動，丟丟茶每天泡一包2000ml，康普茶下午1-2點喝一包，超商咖啡換成丟妹咖啡，去年開始吃酵素排便正常，但體重一直居高不下。\n**A：** 您好～感謝您這麼詳細分享飲食紀錄，真的看得出來您非常認真在執行！🙏\n看了一下您的飲食內容，蛋白質補充得很好，運動也很規律，咖啡也換成丟妹咖啡，這些都做得很到位😊\n有幾個方向或許可以微調看看：\n✔ **體重停滯很正常**：持續執行一段時間後，身體會進入適應期，體重暫時不動不代表沒有效果，建議也觀察腰圍或衣褲鬆緊度的變化😊\n✔ **飲食部分**：整體控制得不錯，偶爾出現的麵包、小籠包、粽子等澱粉類，若能再稍微減少頻率，整體效果會更穩定\n✔ **產品搭配**：目前酵素、丟丟茶、康普茶搭配方式都很正確，繼續維持即可\n我們的產品主要是幫助腸道調整與日常代謝，身體的調整有時會先反映在體態與腰圍上，而不一定立即呈現在體重數字上，請不要灰心，繼續觀察2-3週😊\n\n**需要轉人工**\n- 客人情緒明顯低落或要求退貨\n- 使用超過6個月完全無任何改變\n\n---\n\n### FAQ179｜孅孅凍（腹痛腹瀉／要求退貨）\n**問題分類：不良反應/副作用、食用/使用方式**\n**風險等級：中**\n**Q：** 可以退貨嗎？退沒開的三組。纖纖凍飯前跟睡前都試過了，但吃了三天每天都是半夜肚子痛起來拉，隔天只要有吃東西肚子又會開始絞痛。\n**A：** 您好～不好意思讓您有這樣的狀況🙏\n建議您可以先暫停食用 2～3 天，等腸胃恢復後，再改成半包、隔天一次，讓身體慢慢適應，同時記得多補充水分（建議每天 2,000c.c. 以上）。\n若調整後仍然會有腹痛或腹瀉的情況，建議先停止食用，再私訊客服，我們會依您的狀況協助您處理後續事宜，希望能幫您找到最適合的方式😊\n\n**需要轉人工**\n- 客人明確要求退貨時轉客服處理\n- 腹痛持續超過3天或伴隨發燒、血便\n- 停用後仍持續不適\n\n---\n\n### FAQ180｜長期飲控但停滯期（含藥物搭配、蛋白質不足）\n**問題分類：不良反應/副作用、食用/使用方式、特殊族群**\n**風險等級：中**\n**Q：** 早上空腹吃酵素，之後吃血壓藥，中午吃纖纖凍喝丟丟茶，晚上吃酵素再吃晚餐，5/25到現在才瘦3公斤，後來都沒有再瘦，為什麼？\n**A：** 您好～感謝您這麼詳細分享使用狀況，看得出來您真的非常認真執行！🙏\n能成功瘦 3 公斤已經很棒了😊 其實減重過程中，進入停滯期是很常見的現象，因為身體逐漸適應目前的飲食與生活型態，體重可能會暫時放慢下降速度，但不代表沒有持續調整中。\n這邊幫您看了一下，有幾個方向可以微調看看：\n✔ 酵素與藥物建議錯開食用：由於您有固定服用血壓藥，建議酵素與藥物間隔約 2 小時以上，讓保健食品與藥物分開補充，也會比較安心😊\n✔ 蛋白質可再增加一些：目前早餐有 2 顆茶葉蛋、晚餐有肉或魚，但中午只有孅孅凍，建議中午可再搭配一些蛋白質來源，例如雞胸肉、豆腐、水煮蛋或無糖豆漿，有助於維持肌肉量，並支持正常代謝。\n✔ 晚上酵素可維持於晚餐前約 30 分鐘食用：若目前食用後很快就吃晚餐，可以稍微拉開一些時間，依照建議方式食用即可。\n✔ 飲食不用刻意吃得太少：若長時間熱量攝取過低，身體也可能逐漸適應目前的飲食模式，使代謝速度放慢。建議維持均衡飲食，搭配足夠蛋白質、蔬菜及適量的優質澱粉，整體效果會更理想。\n✔ 記得補充足夠水分：建議每天至少補充 2,000 c.c. 以上的水分，有助於維持身體正常代謝及腸道順暢。\n我們的產品主要是作為日常飲食與健康管理的輔助，搭配均衡飲食、充足水分及規律生活，更有助於達到理想的管理效果😊\n另外，也不用太擔心體重暫時沒有下降。有時候身體正在調整狀態，雖然體重沒有明顯變化，但腰圍、體態或衣服的鬆緊度仍可能持續改善。建議持續依照目前的方式搭配上述調整，再觀察一段時間，相信有機會看到新的變化喔！\n\n**需要轉人工**\n- 客人情緒明顯低落或要求退貨\n- 使用超過6個月完全無任何改變\n- 服用多種慢性病藥物者\n\n---\n\n### FAQ181｜Clean Coffee、飽包\n**問題分類：產品搭配**\n**風險等級：低**\n**Q：** 咖啡可以跟飽包一起泡在一起喝嗎？\n**A：** 可以的，Clean Coffee 可以和飽包一起沖泡飲用，不會影響食用😊 不過若希望有較好的口感及飲用體驗，建議還是分開沖泡後再一起飲用，會比較容易攪拌均勻，也比較不容易結塊。另外，若您是將飽包作為代餐使用，也建議依照建議份量沖泡，搭配均衡飲食，讓營養補充更完整喔！😊\n\n---\n\n### FAQ182｜孅孅飲、超纖酵素、丟丟茶（孕婦）\n**問題分類：特殊族群**\n**風險等級：高｜需轉人工確認**\n**Q：** 新版孅孅飲跟酵素還有丟丟茶孕婦可以食用嗎？\n**A：** 您好～😊 由於孕期屬於特殊生理階段，為了媽媽及寶寶的安全考量，新版孅孅飲、咕嚕咕嚕超纖酵素及丟丟茶（茶飲系列）皆不建議孕婦食用。這幾款產品主要是作為日常飲食與健康管理的輔助，部分成分與代謝調整相關，因此孕期建議避免補充，以免增加身體負擔。建議待生產及哺乳結束後，再依建議食用方式補充會較為適合。若孕期有營養補充需求，建議先諮詢婦產科醫師，由醫師依個人狀況提供適合的建議😊\n\n**需要轉人工**\n- 孕婦詢問是否可食用任何產品，均需轉人工確認\n\n---\n\n### FAQ183｜膠妍粉、Clean Coffee、丟丟茶、超纖酵素（脹氣）\n**問題分類：不良反應/副作用**\n**風險等級：低**\n**Q：** 哪一個產品吃了會脹氣肚子悶悶的？早上有吃膠原蛋白粉、咖啡、丟丟茶、酵素。\n**A：** 您好～😊 您目前有補充膠妍粉、Clean Coffee、丟丟茶及咕嚕咕嚕超纖酵素，脹氣或肚子悶悶的感覺不一定是單一產品造成的。若本身腸胃較敏感，剛開始補充時，少部分人可能會因腸胃蠕動增加或身體適應，而出現短暫的脹氣或腹部悶悶的感覺。建議您可以先調整看看：👉 酵素可先改為半包開始補充，讓腸胃慢慢適應，並依建議於空腹或餐前食用。👉 丟丟茶若目前一次喝完整包，可以試著分次慢慢飲用，觀察身體反應。👉 Clean Coffee 本身可能促進腸胃蠕動，若目前與其他產品同時補充，也可以試著錯開時段飲用。👉 膠妍粉一般較少引起脹氣，建議可維持原本的食用方式；若想進一步確認，也可以暫時與其他產品錯開時段補充，觀察身體反應。👉 記得補充足夠水分，建議每天至少 2,000 c.c. 以上，並搭配均衡飲食，有助於維持腸道順暢😊\n\n**需要轉人工**\n- 脹氣或腹部不適持續超過兩週\n- 伴隨腹痛、腹瀉或其他明顯不良反應\n\n---\n\n### FAQ184｜Clean Coffee、康普茶、孅孅飲、膠妍粉（多產品搭配）\n**問題分類：產品搭配**\n**風險等級：低**\n**Q：** 可以把咖啡、康普茶、孅孅飲、膠妍粉合在一起喝嗎？\n**A：** 這幾款產品可以搭配補充，但建議分時段飲用會比較理想😊\n🧩 建議食用方式：\n👉 早餐前／早餐時\n✔ Clean Coffee → 建議於早餐前或早餐時飲用，搭配均衡飲食更佳。\n👉 午餐前 30 分鐘\n✔ 孅孅飲 → 建議餐前 30 分鐘飲用，依建議方式補充即可。\n👉 下午或餐間\n✔ 康普茶 → 建議於下午或餐間飲用，可依個人習慣補充。\n👉 白天或晚上\n✔ 膠妍粉 → 可依個人習慣於白天或晚上補充。\n⚠️ 小提醒\n✔ 若一次將多種產品混合飲用，腸胃較敏感者可能較不適應，建議分時段補充會更理想。\n✔ 記得每天補充足夠水分。\n✔ Clean Coffee 含有咖啡因，若對咖啡因較敏感，建議避免太晚飲用，以免影響睡眠。\n💡 搭配均衡飲食、規律作息及適度運動，更有助於日常健康管理😊\n\n---\n\n### FAQ185｜大餐防守對策（閃金／閃銀）\n**問題分類：不良反應/副作用**\n**風險等級：低**\n**Q：** 閃金閃銀會有拉肚子或其他副作用嗎？\n**A：** 您好～😊 大餐防守對策（閃金／閃銀）依照建議食用方式補充，一般不會造成拉肚子等副作用。不過，每個人的體質不同，少部分腸胃較敏感的人，在剛開始食用時，可能會有排便次數增加、排便較順暢或輕微腸胃反應，通常會隨著身體逐漸適應而改善。建議您可先依照建議食用方式補充，並記得多補充水分。\n\n---\n\n### FAQ186｜雙艙仙女飲、膠妍粉、超纖酵素（糖尿病、高血壓、高血脂）\n**問題分類：特殊族群、疾病/用藥**\n**風險等級：高｜需轉人工確認**\n**Q：** 糖尿病、高血壓、高血脂可以食用仙女飲、膠妍粉、超纖酵素嗎？產品有含糖嗎？\n**A：** 您好～😊 有幫您確認，仙女飲、膠妍粉及咕嚕咕嚕超纖酵素皆非無糖產品，產品配方中有使用糖類或甜味來源，主要是作為配方及風味所需。若您有糖尿病、高血壓及高血脂等慢性病，由於每位患者的身體狀況、飲食控制及用藥情形都不同，我們不建議直接保證可以安心食用。建議先與您的主治醫師或營養師討論，確認符合目前的飲食控制後再補充，會較為安心🙏\n\n**需要轉人工**\n- 有糖尿病、高血壓、高血脂等慢性病詢問是否可食用\n- 客人堅持要求確認可以食用\n\n**標準原則（供客服參考）**\n- 面對慢性病族群詢問含糖問題，直接說明「非無糖產品」，不對代糖或甜味劑做有利或不利的個別詮釋\n- 不分產品逐一判斷含糖影響，統一建議諮詢主治醫師或營養師\n\n---\n\n### FAQ187｜孅孅凍（胃痛／腸胃不適）\n**問題分類：不良反應/副作用**\n**風險等級：中**\n**Q：** 買纖纖凍吃了第三天感覺胃很不舒服，第一天吃還不會，第二、三天胃都在痛。\n**A：** 您好～😊 不好意思讓您有這樣的狀況🙏 建議您先暫停食用，讓腸胃休息幾天。少部分腸胃較敏感的人，在剛開始補充孅孅凍時，可能會有胃部不適的情況；但如果已經出現胃痛，建議先不要繼續食用，待不適感消退後，若想再嘗試，可以改從半份開始補充，讓身體慢慢適應，同時也記得多補充水分（建議每天 2,000 c.c. 以上）。若胃部不適持續未改善，或有其他身體不適，建議儘早就醫並洽詢醫師，會較為安心喔。以上提供您參考～😊\n\n**需要轉人工**\n- 胃痛持續超過3天或停用後仍未改善\n- 伴隨嘔吐、發燒或血便等症狀\n\n---\n\n### FAQ188｜閃閃金、閃閃銀（飽足感）\n**問題分類：成分詢問**\n**風險等級：低**\n**Q：** 吃閃閃金閃閃銀肚子有飽足感算正常嗎？阻糖阻油關係對吧？\n**A：** 您好～😊 是的，有些人食用閃閃金＋閃閃銀後，會感覺比較有飽足感，這是有可能的喔！因為產品中的部分成分會協助延緩醣類及油脂的吸收，再搭配膳食纖維等成分，可能讓部分使用者在餐前或用餐時覺得比較有飽足感，因此這樣的感受是屬於正常現象。每個人的體質及感受都不太一樣，所以飽足感的程度也會有所差異😊\n\n---\n\n### FAQ189｜孅孅飲、超纖酵素（使用3個月體重無變化）\n**問題分類：不良反應/副作用、食用/使用方式**\n**風險等級：低**\n**Q：** 從4/15收到吃到現在約3個月，體重沒變，天天都有上2號，臉一樣圓，肚子少1吋，約只剩12天份。有吃餐，飯前15分鐘前就喝纖纖茶＋酵素（泡冷水喝）幾乎天天喝2-3次，還有更具體的建議嗎？\n**A：** 您好～😊 謝謝您這麼詳細分享這段時間的使用狀況！從您4月中開始持續使用到現在，雖然體重目前沒有明顯變化，但看到您分享腰圍已經減少約1吋，代表身體還是有持續在調整，有些人會先從體態開始改變，不一定會立即反映在體重上，所以除了體重之外，腰圍及整體體態的變化也是很重要的觀察指標喔！目前每天都有正常排便，也表示腸道狀況維持得不錯。建議可以留意幾個方向：👉 每餐盡量攝取足夠的蛋白質（如雞蛋、豆腐、雞肉、魚肉等），有助於增加飽足感及維持身體代謝。👉 留意是否有零食、含糖飲料、宵夜或醬料等額外熱量攝取。👉 每天補充足夠的白開水（建議約2,000 c.c.左右），不要只以茶飲取代飲水。👉 若平時活動量較少，可以每天增加20～30分鐘的步行或簡單運動。建議將纖纖茶安排在一天最容易吃多的一餐前15～30分鐘飲用；酵素依照建議方式補充即可，不一定增加食用次數效果就會更快。以上提供您參考😊\n\n**需要轉人工**\n- 客人情緒明顯低落或要求退貨\n- 使用超過6個月完全無任何改變\n- 服用多種慢性病藥物者\n\n---\n\n### FAQ190｜閃閃銀（阻糖是否包含水果糖分）\n**問題分類：成分詢問**\n**風險等級：低**\n**Q：** 閃閃銀膠囊的效果是阻糖、促進新陳代謝，裡面的阻糖是有含水果的糖份嗎？\n**A：** 您好～😊 閃閃銀膠囊所說的「阻糖」，主要是指協助減少飲食中澱粉類及糖分的吸收，並不是只針對水果中的糖分喔！😊\n\n---\n\n### FAQ191｜丟丟茶金麥（有紅酒成分嗎）\n**問題分類：成分詢問**\n**風險等級：低**\n**Q：** 請問丟丟茶金麥口味裡面有紅酒的成分嗎？\n**A：** 金麥口味主要為蕎麥、南非國寶綠茶、鳳梨酵素、毛喉鞘蕊花萃取、四稜白粉藤萃取、柑橘萃取、仙人掌及玉米鬚等成分，不含紅酒相關成分喔😊\n\n---\n\n### FAQ192｜康普茶熱帶水果（芒果過敏）\n**問題分類：成分詢問、特殊族群**\n**風險等級：中**\n**Q：** 請問熱帶水果裡面的成分有含芒果嗎？客人說家人喝就過敏。\n**A：** 您好，幫您確認過配方，熱帶水果口味本身沒有添加芒果成分。其中使用的熱帶水果果汁粉，主要來源為百香果濃縮汁及鳳梨濃縮汁，配方中並未添加芒果。由於過敏反應的原因有時較不容易立即確認，若方便的話，也可以再留意看看是否還有其他可能影響的因素。若目前仍有過敏或身體不適的情況，建議先暫停食用，也祝家人早日恢復健康😊\n\n**需要轉人工**\n- 過敏症狀明顯或持續未改善\n- 出現呼吸困難、嚴重皮膚反應等\n\n---\n\n### FAQ193｜雙艙仙女飲（飲用後咳嗽）\n**問題分類：不良反應/副作用**\n**風險等級：中｜需轉人工確認**\n**Q：** 已飲用雙艙仙女飲1瓶後表示生理不適，半夜一直咳嗽咳不停。\n**A：** 您好～😊 雙艙仙女飲主要是補充膠原蛋白、維生素C及穀胱甘肽等營養成分，一般並不會有咳嗽的常見反應。不過每個人的體質及當下身體狀況不同，也可能因其他因素出現不同的身體反應。建議您先暫停食用幾天，觀察身體狀況是否恢復正常。待身體狀況穩定後，若您希望再嘗試補充，可以先從較少的量開始，觀察身體是否能適應，再依情況逐步恢復至建議食用量。以上提供您參考喔😊\n\n**需要轉人工**\n- 咳嗽症狀持續超過2天未改善\n- 伴隨呼吸困難、喉嚨腫脹等症狀\n- 客人要求退貨\n\n---\n\n### FAQ194｜丟丟茶（含蔗糖素但營養標示糖分為0）\n**問題分類：成分詢問**\n**風險等級：低**\n**Q：** 丟丟茶裡面有蔗糖素，為何糖成份表是0？\n**A：** 蔗糖素是代糖，所以含糖量才顯示為零。代糖只有添加零點多mg，趨近於零，因此在營養標示上糖分會標示為0喔😊\n", "sopKB": "# Diu+ 客訴SOP庫 v2.0\n最後更新：2026年6月\n\n---\n\n## SOP001｜吃很久沒瘦\n\n**客戶常見說法**\n- 吃了3個月都沒瘦\n- 喝半年都沒效果\n- 體重完全沒變\n- 怎麼吃都沒感覺\n\n**回覆原則**\n- 先肯定客戶努力\n- 不直接否定客戶做法\n- 不保證效果\n- 提供可調整方向\n\n**標準回覆**\n感謝您這麼詳細分享😊\n\n看得出來您真的非常認真執行，這部分很不容易。\n\n體重變化除了產品補充外，也和飲食內容、蛋白質攝取、肌肉量、作息及活動量有關。\n\n若長期低油、低糖、低澱粉，蛋白質攝取又不足，身體有時反而可能因肌肉量下降而影響基礎代謝。\n\n建議可以留意每日蛋白質是否足夠，並搭配規律活動及充足水分。\n\n我們的產品主要是幫助腸道調整與日常代謝管理，搭配均衡飲食及運動時，整體感受通常會更明顯😊\n\n**需要轉人工**\n- 使用超過6個月且完全無任何改變，客人情緒明顯不滿\n- 客人要求退貨\n\n**額外引導（體重無變化時）**\n除了體重，也引導客人觀察：\n✔ 排便是否較順暢\n✔ 飽足感是否有提升\n✔ 腰圍或衣褲鬆緊度是否有變化\n\n---\n\n## SOP002｜吃了反而變胖\n\n**客戶常見說法**\n- 吃了更胖\n- 體重增加\n- 腰圍變大\n\n**回覆原則**\n- 不直接否認\n- 不怪罪客戶\n- 提供觀察方向\n\n**標準回覆**\n感謝您分享目前的狀況😊\n\n剛開始補充膳食纖維、酵素或代謝相關產品時，有些人可能因腸道適應、水分滯留或飲食結構改變，而出現短期體重波動。\n\n除了體重之外，也建議一起觀察：\n✔ 排便狀況\n✔ 飽足感\n✔ 腰圍及衣褲鬆緊度\n\n有時身體的調整會先反映在體態與生活感受上，而不一定立即呈現在體重數字上😊\n\n**需要轉人工**\n- 體重短期大幅增加（超過3公斤）且同時出現身體不適\n\n---\n\n## SOP003｜拉肚子\n\n**客戶常見說法**\n- 一直跑廁所\n- 拉肚子\n- 肚子絞痛\n\n**回覆原則**\n- 確認食用產品\n- 先減量\n- 增加水分\n\n**標準回覆**\n您好～\n\n部分消費者剛開始補充酵素、孅孅飲、孅孅凍等產品時，因腸道正在適應，可能會出現排便次數增加的情況。\n\n建議可以先減量食用，並搭配充足水分（每日2000cc以上）觀察3～5天。\n\n若症狀持續或明顯不適，建議先暫停使用並諮詢專業醫療人員😊\n\n**需要轉人工**\n- 腹瀉持續超過3天\n- 出現血便或嚴重腹痛\n- 已就醫但仍持續\n\n---\n\n## SOP004｜便秘沒改善\n\n**客戶常見說法**\n- 還是便秘\n- 沒有排便\n- 沒有順暢感\n\n**回覆原則**\n- 先確認水量\n- 再確認纖維量\n- 不直接說產品無效\n\n**標準回覆**\n您好～\n\n順暢感除了產品補充外，和每日飲水量及膳食纖維攝取也有很大關係。\n\n建議每日飲水量至少2000cc以上，並搭配蔬菜水果及規律作息。\n\n有些人體質較慢熱，建議持續觀察1～2週看看😊\n\n---\n\n## SOP005｜心悸／睡不著\n\n**客戶常見說法**\n- 心跳加速\n- 胸口怪怪的\n- 喝完不舒服\n- 睡不著\n- 太亢奮\n\n**回覆原則**\n- 優先確認是否首次飲用\n- 說明咖啡因來源\n- 提供減量建議\n\n**標準回覆**\n您好～\n\nClean Coffee 含有咖啡萃取成分，每包約含150mg咖啡因。\n\n若平常較少喝咖啡、茶或能量飲料，第一次飲用可能會較明顯感受到精神提升或心跳加快。\n\n建議可以先從半包開始嘗試，或於早餐後飲用觀察身體狀況。\n\n若仍持續出現不適，建議停止食用並諮詢醫師😊\n\n**需要轉人工**\n- 心悸症狀持續或加劇\n- 本身有心臟病史\n\n---\n\n## SOP006｜產品異常（漂浮物、沉澱、變色、異味、膨脹）\n\n**客戶常見說法**\n- 上面有白白的\n- 有沉澱\n- 顏色跟之前不一樣\n- 聞起來怪怪的\n- 包裝膨脹\n\n**輕微色差、沉澱（正常現象）**\n感謝您提供照片😊\n\n從照片看起來較像是成分靜置後產生的自然聚集或分層現象。\n\n建議先輕輕搖晃均勻後再觀察看看。\n\n若沒有異味、變色或其他異常狀況，通常不影響正常使用。\n\n若方便的話，也歡迎提供更多照片讓我們協助確認😊\n\n**明顯異味、嚴重變色**\n感謝您告知，這邊需要特別確認一下😊\n\n建議先暫停食用，並提供：\n✔ 產品批號（包裝上的製造日期）\n✔ 保存方式\n✔ 照片\n\n收到後我們會盡快為您確認並處理🙏\n\n**包裝膨脹、漏液**\n感謝您告知，我們非常重視這個情況！\n\n建議先不要食用，請提供照片、批號及購買管道，我們會優先為您安排處理🙏\n\n**需要轉人工**\n- 包裝膨脹、漏液\n- 明顯異味（尤其同批號多人反映）\n- 客人食用後身體不適\n\n---\n\n## SOP007｜疾病詢問\n\n**適用情境**\n癌症、化療、腫瘤、子宮肌瘤、乳房纖維囊腫、慢性病、服藥中\n\n**回覆原則**\n先說明產品功能，再建議諮詢醫師，語氣溫和不嚇人\n\n**標準回覆**\n您好～\n\n[產品名稱]主要作為日常[功能說明]補充使用，一般健康族群是可以食用的，但：\n\n若目前有疾病治療、追蹤中或長期服藥，建議將產品成分提供給主治醫師評估，確認目前身體狀況是否適合補充，會較安心😊\n\n**高風險疾病（一律建議諮詢醫師）**\n- 糖尿病、高血壓、三高\n- 肝臟疾病、腎臟疾病\n- 心臟病、凝血功能異常\n- 腫瘤、癌症\n- 服用抗凝血藥（warfarin）\n- 服用降血糖藥、甲狀腺藥物\n\n**需要轉人工**\n- 正在服用抗凝血藥、化療藥物\n- 腫瘤患者\n- 肝腎功能不全\n\n---\n\n## SOP008｜孕婦／哺乳詢問\n\n**標準回覆**\n您好～\n\n因孕期每個人的身體狀況不同，若目前懷孕、備孕或哺乳中，建議先與婦產科醫師確認後再補充會較安心😊\n\n**孕婦絕對禁食的產品（需明確告知）**\n- 孅孅凍（含蘆薈萃取物）\n- 雙艙守宮飲（含漢方活血成分：丹參、益母草、當歸）\n- 納豆Q10膠囊\n\n**這三款的回覆**\n[產品名稱]的注意事項中有標示孕婦不宜食用，因此這段期間建議暫停使用，以媽媽和寶寶的健康為優先🙏\n\n---\n\n## SOP009｜兒童詢問\n\n**標準回覆**\n您好～\n\n不同產品建議年齡有所不同，建議提供產品名稱及小朋友年齡，我們再幫您確認最適合的補充方式😊\n\n**各產品年齡限制對照表**\n| 產品 | 建議年齡 |\n|------|---------|\n| 橙長鈣 | 1歲以上 |\n| 大餐防守對策 | 6歲以上 |\n| 閃閃金銀 | 6歲以上 |\n| 飽包 | 12歲以上 |\n| 明守對策 | 12歲以上（成人設計）|\n| 納豆Q10 | 15歲以上 |\n| 其他保健食品 | 建議諮詢兒科醫師 |\n\n---\n\n## SOP010｜產品搭配詢問\n\n**回覆原則**\n- 能一起吃先說可以\n- 再提供較佳時段\n- 不要過度強調衝突\n\n**標準回覆**\n您好～\n\n原則上可以搭配補充喔😊\n\n若希望身體感受較穩定，建議分開時段食用，例如早餐前、餐前或睡前安排不同產品即可。\n\n也記得補充足夠水分，整體感受通常會更好😊\n\n---\n\n## SOP011｜要求退貨\n\n**回覆原則**\n不在 AI 草稿裡承諾退貨，引導轉人工處理\n\n**標準回覆**\n感謝您告知，非常抱歉造成您的困擾🙏\n\n關於退換貨的部分，需要由我們的客服人員為您進一步確認和處理。\n\n可以請您提供：\n✔ 購買日期和購買管道\n✔ 手邊剩餘產品數量\n✔ 批號/製造日期\n\n我們會盡快為您安排後續處理😊\n\n**⚠️ 此類問題一律轉人工，不由 AI 決定退貨**\n\n---\n\n**特殊情況：副作用＋退貨同時出現**\n\n當客人同時反映身體不適且要求退貨時，**不要直接跳到退貨處理**，依以下順序回覆：\n\n1. **先同理不適**：關心客人身體狀況，語氣溫和\n2. **給調整建議**：建議暫停使用、減量、補充水分，說明以體質差異為由，不直接承認產品有問題\n3. **最後帶到後續**：「若仍有不適，再私訊客服，我們會依您的狀況協助後續處理」\n\n這樣的順序讓客人感覺被重視，同時保留退貨彈性空間，不直接承諾也不迴避。\n\n**範例回覆（以孅孅凍腹痛為例）**\n您好～不好意思讓您有這樣的狀況🙏\n建議您可以先暫停食用 2～3 天，等腸胃恢復後，再改成半包、隔天一次，讓身體慢慢適應，同時記得多補充水分（建議每天 2,000c.c. 以上）。\n若調整後仍然會有腹痛或腹瀉的情況，建議先停止食用，再私訊客服，我們會依您的狀況協助您處理後續事宜，希望能幫您找到最適合的方式😊\n\n---\n\n## SOP012｜產品質疑／負面輿論\n\n**適用情境**\n客人分享網路文章，質疑產品成分或安全性\n\n**回覆原則**\n- 不否定客人的疑慮\n- 根據實際成分誠實說明\n- 引導諮詢醫師\n\n**標準回覆**\n感謝您主動分享這個資訊，也謝謝您對產品成分的重視😊\n\n這邊幫您確認了[產品名稱]的成分：[根據實際成分說明]\n\n若您仍有疑慮，或本身有特殊健康狀況，建議將產品成分提供給主治醫師評估，以醫師建議為主喔😊\n\n\n---\n\n## SOP013｜胃不舒服／胃酸／胃脹氣\n\n**客戶常見說法**\n- 喝了胃怪怪的\n- 胃酸變多\n- 反胃\n- 胃脹氣\n- 胃不舒服\n\n**回覆原則**\n- 先確認食用產品與時段\n- 不直接判定產品有問題\n- 優先建議調整時段\n\n**標準回覆**\n您好～\n\n部分消費者若空腹食用酵素、康普茶、丟丟茶或 Clean Coffee，可能會因個人體質不同，而感受到胃部較敏感或胃酸增加的情況。\n\n建議可以改為餐後食用，或先從半份開始補充觀察看看😊\n\n另外也建議避免空腹搭配咖啡、濃茶或刺激性食物。\n\n若調整後仍持續不適，建議先暫停使用並諮詢醫師。\n\n**需要轉人工**\n- 胃痛持續超過3天\n- 已有胃潰瘍、胃食道逆流病史\n- 出現嘔吐或嚴重疼痛\n\n---\n\n## SOP014｜吃了沒感覺\n\n**客戶常見說法**\n- 沒感覺\n- 完全無感\n- 喝了不知道有沒有用\n- 好像沒什麼變化\n\n**回覆原則**\n- 不直接說正常\n- 先了解使用時間\n- 引導觀察其他指標\n\n**標準回覆**\n您好～\n\n每個人的體質、作息及飲食習慣不同，因此感受時間也會有所差異😊\n\n除了體重之外，也可以觀察：\n✔ 排便是否較順暢\n✔ 飽足感是否有提升\n✔ 精神狀況是否較穩定\n✔ 飲食控制是否較容易維持\n\n有些時候身體的調整會先反映在生活感受上，而不一定立即呈現在體重數字上喔😊\n\n---\n\n## SOP015｜產品一起吃會不會太多\n\n**客戶常見說法**\n- 一天吃這麼多會不會太多\n- 可以一起吃嗎\n- 會不會增加身體負擔\n- 這樣搭配有問題嗎\n\n**回覆原則**\n- 先讓客人安心\n- 再提供時段建議\n- 不強調衝突\n\n**標準回覆**\n您好～\n\n原則上依照建議量補充，多數產品是可以搭配使用的喔😊\n\n若希望身體感受較穩定，可以安排不同時段補充，例如：\n✔ 酵素：早上空腹\n✔ 孅孅飲：餐前\n✔ 康普茶或丟丟茶：白天飲用\n✔ 孅孅凍：晚餐後或睡前\n\n並搭配充足水分，通常整體感受會更好😊\n\n若有特殊疾病或長期服藥情況，再提供給我們確認即可。\n\n---\n\n## SOP016｜藥物搭配通用原則（含甲狀腺藥、血壓藥、慢性病用藥）\n\n**客戶常見說法**\n- 有在吃甲狀腺藥／血壓藥／慢性病藥\n- 保健食品可以跟藥一起吃嗎\n- 要間隔多久\n\n**回覆原則**\n- 不直接說可以一起吃\n- 說明「錯開食用」而非「影響吸收」（避免過度醫療聲稱）\n- 建議間隔2小時，語氣保守但不嚇人\n\n**標準回覆**\n您好～\n\n若有固定服用藥物，建議保健食品與藥物分開補充，間隔約2小時以上，讓兩者各自有較充裕的時間，也會比較安心😊\n\n優先依照醫師指示服藥，若有特殊治療或定期追蹤，也建議與主治醫師確認後再補充喔😊\n\n**各藥物類型補充說明**\n- 甲狀腺藥物：與酵素、孅孅飲、飽包等建議間隔2小時以上\n- 血壓藥：與酵素、保健食品建議間隔2小時以上\n- 抗凝血藥（warfarin）：需特別留意，建議諮詢醫師\n- 降血糖藥：與苦瓜胜肽等產品建議諮詢醫師\n\n**需要轉人工**\n- 甲狀腺癌患者\n- 服用抗凝血藥者\n- 剛調整藥量者\n- 多重慢性病患者\n\n---\n\n## SOP017｜使用超過半年仍完全沒效果\n\n**客戶常見說法**\n- 吃半年沒效果\n- 喝一年都沒變\n- 花很多錢都沒感覺\n- 完全沒用\n\n**回覆原則**\n- 先同理\n- 不爭辯\n- 不急著推薦產品\n\n**標準回覆**\n感謝您願意分享這段時間的使用狀況🙏\n\n也能理解持續補充一段時間後，卻沒有達到期待感受時的失落心情。\n\n由於每個人的體質、飲食內容、作息及活動量不同，身體反應確實會有差異。\n\n若方便的話，也可以提供目前的補充方式、飲食習慣及生活作息，我們再協助一起看看是否有可以調整的方向😊\n\n**需要轉人工**\n- 客人明確要求退貨\n- 情緒明顯不滿\n- 投訴產品無效\n\n---\n\n## SOP018｜體重停滯期\n\n**客戶常見說法**\n- 前面瘦2公斤就停了\n- 體重卡住\n- 瘦不下去\n- 吃多一點就胖回來\n\n**回覆原則**\n- 說明停滯期常見\n- 提供調整方向，特別強調蛋白質與熱量不能太低\n- 不直接推銷產品\n- 遇到「吃很少但沒效果」情況，引導客人注意蛋白質攝取，不要只叫客人少吃\n\n**標準回覆**\n您好～\n\n體態管理過程中，體重停滯其實是許多人都會遇到的階段😊\n\n當身體逐漸適應目前的飲食與活動模式後，體重下降速度可能會放緩。\n\n建議可以留意：\n✔ 蛋白質是否足夠：建議每餐都要有蛋白質來源（雞肉、魚、蛋、豆腐、無糖豆漿等），維持肌肉量有助於基礎代謝\n✔ 飲食不用刻意吃太少：若長時間熱量攝取過低，身體反而可能適應而放慢代謝速度，建議維持均衡飲食搭配適量優質澱粉\n✔ 水分是否充足：每天至少2000cc以上\n✔ 是否有規律活動或重量訓練\n\n有些時候體重雖然暫時沒有變化，但腰圍、體態及衣褲鬆緊度仍可能持續改善喔😊\n\n我們的產品主要是幫助腸道調整與日常代謝管理，搭配均衡飲食及適度運動時，整體感受通常會更明顯。\n", "diuHealth": "# Diu+ 品牌完整產品知識庫【最終版】\n最後更新：2026年7月\n包含：Diu+、大激賞、樹飛雪 GSH、金盞花葉黃素、葡萄糖胺、納豆Q10、元氣紅潤、閃閃金銀、大餐防守對策、雙艙系列、兒童益生菌、兒童成長鈣\n\n---\n\n最後更新：2026年7月\n\n---\n\n## 新舊版產品說明\n\n- **康普茶（熱帶水果）**：有新舊兩版。新版含芙瑪金萃＋香檬精萃，功效更全面\n- **丟丟茶（藤黃果洛神茶）**：有新舊兩版。新版含藤黃果、毛喉鞘蕊花、四棱白粉藤、柑橘HPMF™、仙人掌、玉米鬚六大共同機能成分\n- **丟丟茶（鳳梨酵素茶）**：舊款，即將停售，庫存售完為止\n- **康普茶（綠茶）、康普茶（薑檸）**：已停售，不再回覆相關問題\n\n---\n\n## Diu+ Clean Coffee \n**品牌**：Diu+\n**產品分類**：保健食品\n**劑型**：液態飲\n**規格**：15ml/包\n**保存期限**：2年\n**保存方式**：陰涼乾燥處\n**產地**：台灣\n**主要成分**：咖啡因、藤黃果、白腎豆、毛喉鞘蕊花、膳食纖維\n**全成分**：水、咖啡萃取液（水、研磨咖啡粉）、專利難消化性麥芽糊精、咖啡粉、藤黃果萃取物、關華豆膠、白腎豆萃取物、專利毛喉鞘蕊花萃取物（毛喉鞘蕊花萃取物、麥芽糊精）\n**功效訴求**：體態管理、熱量控制、代謝提升\n**建議食用量/使用方式**：每日1次，每次1包\n**食用時機**：白天或餐後；咖啡因敏感者避免晚上\n**適用族群**：外食族、愛喝咖啡族、體態管理族\n**過敏原**：無常見過敏原（純植物萃取）\n**不適用族群**：咖啡因敏感者、孕婦需評估、兒童不建議、心悸或睡眠障礙者\n**注意事項**：含咖啡因，咖啡因敏感者、心悸或失眠體質需注意。孕婦與哺乳中建議先諮詢醫師。\n**風險標籤**：咖啡因, 心悸, 失眠, 血糖, 孕婦\n**客服備註**：正式產品名稱需加 Diu+；客服可簡稱 Clean Coffee。\n\n## Diu+ 明守對策 \n**品牌**：Diu+\n**產品分類**：保健食品\n**劑型**：膠囊\n**規格**：日劑0.8g/粒；夜劑0.6g/粒\n**保存期限**：2年\n**保存方式**：25℃以下乾燥環境，避免陽光直射\n**產地**：台灣\n**主要成分**：日劑：葉黃素、南薑萃取、DHA藻油、亞麻仁油、維生素A/B群/E、鋅、硒；夜劑：山桑子、葉黃素、玻尿酸來源、α醣化橙皮苷、維生素A/E、葉酸\n**全成分**：日劑與夜劑全成分請依產品說明書原文；日劑含亞麻仁油、金盞花萃取物、DHA藻油、葡萄糖酸鋅、α醣化橙皮苷、酵母硒、維生素E let selectedCats = new Set(['diuHealth', 'faqOnly']);
let history = [];
let busy = false;

function toggleCat(cat, btn) {
  if (selectedCats.has(cat)) {
    // 至少保留一個
    if (selectedCats.size <= 1) return;
    selectedCats.delete(cat);
    btn.classList.remove('selected');
  } else {
    selectedCats.add(cat);
    btn.classList.add('selected');
  }
  updateStatus();
}

function updateStatus() {
  const labels = [...selectedCats].map(c => CAT_INFO[c].label);
  document.getElementById('selectedLabels').textContent = labels.join('、');

  // 估算 token 量
  let totalChars = KB.systemPrompt.length + KB.faqKB.length + KB.sopKB.length;
  selectedCats.forEach(cat => {
    const key = CAT_INFO[cat].kbKey;
    if (key && KB[key]) totalChars += KB[key].length;
  });

  const badge = document.getElementById('tokenBadge');
  if (totalChars < 20000) {
    badge.className = 'token-badge low'; badge.textContent = '💡 省流';
  } else if (totalChars < 40000) {
    badge.className = 'token-badge mid'; badge.textContent = '⚡ 中量';
  } else {
    badge.className = 'token-badge high'; badge.textContent = '🔥 高量';
  }
}

function buildSys() {
  let s = KB.systemPrompt + '\n\n---\n\n';
  
  selectedCats.forEach(cat => {
    const key = CAT_INFO[cat].kbKey;
    if (key && KB[key]) {
      s += '## ' + KB_TITLES[key] + '\n' + KB[key] + '\n\n';
    }
  });

  // FAQ+SOP 固定加入
  s += '## FAQ 完整庫（194筆）\n' + KB.faqKB + '\n\n';
  s += '## 客訴SOP庫\n' + KB.sopKB;
  return s;
}

  if (!txt || busy) return;

  if (selectedCats.size === 0) {
    document.getElementById('noSelectWarn').style.display = 'block';
    return;
  }
  document.getElementById('noSelectWarn').style.display = 'none';

  hideEmpty();
  addMsg('user', txt);
  inp.value = '';
  inp.style.height = 'auto';
  history.push({ role: 'user', content: txt });

  busy = true;
  document.getElementById('sendBtn').disabled = true;
  const loader = addLoader();

  try {
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 2000,
        system: buildSys(),
        messages: history
      })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const d = await res.json();
    const reply = d.content?.[0]?.text || '（無回覆）';
    removeEl(loader);
    history.push({ role: 'assistant', content: reply });
    addReply(reply);
  } catch (e) {
    removeEl(loader);
    addSys('❌ 錯誤：' + e.message);
  }
  busy = false;
  document.getElementById('sendBtn').disabled = false;
}

function addMsg(type, text) {
  const msgs = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'msg ' + type;
  d.textContent = text;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

function addReply(text) {
  const msgs = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap';
  const d = document.createElement('div');
  d.className = 'msg assistant';
  d.textContent = text;

  let badge = '';
  if (text.includes('需要轉人工') || text.includes('腫瘤') || text.includes('化療') || text.includes('腎功能不全')) {
    badge = '<span class="risk-badge risk-high">⚠️ 高風險</span>';
  } else if (text.includes('建議先諮詢醫師') || text.includes('先暫停') || text.includes('先諮詢')) {
    badge = '<span class="risk-badge risk-mid">⚡ 中風險</span>';
  } else {
    badge = '<span class="risk-badge risk-low">✅ 一般</span>';
  }

  const copyBtn = document.createElement('button');
  copyBtn.className = 'copy-btn';
  copyBtn.textContent = '📋 複製';
  copyBtn.onclick = () => {
    navigator.clipboard.writeText(text).then(() => {
      copyBtn.textContent = '✅ 已複製';
      copyBtn.classList.add('copied');
      setTimeout(() => { copyBtn.textContent = '📋 複製'; copyBtn.classList.remove('copied'); }, 2000);
    });
  };

  const meta = document.createElement('div');
  meta.className = 'msg-meta';
  meta.innerHTML = badge;
  meta.appendChild(copyBtn);
  wrap.appendChild(d);
  wrap.appendChild(meta);
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
}

function addSys(text) {
  const msgs = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'msg sys';
  d.textContent = text;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

function addLoader() {
  const msgs = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'loading';
  d.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
  return d;
}

function removeEl(el) { if (el && el.parentNode) el.parentNode.removeChild(el); }
function hideEmpty() { const e = document.getElementById('emptyState'); if (e) e.remove(); }
function clearChat() {
  history = [];
  document.getElementById('messages').innerHTML = '<div class="empty-state" id="emptyState"><div class="empty-icon">💬</div><div style="font-size:13px;color:#9ca3af">選擇產品類別（可多選），再貼上客人問題</div><div style="font-size:11px;color:#d1d5db;margin-top:3px">Enter 送出 ｜ Shift+Enter 換行</div></div>';
}
function fill(text) { const inp = document.getElementById('inp'); inp.value = text; inp.focus(); resize(inp); }
function onKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }
function resize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 140) + 'px'; }
</script>
</body>
</html>
