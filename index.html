\u8acb\u5118\u65e9\u4f7f\u7528\u5b8c\u7562\u3002\n\n## \u5f48\u6f64\u64ab\u7d0b\u4eae\u773c\u51dd\u971c 20ml\n**\u5206\u985e**\uff1a\u4fdd\u990a\u54c1 | **\u7522\u5730**\uff1a\u53f0\u7063 | **\u898f\u683c**\uff1a20ml\n**\u7522\u54c1\u7c21\u4ecb**\uff1a\u5fae\u7c73\u6c34\u51dd\u4e73\u8cea\u5730\u7684\u773c\u971c\uff0c\u5feb\u901f\u5438\u6536\uff0c\u5e6b\u52a9\u6fc0\u5347\u773c\u5468\u808c\u819a\u5f48\u6027\u3001\u64ab\u5e73\u7d30\u7d0b\uff0c\u4f7f\u773c\u5468\u8f2a\u5ed3\u7dca\u7dfb\u660e\u4eae\u67d4\u5ae9\u3002\u6838\u5fc3\u529f\u6548\uff1a\u975e\u6d32\u8056\u6a39\u62c9\u63d0\u6d3b\u8403\uff0b\u4e09\u80dc\u80bd\uff0b\u56db\u80dc\u80bd\u7dca\u7dfb\u62c9\u63d0\uff0c\u8377\u8377\u82ad\u6cb9\u4fdd\u6fd5\uff0c\u548c\u6885\u679c\u4eae\u767d\uff0c\u5c08\u5229\u6d77\u6d0b\u5be1\u80dc\u80bd\u81a0\u539f\u86cb\u767d\u63d0\u5347\u5f48\u6027\u3002\n**\u8a73\u7d30\u8aaa\u660e**\uff1a\u6dfb\u52a0\u7322\u733b\u6728\u679c\u8089\u8403\u53d6\u3001\u9280\u674f\u8403\u53d6\u3001\u843d\u5730\u751f\u6839\u8449\u8403\u53d6\u3001\u73bb\u5c3f\u9178\u9209\u3001\u6c34\u89e3\u81a0\u539f\u86cb\u767d\u3001\u5496\u5561\u56e0\u3001\u6c34\u89e3\u6b50\u6d32\u674e\u7b49\u591a\u7a2e\u6297\u8001\u4fdd\u990a\u6d3b\u6027\u6210\u5206\uff0c\u914d\u65b9\u6eab\u548c\uff0c\u65bc\u5316\u599d\u6c34\u5f8c\u4f7f\u7528\u3002\n**\u6210\u5206**\uff1a\u6c34\u3001\u7518\u6cb9\u3001\u8377\u8377\u82ad\u6cb9\u3001\u96d9\u4e19\u7518\u9187\u3001\u4e01\u4e8c\u9187\u3001\u5496\u5561\u56e0\u3001\u6c34\u89e3\u81a0\u539f\u86cb\u767d\u3001\u4e19\u70ef\u9178\uff08\u916f\uff09\u985e\u5171\u805a\u7269\u3001\u4e19\u4e8c\u9187\u3001\u4e09\u4e59\u9187\u80fa\u3001\u7322\u733b\u6728\u679c\u8089\u8403\u53d6\u3001\u5361\u6ce2\u59c6\u3001\u6c34\u89e3\u6b50\u6d32\u674e\u3001\u9280\u674f\u8403\u53d6\u3001\u843d\u5730\u751f\u6839\u8449\u8403\u53d6\u3001\u9ec3\u539f\u81a0\u3001\u73bb\u5c3f\u9178\u9209\u3001\u9999\u6599\u3001\u4e59\u4e8c\u80fa\u56db\u4e59\u57fa\u4e8c\u9209\u3001\u7570\u4e19\u57fa\u7532\u57fa\u915a\u3001\u805a\u5c71\u68a8\u9187\u916f\u3001\u68d5\u6ada\u91af\u4e09\u80bd\u3001\u68d5\u6ada\u91af\u56db\u80bd\u3001\u6c2f\u82ef\u7518\u919a\u3001\u82ef\u6c27\u4e59\u9187\u3001\u82ef\u7532\u9178\u9209\u3001\u5c71\u68a8\u9178\u9240\n**\u4f7f\u7528\u65b9\u5f0f**\uff1a\u65bc\u5316\u599d\u6c34\u5f8c\u4f7f\u7528\u3002\u53d6\u9069\u91cf\u4f7f\u7528\u65bc\u773c\u90e8\u5468\u570d\uff0c\u7531\u5167\u800c\u5916\u4ee5\u7e5e\u5708\u65b9\u5f0f\u8f15\u67d4\u6309\u6469\u65bc\u773c\u5468\u808c\u819a\u3002\n**\u98df\u7528/\u4f7f\u7528\u6642\u6a5f**\uff1a\u65e9\u665a\u6e05\u6f54\u5f8c\u4f7f\u7528\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a\u5b30\u5e7c\u5152\n**\u904e\u654f\u539f**\uff1a\u86cb\u53ca\u5176\u88fd\u54c1\n**\u6ce8\u610f\u4e8b\u9805**\uff1a\u808c\u819a\u6709\u50b7\u53e3\u6216\u51fa\u73fe\u6fd5\u75b9\u7b49\u7570\u5e38\u73fe\u8c61\u6642\uff0c\u8acb\u505c\u6b62\u4f7f\u7528\u3002\n\n\u8acb\u5c0f\u5fc3\u52ff\u6d41\u5165\u773c\u775b\uff0c\u5982\u4e0d\u614e\u8aa4\u5165\u773c\u775b\u7b49\u654f\u611f\u90e8\u4f4d\uff0c\u5982\u7570\u5e38\u611f\u6301\u7e8c\uff0c\u8acb\u6d3d\u8a62\u91ab\u751f\u3002\n \n\u8acb\u7f6e\u65bc\u5b30\u5e7c\u5152\u4e0d\u6613\u53d6\u5f97\u8655\u3002\n\n \n\u8acb\u52ff\u5b58\u653e\u65bc\u9ad8\u6eab\u53ca\u6f6e\u6fd5\u8655\uff0c\u4e26\u907f\u514d\u967d\u5149\u76f4\u5c04\u3002\n \n\u958b\u5c01\u5f8c\u8acb\u5118\u65e9\u4f7f\u7528\u5b8c\u7562\u3002\n\n## SS+\u63a8\u63a8\u71c3\u8d70\u971c\uff08\u71c3\u8d70\u971c\u4e8c\u4ee3\uff09150g\n**\u5206\u985e**\uff1a\u4fdd\u990a\u54c1 | **\u7522\u5730**\uff1a\u53f0\u7063 | **\u898f\u683c**\uff1a150g\n**\u7522\u54c1\u7c21\u4ecb**\uff1a\u70ba\u7cbe\u6cb9\u9999\u6c1b\u914d\u65b9\u7684\u8eab\u9ad4\u6309\u6469\u971c\uff0c\u8cea\u5730\u6ed1\u9806\u597d\u63a8\u62b9\uff0c\u642d\u914d\u6309\u6469\u4f7f\u7528\uff0c\u53ef\u4f5c\u70ba\u65e5\u5e38\u8eab\u9ad4\u4fdd\u990a\u8207\u653e\u9b06\u8212\u7de9\u4f7f\u7528\u3002\n**\u8a73\u7d30\u8aaa\u660e**\uff1a\u6dfb\u52a0\u591a\u7a2e\u690d\u7269\u8403\u53d6\u8207\u7cbe\u6cb9\u6210\u5206\uff0c\u5305\u62ec\u8594\u8587\u82b1\u8403\u53d6\u7269\u3001\u91d1\u7e37\u6885\u8403\u53d6\u7269\u3001\u5496\u5561\u56e0\u53ca\u591a\u7a2e\u690d\u7269\u7cbe\u6cb9\u7b49\uff0c\u8cea\u5730\u67d4\u6ed1\uff0c\u5bb9\u6613\u5ef6\u5c55\u65bc\u808c\u819a\u8868\u9762\uff0c\u9069\u5408\u6309\u6469\u6642\u4f7f\u7528\u3002\n\n\u642d\u914d\u6309\u6469\u63a8\u62b9\uff0c\u53ef\u5e6b\u52a9\u808c\u819a\u4fdd\u990a\u4e26\u5e36\u4f86\u7cbe\u6cb9\u9999\u6c1b\u7684\u8212\u9069\u611f\u3002\n**\u6210\u5206**\uff1a\u6c34\u3001\u8f9b\u9178/\u7678\u9178\u7518\u6cb9\u4e09\u916f\u3001\u9be8\u881f\u786c\u8102\u9187\u3001\u805a\u4e8c\u7532\u57fa\u77fd\u6c27\u70f7\u3001\u7518\u6cb9\u4e8c\u786c\u8102\u9178\u916f\u3001\u9be8\u881f\u9187\u3001PEG-75 \u786c\u8102\u9178\u916f\u3001\u9be8\u881f\u9187\u805a\u919a-20\u3001\u6cd5\u570b\u8594\u8587\u82b1\u63d0\u53d6\u7269\u3001\u7a81\u53a5\u8594\u8587\u82b1\u6cb9\u3001\u5317\u7f8e\u91d1\u7e37\u6885\u63d0\u53d6\u7269\u3001\u51dd\u8840\u9178\u3001\u7d30\u5c0f\u88f8\u85fb\u63d0\u53d6\u7269\u3001\u5496\u5561\u56e0\u3001\u9ec3\u6d77\u7f4c\u7c9f\u8449\u63d0\u53d6\u7269\u3001\u786c\u8102\u9187\u805a\u919a-20\u3001\u7518\u6cb9\u3001\u7159\u9178\u7532\u916f\u3001\u7518\u8349\u9178\u4e8c\u9240\u3001\u82ef\u6c27\u4e59\u9187\u3001\u5c3f\u56ca\u7d20\u3001\u751c\u6a59\u679c\u76ae\u6cb9\u3001\u9999\u6ab8\u6aac\u679c\u6cb9\u3001\u5730\u4e2d\u6d77\u67cf\u6728\u8449/\u5805\u679c/\u8396\u6cb9\u3001\u85b0\u8863\u8349\u6cb9\u3001\u5361\u6ce2\u59c6\u3001\u7fa5\u82ef\u7532\u916f\u3001\u8fa3\u6912\u63d0\u53d6\u7269\u3001EDTA \u4e8c\u9209\n**\u4f7f\u7528\u65b9\u5f0f**\uff1a\u53d6\u9069\u91cf\u4e73\u971c\u63a8\u62b9\u65bc\u8eab\u9ad4\u6b32\u4fdd\u990a\u90e8\u4f4d\uff0c\u8f15\u67d4\u6309\u6469\u81f3\u5438\u6536\u5373\u53ef\u3002\n**\u98df\u7528/\u4f7f\u7528\u6642\u6a5f**\uff1a\u65e9\u665a\u6e05\u6f54\u5f8c\u4f7f\u7528\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a\u5b30\u5e7c\u5152\n**\u904e\u654f\u539f**\uff1a\u7121\u7279\u5225\u6a19\u793a\n**\u6ce8\u610f\u4e8b\u9805**\uff1a\u808c\u819a\u6709\u50b7\u53e3\u6216\u51fa\u73fe\u6fd5\u75b9\u7b49\u7570\u5e38\u73fe\u8c61\u6642\uff0c\u8acb\u505c\u6b62\u4f7f\u7528\u3002\n\n\u8acb\u5c0f\u5fc3\u52ff\u6d41\u5165\u773c\u775b\uff0c\u5982\u4e0d\u614e\u5165\u773c\u8acb\u7acb\u523b\u4ee5\u6e05\u6c34\u6c96\u6d17\u4e7e\u6de8\u3002\n\n\u5982\u7570\u5e38\u611f\u6301\u7e8c\uff0c\u8acb\u6d3d\u8a62\u91ab\u751f\u3002\n\n\u8acb\u7f6e\u65bc\u5b30\u5e7c\u5152\u4e0d\u6613\u53d6\u5f97\u8655\u3002\n\n\u8acb\u52ff\u5b58\u653e\u65bc\u9ad8\u6eab\u3001\u6f6e\u6fd5\u6216\u967d\u5149\u76f4\u5c04\u4e4b\u8655\u3002\n\n## \u63a8\u63a8\u7dca\u7dfbV\u578b\u7cbe\u83ef\u6cb9 30ml\n**\u5206\u985e**\uff1a\u4fdd\u990a\u54c1 | **\u7522\u5730**\uff1a\u53f0\u7063 | **\u898f\u683c**\uff1a30ml\n**\u7522\u54c1\u7c21\u4ecb**\uff1a\u63a1\u6309\u58d3\u74f6\u8a2d\u8a08\uff0c\u4e3b\u6253\u808c\u819a\u7dca\u7dfb\u4fdd\u6fd5\uff0c\u91dd\u5c0d\u5169\u9830\u3001\u4e0b\u5df4\u53ca\u8116\u5b50\u52a0\u5f37\u4fdd\u990a\uff0c\u5e6b\u52a9\u96d5\u5851\u81c9\u90e8\u7dda\u689d\uff0c\u9069\u5408\u65e5\u5e38\u81c9\u90e8\u8b77\u819a\u4f7f\u7528\u3002\n**\u8a73\u7d30\u8aaa\u660e**\uff1a\u4ee5\u970d\u970d\u5df4\u7c7d\u6cb9\u70ba\u57fa\u5e95\uff0c\u6dfb\u52a0\u5564\u9152\u82b1\u3001\u8089\u6842\u3001\u6cdb\u918c\uff08\u8f14\u9176Q10\uff09\u3001\u82e6\u6a59\u82b1\u6cb9\u3001\u5730\u4e2d\u6d77\u67cf\u6728\u6cb9\u7b49\u6d3b\u6027\u6210\u5206\uff0c\u8cea\u5730\u70ba\u7cbe\u83ef\u6cb9\u5f62\u5f0f\uff0c\u53ef\u55ae\u7368\u4f7f\u7528\u6216\u6df7\u5165\u65e5\u5e38\u4e73\u971c\u4e73\u6db2\u4e2d\u642d\u914d\u4fdd\u990a\u3002\n**\u6210\u5206**\uff1a\u970d\u970d\u5df4\u7c7d\u6cb9\u3001\u5564\u9152\u82b1\u5b62\u5b50\u8449\u7403\u3001\u8089\u6842\u3001\u8f9b\u9178/\u7678\u9178\u7518\u6cb9\u4e09\u916f\u3001\u6cdb\u918c\uff08\u8f14\u9176Q10\uff09\u3001\u82e6\u6a59\u82b1\u6cb9\u3001\u5730\u4e2d\u6d77\u67cf\u6728\u8449/\u5805\u679c/\u8396\u6cb9\n**\u4f7f\u7528\u65b9\u5f0f**\uff1a\u81c9\u90e8\u6e05\u6f54\u5b8c\uff0c\u5316\u599d\u6c34\u5f8c\u76f4\u63a5\u53d6\u5c11\u8a31\u65bc\u624b\u4e0a\u6413\u958b\uff0c\u65bc\u5168\u81c9\u6309\u6469\uff0c\u6216\u91dd\u5c0d\u5169\u9830\u3001\u4e0b\u5df4\u3001\u8116\u5b50\u52a0\u5f37\u3002\u4ea6\u53ef\u52a0\u5165\u65e5\u5e38\u4fdd\u990a\u7684\u4e73\u971c\u6216\u4e73\u6db2\u4e2d\u6df7\u5408\u4f7f\u7528\u3002\n**\u98df\u7528/\u4f7f\u7528\u6642\u6a5f**\uff1a\u65e9\u665a\u6e05\u6f54\u5f8c\u4f7f\u7528\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a\u5b30\u5e7c\u5152\n**\u904e\u654f\u539f**\uff1a\u7121\u7279\u5225\u6a19\u793a\n**\u6ce8\u610f\u4e8b\u9805**\uff1a\u5982\u51fa\u73fe\u7570\u5e38\u73fe\u8c61\u6642\uff0c\u8acb\u505c\u6b62\u4f7f\u7528\uff0c\u5982\u7570\u5e38\u611f\u6301\u7e8c\uff0c\u8acb\u6d3d\u8a62\u91ab\u751f\u3002\n\n\u8acb\u7f6e\u65bc\u5b30\u5e7c\u5152\u4e0d\u6613\u53d6\u5f97\u8655\n\n\u8acb\u52ff\u5b58\u653e\u65bc\u9ad8\u6eab\u53ca\u6f6e\u6fd5\u8655\uff0c\u4e26\u907f\u514d\u967d\u5149\u76f4\u5c04\n\n\u958b\u5c01\u5f8c\u8acb\u5118\u65e9\u4f7f\u7528\u5b8c\u7562\n\n## A\u91873% \u62cb\u5149\u7165\u819a\u971c 30ml\n**\u5206\u985e**\uff1a\u4fdd\u990a\u54c1 | **\u7522\u5730**\uff1a\u53f0\u7063 | **\u898f\u683c**\uff1a30ml\n**\u7522\u54c1\u7c21\u4ecb**\uff1aA8\u6297\u8001\u8c50\u76c8\u4e73\u971c30ml  A\u91870.3%\n\n\u82e5\u504f\u4e7e\u6027\u5efa\u8b701~2\u5468\u4f7f\u7528\u4e00\u6b21\u7576\u539a\u6577\u66ff\u4ee3\u9762\u819c\u5e6b\u52a9\u559a\u819a(\u654f\u611f\u808c\u4e0d\u9069\u7528)\n\u4e2d/\u6cb9\u6027\u808c\u819a\u53ef\u7576\u81c9\u90e8\u4fdd\u990a\u4e73\u6db2\u4f7f\u7528\n**\u8a73\u7d30\u8aaa\u660e**\uff1a\u7528\u9014 : \u808c\u819a\u4fdd\u990a\n\u5f37\u5316\u4fdd\u6fd5\u8207\u63a7\u6cb9\u8102\n**\u6210\u5206**\uff1a\u6c34\u3001\u4e73\u6728\u679c\u6cb9\u3001\u6c2b\u5316\u6a44\u6b16\u6cb9\u9178\u4e59\u57fa\u5df1\u916f\u3001\u6c2b\u5316\u6a44\u6b16\u6cb9\u4e0d\u7682\u5316\u7269\u3001\u7570\u620a\u4e8c\u9187\u3001\u7518\u6cb9\u3001\u78b3\u9178\u4e8c\u4e59\u57fa\u5df1\u916f\u3001\u96d9\u4e19\u7518\u9187\u3001\u9be8\u881f\u9187\u3001\u5c71\u5d33\u9187\u3001\u805a\u7518\u6cb9-10 \u4e94\u786c\u8102\u9178\u916f\u3001\u786c\u8102\u91af\u4e73\u91af\u4e73\u9178\u9209\u3001\u5b63\u620a\u56db\u9187\u4e8c\u786c\u8102\u9178\u916f\u3001\u7159\u91af\u80fa\u3001\u8996\u9ec3\u9187   (A\u9187)\u3001\u8f9b\u9178/\u7678\u9178\u7518\u6cb9\u4e09\u916f\u3001\u91d1\u76de\u82b1\u63d0\u53d6\u7269\u3001\u751f\u80b2\u915a\u4e59\u9178\u916f\u3001DIMETHICONE   \u805a\u4e8c\u7532\u57fa\u77fd\u6c27\u70f7\u3001\u4e59\u91af\u57fa\u516b\u80bd-3\u3001\u4e01\u4e8c\u9187\u3001\u805a\u5c71\u68a8\u9187\u916f-20\u3001\u68d5\u6ada\u91af\u4e09\u80bd-1\u3001 \u68d5\u6ada\u91af\u56db\u80bd-7\u3001\u690d\u7269\u56fa\u9187\u3001\u8702\u871c\u3001\u8702\u6bd2\u3001\u900f\u660e\u8cea\u9178\u3001\u8f9b\u7518\u9187\u3001\u82ef\u6c27\u4e59\u9187\u3001\u4e73\u9178\u9209\u3001\u4e19\u70ef\u91af\u4e8c\u7532\u57fa\u725b\u78fa\u9178\u92a8/VP \u5171\u805a\u7269\u3001\u6c2f\u82ef\u7518\u919a\u3001\u718f\u8863\u8349\u7cbe\u6cb9\u3001\u99ac\u9b31\u862d\u7cbe\u6cb9\u3001\u6ab8\u6aac\u7cbe\u6cb9\n**\u4f7f\u7528\u65b9\u5f0f**\uff1a\u6cb9\u6027\u808c\u819a\uff08\u9752\u6625\u671f\u6642\u9577\u75d8\u75d8\uff09\u53ef\u6bcf\u5929\u4f7f\u7528\n\n\u4e2d\u6027\u808c\u819a\uff08\u7528\u5169\u9031\u3001\u505c\u4e00\u9031\uff09\n\n\u4e7e\u6027\u808c\u819a\uff08\u9069\u5408\u5c40\u90e8\u63db\u819a\u3001\u9752\u6625\u671f\u5e7e\u4e4e\u4e0d\u9577\u75d8\u75d8\uff09\u7528\u4e09\u5929\u505c\u4e00\u9031\u4ee5\u4e0a\n\n\u654f\u611f\u900f\u8584\u808c\u819a\uff08\u4e0d\u53ef\u4f7f\u7528\uff09\n**\u98df\u7528/\u4f7f\u7528\u6642\u6a5f**\uff1a\u65e9\u665a\u6e05\u6f54\u5f8c\u4f7f\u7528\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a\u5b30\u5e7c\u5152\n**\u904e\u654f\u539f**\uff1a\u8702\u7522\u54c1\n**\u6ce8\u610f\u4e8b\u9805**\uff1a\u6ce8\u610f\u4e8b\u9805 : \u808c\u819a\u6709\u50b7\u53e3\u6216\u6fd5\u75b9\u7b49\u7570\u5e38\u73fe\u8c61\u6642\uff0c\u8acb\u52ff\u4f7f\u7528\u3002\u8acb\u5c0f\u5fc3\u52ff\u6d41\u5165\u773c\u775b\uff0c\u5982\u4e0d\u614e\u8aa4\u5165\u773c\u775b\u6216\u611f\u5230\u7570\u5e38\u6642\uff0c\u8acb\u7acb\u523b\u4ee5\u6e05\u6c34\u6c96\u6d17\u4e7e\u6de8\uff0c\u5982\u7570\u5e38\u611f\u6301\u7e8c,\u8acb\u6d3d\u8a62\u91ab\u751f\u3002\n\n\u4fdd\u5b58\u65b9\u5f0f : \u8acb\u52ff\u5b58\u653e\u65bc\u9ad8\u6eab\u53ca\u6f6e\u6fd5\u8655\uff0c\u6216\u5b30\u5e7c\u5152\u53ef\u62ff\u53d6\u8655\uff0c\u4e26\u907f\u514d\u592a\u967d\u76f4\u5c04\u3002\u958b\u5c01\u5f8c\u8acb\u65e9\u4f7f\u7528\u5b8c\u7562\u3002\n\n## \u597d\u7720\u971c 100ml\n\uff08\u91cf\u5b50\u9382\u7d20 \u665a\u5b89\u8212\u58d3\u4e73\u971c\uff09\n**\u5206\u985e**\uff1a\u4fdd\u990a\u54c1 | **\u7522\u5730**\uff1a\u53f0\u7063 | **\u898f\u683c**\uff1a100ml\n**\u7522\u54c1\u7c21\u4ecb**\uff1a\u6dfb\u52a0 12 \u7a2e\u8349\u672c\u6210\u5206\u7684\u9382\u7d20\u8212\u58d3\u4e73\u971c\uff0c\u4e3b\u6253\u8212\u7de9\u808c\u819a\u58d3\u529b\u3001\u8212\u7de9\u75b2\u5026\u808c\u819a\uff0c\u5168\u8eab\u7686\u53ef\u4f7f\u7528\uff0c\u7279\u5225\u9069\u5408\u7761\u524d\u5857\u62b9\u65bc\u8033\u4e0b\u3001\u9838\u5f8c\u3001\u8179\u90e8\u6309\u6469\u4fdd\u990a\u3002\n**\u8a73\u7d30\u8aaa\u660e**\uff1a\u542b\u6c28\u57fa\u4e01\u9178\u3001\u5357\u74dc\u7c7d\u6cb9\u3001\u5fb7\u570b\u6d0b\u7518\u83ca\u8403\u53d6\u3001\u91ce\u5927\u8c46\u7c7d\u8403\u53d6\u7b49\u4fdd\u990a\u6210\u5206\uff0c\u642d\u914d\u4e73\u9999\u8272\u767e\u91cc\u9999\u3001\u9999\u6ab8\u6aac\u3001\u96dc\u85b0\u8863\u8349\u3001\u79d8\u9b6f\u9999\u6a39\u6cb9\u3001\u6c92\u85e5\u6cb9\u3001\u767d\u82b1\u6625\u9ec3\u83ca\u516d\u7a2e\u7cbe\u6cb9\u8907\u65b9\u9999\u6c1b\uff0c\u8212\u7de9\u653e\u9b06\u6548\u679c\u4f73\u3002\n**\u6210\u5206**\uff1a\u6c34\u3001\u6c2b\u5316\u68d5\u6ada\u4ec1\u6cb9\u3001\u8f9b\u9178/\u7678\u9178\u4e09\u9178\u7518\u6cb9\u916f\u3001\u96d9\u4e19\u7518\u9187\u3001\u6d77\u6c34\u8403\u53d6\u3001\u7518\u6cb9\u3001\u4e19\u9187\u3001\u7518\u6cb9\u786c\u8102\u9178\u3001\u9be8\u881f\u9187\u3001\u5341\u516b\u70f7\u9187\u3001\u6c28\u57fa\u4e01\u9178\u3001\u77fd\u9748\u3001PEG-75 \u786c\u8102\u9178\u916f\u3001\u5357\u74dc\u7c7d\u6cb9\u3001\u690d\u7269\u56fa\u9187/\u8f9b\u57fa\u5341\u4e8c\u9187\u6708\u6842\u91af\u8c37\u6c28\u9178\u916f\u3001\u9be8\u881f\u9187\u805a\u uff0c\u4fdd\u6301\u808c\u819a\u5f48\u6f64\u7dca\u5be6\u3002\n**\u98df\u7528/\u4f7f\u7528\u6642\u6a5f**\uff1a\u65e9\u665a\u6e05\u6f54\u5f8c\u4f7f\u7528\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a\u5b30\u5e7c\u5152\n**\u904e\u654f\u539f**\uff1a\u5927\u8c46\u53ca\u5176\u88fd\u54c1\n**\u6ce8\u610f\u4e8b\u9805**\uff1a\u4f7f\u7528\u521d\u671f\u5982\u6709\u8f15\u5fae\u523a\u523a\u611f\u5c6c\u6b63\u5e38\u73fe\u8c61\u3002\n\n\u4f7f\u7528\u5f8c\u82e5\u611f\u4e0d\u9069\uff0c\u8acb\u505c\u6b62\u4f7f\u7528\u4e26\u4ee5\u5927\u91cf\u6e05\u6c34\u6c96\u6d17\uff0c\u8aee\u8a62\u5c08\u696d\u91ab\u5e2b\u3002\n\n\u8acb\u653e\u7f6e\u65bc\u5b30\u5e7c\u5152\u4e0d\u6613\u53d6\u5f97\u4e4b\u8655\u3002\n\n\u52ff\u5b58\u653e\u65bc\u9ad8\u6eab\u53ca\u6f6e\u6fd5\u8655\uff0c\u907f\u514d\u592a\u967d\u76f4\u5c04\u3002\n\n## \u6668\u66e6\u82b1\u8a9e\u814b\u4e0b\u9999\u82ac\u5674\u9727 30ml\n**\u5206\u985e**\uff1a\u4fdd\u990a\u54c1 | **\u7522\u5730**\uff1a\u53f0\u7063 | **\u898f\u683c**\uff1a30ml\n**\u7522\u54c1\u7c21\u4ecb**\uff1a\u5236\u81ed\u6297\u7570\u5473\uff0c\u7d30\u7dfb\u5674\u9727\u8a2d\u8a08\u65b9\u4fbf\u651c\u5e36\u3002\u9999\u8abf\u5c64\u6b21\u8c50\u5bcc\uff1a\u524d\u8abf\u4ee5\u9ed1\u52a0\u4f96\u3001\u6843\u5b50\u3001\u7da0\u8449\u5e36\u4f86\u6e05\u65b0\u679c\u9999\uff1b\u4e2d\u8abf\u73ab\u7470\u8207\u9cf6\u5c3e\u82b1\u6563\u767c\u5a49\u7d04\u6771\u65b9\u9999\u8abf\uff1b\u5f8c\u8abf\u96ea\u677e\u3001\u9e9d\u9999\u512a\u96c5\u53e4\u5178\u3002\n**\u8a73\u7d30\u8aaa\u660e**\uff1a\u6dfb\u52a0\u5c24\u52a0\u5229\u7cbe\u6cb9\u3001\u8336\u6a39\u7cbe\u6cb9\u53ca\u9664\u81ed\u6210\u5206\uff08\u9999\u8305\u57fa\u7532\u57fa\u4e01\u70ef\u9178\u916f\uff09\uff0c\u642d\u914d\u9152\u7cbe\u914d\u65b9\uff0c\u4f7f\u7528\u5f8c\u9999\u5473\u7531\u6de1\u6f38\u6fc3\uff0c\u6162\u6162\u986f\u73fe\u4e0d\u540c\u5c64\u6b21\u9999\u8abf\uff0c\u5168\u5e74\u9f61\u9069\u7528\u3002\n**\u6210\u5206**\uff1a\u6c34\u3001\u9152\u7cbe\u3001\u9999\u7cbe\u3001\u4e01\u9187\u805a\u919a-26\u3001PEG-40 \u6c2b\u5316\u84d6\u9ebb\u6cb9\u3001\u9664\u81ed\u5291\uff08\u9999\u8305\u57fa\u7532\u57fa\u4e01\u70ef\u9178\u916f\uff09\u3001\u82ef\u6c27\u4e59\u9187\u3001\u8f9b\u7518\u9187\u3001EDTA \u4e8c\u9209\u3001\u5c24\u52a0\u5229\u7cbe\u6cb9\u3001\u8336\u6a39\u7cbe\u6cb9\n**\u4f7f\u7528\u65b9\u5f0f**\uff1a\u4f7f\u7528\u524d\u6416\u4e00\u6416\uff0c\u5916\u51fa\u6216\u6c90\u6d74\u4e4b\u5f8c\uff0c\u8ddd\u96e2\u814b\u4e0b\u7d04 10\uff5e15 \u516c\u5206\u5674\u7051\u65bc\u808c\u819a\u3002\u808c\u819a\u654f\u611f\u8005\u8acb\u5674\u7051\u65bc\u8863\u7269\u4e0a\u3002\n**\u98df\u7528/\u4f7f\u7528\u6642\u6a5f**\uff1a\u65e9\u665a\u6e05\u6f54\u5f8c\u4f7f\u7528\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a\u8acb\u8a73\u95b1\u6ce8\u610f\u4e8b\u9805\n**\u904e\u654f\u539f**\uff1a\u7121\u7279\u5225\u6a19\u793a\n**\u6ce8\u610f\u4e8b\u9805**\uff1a\u907f\u514d\u672c\u7522\u54c1\u76f4\u63a5\u63a5\u89f8\u773c\u775b\u3002\n\n\u5982\u767c\u73fe\u6709\u4efb\u4f55\u4e0d\u9069\u6216\u654f\u611f\uff0c\u8acb\u505c\u6b62\u4f7f\u7528\u3002\n\n\u52ff\u8b93\u5152\u7ae5\u63a5\u89f8\uff0c\u4e0d\u53ef\u9032\u98df\uff0c\u53ea\u4f9b\u5916\u7528\u3002\n\n\u8acb\u52ff\u5b58\u653e\u65bc\u9ad8\u6eab\u53ca\u6f6e\u6fd5\u8655\uff0c\u4e26\u907f\u514d\u967d\u5149\u76f4\u5c04\u3002\n\n\u958b\u5c01\u5f8c\u8acb\u5118\u65e9\u4f7f\u7528\u5b8c\u7562\u3002\n\n## \u6c89\u9999\u6de1\u96c5\u814b\u4e0b\u9999\u82ac\u5674\u9727 30ml\n**\u5206\u985e**\uff1a\u4fdd\u990a\u54c1 | **\u7522\u5730**\uff1a\u53f0\u7063 | **\u898f\u683c**\uff1a30ml\n**\u7522\u54c1\u7c21\u4ecb**\uff1a\u68ee\u6797\u6728\u8cea\u9999\u8abf\u7684\u814b\u4e0b\u9999\u6c1b\u5674\u9727\uff0c\u5236\u81ed\u6297\u7570\u5473\uff0c\u7d30\u7dfb\u5674\u9727\u8a2d\u8a08\u65b9\u4fbf\u651c\u5e36\u3002\u9999\u8abf\u5c64\u6b21\uff1a\u524d\u8abf\u8309\u8389\u3001\u4f5b\u624b\u67d1\u3001\u9f20\u5c3e\u8349\u8f15\u5feb\u6109\u6085\uff1b\u4e2d\u8abf\u9f8d\u6d8e\u9999\u642d\u914d\u96ea\u677e\u8f15\u6728\u8cea\u9999\u74b0\u7e5e\uff1b\u5f8c\u8abf\u7425\u73c0\u3001\u767d\u9e9d\u9999\u3001\u9999\u6839\u8349\u5c64\u6b21\u8ff7\u4eba\u653e\u9b06\u3002\n**\u8a73\u7d30\u8aaa\u660e**\uff1a\u6dfb\u52a0\u5c24\u52a0\u5229\u7cbe\u6cb9\u3001\u8336\u6a39\u7cbe\u6cb9\u3001\u85b0\u8863\u8349\u7cbe\u6cb9\u53ca\u9664\u81ed\u6210\u5206\uff0c\u4f7f\u7528\u5f8c\u6728\u8cea\u9999\u5473\u7531\u6de1\u6f38\u6fc3\uff0c\u6162\u6162\u986f\u73fe\u4e0d\u540c\u5c64\u6b21\u9999\u8abf\uff0c\u5168\u5e74\u9f61\u9069\u7528\u3002\n**\u6210\u5206**\uff1a\u6c34\u3001\u9152\u7cbe\u3001\u9999\u7cbe\u3001\u4e01\u9187\u805a\u919a-26\u3001PEG-40 \u6c2b\u5316\u84d6\u9ebb\u6cb9\u3001\u9664\u81ed\u5291\uff08\u9999\u8305\u57fa\u7532\u57fa\u4e01\u70ef\u9178\u916f\uff09\u3001\u82ef\u6c27\u4e59\u9187\u3001\u8f9b\u7518\u9187\u3001\u5c24\u52a0\u5229\u7cbe\u6cb9\u3001\u8336\u6a39\u7cbe\u6cb9\u3001\u85b0\u8863\u8349\u7cbe\u6cb9\u3001EDTA \u4e8c\u9209\n**\u4f7f\u7528\u65b9\u5f0f**\uff1a\u4f7f\u7528\u524d\u6416\u4e00\u6416\uff0c\u5916\u51fa\u6216\u6c90\u6d74\u4e4b\u5f8c\uff0c\u8ddd\u96e2\u814b\u4e0b\u7d04 10\uff5e15 \u516c\u5206\u5674\u7051\u65bc\u808c\u819a\u3002\u808c\u819a\u654f\u611f\u8005\u8acb\u5674\u7051\u65bc\u8863\u7269\u4e0a\u3002\n**\u98df\u7528/\u4f7f\u7528\u6642\u6a5f**\uff1a\u65e9\u665a\u6e05\u6f54\u5f8c\u4f7f\u7528\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a\u8acb\u8a73\u95b1\u6ce8\u610f\u4e8b\u9805\n**\u904e\u654f\u539f**\uff1a\u7121\u7279\u5225\u6a19\u793a\n**\u6ce8\u610f\u4e8b\u9805**\uff1a\u907f\u514d\u672c\u7522\u54c1\u76f4\u63a5\u63a5\u89f8\u773c\u775b\u3002\n \n\u5982\u767c\u73fe\u6709\u4efb\u4f55\u4e0d\u9069\u6216\u654f\u611f\uff0c\u8acb\u505c\u6b62\u4f7f\u7528\u3002\n \n\u52ff\u8b93\u5152\u7ae5\u63a5\u89f8\uff0c\u4e0d\u53ef\u9032\u98df\uff0c\u53ea\u4f9b\u5916\u7528\u3002\n \n\u8acb\u52ff\u5b58\u653e\u65bc\u9ad8\u6eab\u53ca\u6f6e\u6fd5\u8655\uff0c\u4e26\u907f\u514d\u967d\u5149\u76f4\u5c04\u3002\n \n\u958b\u5c01\u5f8c\u8acb\u5118\u65e9\u4f7f\u7528\u5b8c\u7562\u3002\n\n## \u6c99\u6f20\u7518\u6cc9\u7526\u6d3b\u971c 50g\n**\u5206\u985e**\uff1a\u4fdd\u990a\u54c1 | **\u7522\u5730**\uff1a\u53f0\u7063 | **\u898f\u683c**\uff1a50g\n**\u7522\u54c1\u7c21\u4ecb**\uff1a\u91dd\u5c0d\u654f\u611f\u808c\u8a2d\u8a08\u7684\u5168\u6548\u6025\u6551\u971c\uff0c\u7279\u5225\u9069\u5408\u66ec\u50b7\u3001\u91ab\u7f8e\u8853\u5f8c\u4fee\u8b77\u4f7f\u7528\uff0c\u7368\u7279\u6cb9\u6c34\u8f49\u5316\u8cea\u5730\u8f15\u76c8\u8fc5\u901f\u5438\u6536\u3002\u539a\u6577\u53ef\u6df1\u5c64\u4fee\u8b77\u9396\u6c34\uff0c\u8584\u64e6\u53ef\u4fdd\u6c34\u6ecb\u6f64\u4e26\u5f62\u6210\u96b1\u5f62\u9632\u79a6\u5c64\uff0c\u5168\u8eab\u53ca\u5168\u5e74\u9f61\u9069\u7528\u3002\n**\u8a73\u7d30\u8aaa\u660e**\uff1a\u542b\u4e94\u5927\u6838\u5fc3\u6210\u5206\uff1a\u5c08\u5229\u5411\u65e5\u8475\u7c7d\u6cb9\u589e\u5f37\u808c\u819a\u9632\u79a6\u529b\u3001\u5c08\u5229\u690d\u7269\u56fa\u9187\u5e73\u6ed1\u67d4\u6f64\u808c\u819a\u3001\u9ad8\u6fc3\u5ea6\u4e73\u6728\u679c\u6cb9\u6df1\u5c64\u6ecb\u990a\u3001\u5357\u74dc\u7c7d\u6cb9\u5f37\u5316\u808c\u819a\u5c4f\u969c\u5ef6\u7de9\u8870\u8001\u3001\u7dad\u4ed6\u547dE\u7dad\u8b77\u808c\u819a\u6de8\u767d\u900f\u4eae\u3002\n**\u6210\u5206**\uff1a\u7926\u7269\u8102\u3001\u68d5\u6ada\u4ec1\u6cb9\u3001\u68d5\u6ada\u9178\u7570\u8f9b\u916f\u3001\u4e73\u6728\u679c\u6cb9\u3001\u786c\u8102\u9187\u3001\u7518\u6cb9\u4e8c\u786c\u8102\u9178\u916f\u3001\u7518\u6cb9\u786c\u8102\u9178\u916f\u3001\u77f3\u881f\u3001\u4e09\u786c\u8102\u7cbe\u3001\u5fae\u6676\u881f\u3001\u5411\u65e5\u8475\u7c7d\u6cb9\u4e0d\u7682\u5316\u7269\u3001\u5357\u74dc\u7c7d\u6cb9\u3001\u7dad\u4ed6\u547dE\u3001\u690d\u7269\u56fa\u9187\u3001\u85b0\u8863\u8349\u7cbe\u6cb9\u3001\u7fa5\u82ef\u7570\u4e19\u916f\n**\u4f7f\u7528\u65b9\u5f0f**\uff1a\u8584\u64e6\uff1a\u8f15\u8f15\u6309\u6469 5 \u79d2\uff0c\u6cb9\u6c34\u8f49\u5316\u8cea\u5730\u77ac\u9593\u88dc\u6c34\uff0c\u5728\u76ae\u819a\u5f62\u6210\u96b1\u5f62\u9632\u79a6\u5c64\uff0c\u4e0d\u5835\u585e\u6bdb\u56ca\u3002\u539a\u6577\uff1a\u5728\u81c9\u4e0a\u8f15\u9b06\u63a8\u958b\u6309\u6469\uff0c\u52a0\u5f37\u76ae\u819a\u9396\u6c34\uff0c\u7dad\u6301\u9577\u4e45\u4fdd\u6fd5\u529b\u3002\n**\u98df\u7528/\u4f u58eb\u6797\u3001\u8702\u881f\u3001\u8591\u8403\u53d6\u3001\u9999\u7cbe\u3001\u589e\u7a20\u81a0\uff08\u7fa5\u4e19\u57fa\u74dc\u723e\u81a0\uff09\u3001\u7d05\u666f\u5929\u8403\u53d6\u3001\u51ac\u87f2\u590f\u8349\u8403\u53d6\u3001\u5c0f\u7c73\u6912\u679c\u8403\u53d6\u3001\u8fa3\u6728\u7c7d\u6cb9\u3001\u4fdd\u5b58\u5291\uff08\u6c2f\u82ef\u7518\u919a\uff09\u3001\u7dad\u4ed6\u547dE\u3001\u4fdd\u5b58\u5291\uff08\u82ef\u6c27\u4e59\u9187\uff09\u3001EDTA \u4e8c\u9209\u3001\u9999\u862d\u57fa\u4e01\u57fa\u919a\u3001\u937a\n**\u4f7f\u7528\u65b9\u5f0f**\uff1a\u53d6\u9069\u91cf\u5857\u62b9\u65bc\u80a9\u9838\u3001\u80cc\u90e8\u6216\u9700\u8981\u8212\u7de9\u7684\u90e8\u4f4d\uff0c\u7a0d\u52a0\u6309\u6469\uff0c\u6eab\u611f\u6548\u679c\u6301\u7e8c\u7d04 6\uff5e8 \u5c0f\u6642\u3002\n\n\u521d\u6b21\u4f7f\u7528\u5efa\u8b70\u4ee5\u4e00\u6307\u7bc0\uff08\u82b1\u751f\u7c73\u5927\u5c0f\uff09\u7684\u91cf\u5c11\u91cf\u5857\u62b9\u65bc\u5c40\u90e8\uff0c\u518d\u4f9d\u9700\u8981\u8abf\u6574\u7528\u91cf\u3002\n**\u98df\u7528/\u4f7f\u7528\u6642\u6a5f**\uff1a\u65e9\u665a\u6e05\u6f54\u5f8c\u4f7f\u7528\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a\u5b30\u5e7c\u5152\n**\u904e\u654f\u539f**\uff1a\u7121\u7279\u5225\u6a19\u793a\n**\u6ce8\u610f\u4e8b\u9805**\uff1a\u5982\u6709\u7d05\u816b\u4e0d\u9069\u73fe\u8c61\uff0c\u8acb\u7acb\u5373\u505c\u6b62\u4f7f\u7528\n\n\u5efa\u8b70\u4f7f\u7528\u5f8c 6\uff5e8 \u5c0f\u6642\u5167\u4e0d\u8981\u6ce1\u71b1\u6c34\u6fa1\n\n\u4f7f\u7528\u5f8c\u8acb\u52d9\u5fc5\u4ee5\u80a5\u7682\u6e05\u6d17\u96d9\u624b\uff0c\u907f\u514d\u6413\u63c9\u773c\u775b\n\n\u5982\u4e0d\u614e\u5165\u773c\uff0c\u8acb\u7528\u751f\u7406\u98df\u9e7d\u6c34\u5927\u91cf\u6c96\u6d17\uff0c\u5982\u6301\u7e8c\u4e0d\u9069\u8acb\u6d3d\u8a62\u91ab\u751f\n\n\u82e5\u4f7f\u7528\u5f8c\u6709\u4e0d\u9069\u8acb\u4ee5\u6e05\u6c34\u6c96\u6d17\n\n\u8acb\u7f6e\u65bc\u5b30\u5e7c\u5152\u4e0d\u6613\u53d6\u5f97\u8655\n\n\u8acb\u52ff\u5b58\u653e\u65bc\u9ad8\u6eab\u53ca\u6f6e\u6fd5\u8655\uff0c\u4e26\u907f\u514d\u967d\u5149\u76f4\u5c04\n\n\u958b\u5c01\u5f8c\u8acb\u5118\u65e9\u4f7f\u7528\u5b8c\u7562\n\n## \u78a7\u74bd\u6eab\u611f\u8212\u7de9\u8cbc\u5e03(20\u7247/\u5305)\n**\u5206\u985e**\uff1a\u8cbc\u5e03 | **\u7522\u5730**\uff1a\u53f0\u7063 | **\u898f\u683c**\uff1a20\u7247/\u5305\n**\u7522\u54c1\u7c21\u4ecb**\uff1a\u7368\u5bb6\u78a7\u74bd\u6eab\u6dbc\u8cbc\u5e03\uff0c\u63a1\u7528\u5929\u7136\u8349\u672c\u914d\u65b9\uff0c\u542b\u78a7\u74bd\u7926\u7269\u7c89\uff08\u9060\u7d05\u5916\u7dda\u7c89\uff09\uff0c\u5c08\u70ba\u7de9\u89e3\u808c\u8089\u4e0d\u9069\u8a2d\u8a08\uff0c\u63d0\u4f9b\u6301\u4e45\u8212\u7de9\u6548\u679c\uff0c\u9069\u5408\u904b\u52d5\u5f8c\u653e\u9b06\u6216\u9577\u6642\u9593\u5de5\u4f5c\u5f8c\u8212\u7de9\u4f7f\u7528\u3002\n**\u8a73\u7d30\u8aaa\u660e**\uff1a\u7d50\u5408\u91d1\u9580\u4e00\u689d\u6839\u8403\u53d6\u6db2\u3001\u8591\u7cbe\u6cb9\u3001\u8840\u7aed\u8403\u53d6\u7269\u3001\u51ac\u7da0\u6a39\u7cbe\u6cb9\u7b49\u591a\u7a2e\u8349\u672c\u6d3b\u6027\u6210\u5206\uff0c\u4e26\u6dfb\u52a0\u78a7\u74bd\u7926\u7269\u7c89\uff0c\u6df1\u5165\u808c\u819a\u63d0\u4f9b\u8212\u7de9\u6548\u679c\u3002\n**\u6210\u5206**\uff1a\u6a39\u8102\u3001\u91d1\u9580\u4e00\u689d\u6839\uff08\u95ca\u8449\u5927\u8c46\uff09\u8403\u53d6\u6db2\u3001\u6c27\u5316\u92c5\u3001\u78a7\u74bd\u7926\u7269\u7c89\uff08\u9060\u7d05\u5916\u7dda\u7c89\uff09\u3001\u8591\u7cbe\u6cb9\uff08\u542b\u5fae\u91cf\u8584\u8377\u9187\uff09\u3001\u8840\u7aed\u8403\u53d6\u7269\u3001\u51ac\u7da0\u6a39\u7cbe\u6cb9\u3001\u9999\u840a\u862d\u919b\u3001\u9999\u8349\u4e01\u57fa\u919a\n**\u4f7f\u7528\u65b9\u5f0f**\uff1a\u5c07\u808c\u819a\u6e05\u6f54\u5f8c\uff0c\u8cbc\u5e03\u6577\u65bc\u9700\u8981\u90e8\u4f4d\uff0c\u6bcf\u6b21\u4f7f\u7528 4\uff5e6 \u5c0f\u6642\u5f8c\u53d6\u4e0b\u3002\n\n\u5982\u8981\u589e\u9032\u6548\u679c\uff0c\u6bcf\u6b21\u4f7f\u7528\u9593\u9694 2 \u5c0f\u6642\u4ee5\u4e0a\uff0c\u6bcf\u65e5\u5efa\u8b70 2\uff5e3 \u6b21\u3002\n**\u98df\u7528/\u4f7f\u7528\u6642\u6a5f**\uff1a\u4f9d\u7522\u54c1\u8aaa\u660e\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a\u8acb\u8a73\u95b1\u6ce8\u610f\u4e8b\u9805\n**\u904e\u654f\u539f**\uff1a\u5927\u8c46\u53ca\u5176\u88fd\u54c1\n**\u6ce8\u610f\u4e8b\u9805**\uff1a\u8cbc\u5e03\u8acb\u52ff\u91cd\u8907\u4f7f\u7528\u3002\n\n\u8acb\u52ff\u4f7f\u7528\u65bc\u808c\u819a\u50b7\u53e3\u8655\uff0c\u4e26\u8acb\u907f\u958b\u773c\u775b\u5468\u570d\u9ecf\u819c\u90e8\u4f4d\u3002\n\n\u542b\u5929\u7136\u8584\u8377\u9187\uff0c\u8836\u8c46\u75c7\u60a3\u8005\u6216\u5c0d\u8584\u8377\u9187\u6709\u7591\u616e\u8005\uff0c\u4ee5\u53ca 2 \u6b72\u4ee5\u4e0b\u5b69\u7ae5\uff0c\u4f7f\u7528\u524d\u8acb\u8aee\u8a62\u91ab\u5e2b\u6216\u85e5\u5e2b\u3002\n \n\u8acb\u7f6e\u65bc\u4e7e\u71e5\u9670\u6dbc\u8655\uff0c\u907f\u514d\u9ad8\u6eab\u53ca\u967d\u5149\u76f4\u5c04\u3002\n\n## \u77f3\u58a8\u70ef\u53bb\u6fd5\u6392\u5bd2\u8cbc\u5e03(20\u7247/\u5305)\n**\u5206\u985e**\uff1a\u8cbc\u5e03 | **\u7522\u5730**\uff1a\u53f0\u7063 | **\u898f\u683c**\uff1a20\u7247/\u5305\n**\u7522\u54c1\u7c21\u4ecb**\uff1a\u7d50\u5408\u6eab\u71b1\u6548\u679c\u7684\u6e05\u9ad4\u6392\u6fc1\u8cbc\u5e03\uff0c\u6dfb\u52a0\u591a\u5c64\u77f3\u58a8\u70ef\u7c89\u3001\u591a\u7a2e\u7cbe\u6cb9\u53ca\u8349\u672c\u8403\u53d6\u6210\u5206\uff0c\u8b93\u8eab\u9ad4\u611f\u53d7\u6df1\u5c64\u653e\u9b06\u8207\u8212\u9069\uff0c\u9069\u5408\u5c45\u5bb6\u3001\u8fa6\u516c\u5ba4\u6216\u65c5\u884c\u4e2d\u96a8\u6642\u4f7f\u7528\u3002\n**\u8a73\u7d30\u8aaa\u660e**\uff1a\u4ee5\u591a\u5c64\u77f3\u58a8\u70ef\u7c89\u70ba\u6838\u5fc3\u767c\u71b1\u6750\u6599\uff0c\u642d\u914d\u9ed1\u751f\u8591\u767c\u71b1\u9175\u7d20\u3001\u5929\u5802\u6912\u7c7d\u8403\u53d6\u7269\u3001\u85e4\u9ec3\u679c\u8403\u53d6\u7269\u7b49\u5f37\u5316\u6eab\u71b1\u6548\u679c\uff0c\u4e26\u6dfb\u52a0\u51ac\u7da0\u6a39\u3001\u85b0\u8863\u8349\u3001\u4f5b\u624b\u67d1\u3001\u73ab\u7470\u3001\u8591\u4e94\u7a2e\u7cbe\u6cb9\u8907\u65b9\u3002\n**\u6210\u5206**\uff1a\u591a\u5c64\u77f3\u58a8\u70ef\u7c89\u3001\u51ac\u7da0\u6a39\u7cbe\u6cb9\u3001\u85b0\u8863\u8349\u7cbe\u6cb9\u3001\u4f5b\u624b\u67d1\u7cbe\u6cb9\u3001\u73ab\u7470\u7cbe\u6cb9\u3001\u6c27\u5316\u92c5\u3001\u8591\u7cbe\u6cb9\u3001\u91d1\u9580\u4e00\u689d\u6839\uff08\u95ca\u8449\u5927\u8c46\uff09\u8403\u53d6\u6db2\u3001\u9999\u8349\u4e01\u57fa\u919a\u3001\u7532\u57fa\u786b\u91af\u57fa\u7532\u70f7\uff08MSM\uff09\u3001\u85e4\u9ec3\u679c\u8403\u53d6\u7269\u3001\u9ed1\u751f\u8591\u767c\u71b1\u9175\u7d20\u3001\u5929\u5802\u6912\u7c7d\u8403\u53d6\u7269\u3001\u6a39\u8102\u3001\u6c27\u5316\u92c5\n**\u4f7f\u7528\u65b9\u5f0f**\uff1a\u5c07\u808c\u819a\u6e05\u6f54\u5f8c\uff0c\u8cbc\u65bc\u8abf\u990a\u90e8\u4f4d\uff0c\u6bcf\u6b21\u4f7f\u7528 4\uff5e6 \u5c0f\u6642\u5f8c\u53d6\u4e0b\u3002\n**\u98df\u7528/\u4f7f\u7528\u6642\u6a5f**\uff1a\u4f9d\u7522\u54c1\u8aaa\u660e\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a\u8acb\u8a73\u95b1\u6ce8\u610f\u4e8b\u9805\n**\u904e\u654f\u539f**\uff1a\u5927\u8c46\u53ca\u5176\u88fd\u54c1\n**\u6ce8\u610f\u4e8b\u9805**\uff1a\u8cbc\u5e03\u8acb\u52ff\u91cd\u8907\u4f7f\u7528\u3002\n\n\u8acb\u52ff\u4f7f\u7528\u65bc\u808c\u819a\u50b7\u53e3\u8655\uff0c\u4e26\u8acb\u907f\u958b\u773c\u775b\u5468\u570d\u9ecf\u819c\u90e8\u4f4d\u3002\n\n\u8acb\u7f6e\u65bc\u4e7e\u71e5\u9670\u6dbc\u8655\uff0c\u907f\u514d\u9ad8\u6eab\u53ca\u967d\u5149\u76f4\u5c04\u3002\n\n## \u571f\u8089\u6842\u5be7\u795e\u5fae\u6696\u66a2\u901a\u51dd\u9732150ml(\u5c11\u5973\u6de1\u9999)\n**\u5206\u985e**\uff1a\u4fdd\u990a\u54c1 | **\u7522\u5730**\uff1a\u53f0\u7063 | **\u898f\u683c**\uff1a150ml\n**\u7522\u54c1\u7c21\u4ecb**\uff1a\u4ee5\u571f\u8089\u6842\u690d\u8403\u70ba\u6838\u5fc3\u7684\u6eab\u611f\u51dd\u9732\uff0c\u5857\u62b9\u5f8c\u7522\u751f\u6eab\u71b1\u611f\uff0c\u4e3b\u6253\u6ecb\u990a\u6f64\u6fa4\u3001\u653e\u9b06\u8212\u7de9\u808c\u819a\uff0c\u9069\u7528\u65bc\u8eab\u9ad4\u808c\u819a\u7dca\u7e43\u6216\u4e0d\u9069\u90e8\u4f4d\u3002\n**\u8a73\u7d30\u8aaa\u660e**\uff1a\u6dfb\u52a0\u8089\u6842\u3001\u91d1\u76de\u82b1\u82b1\u63d0\u53d6\u7269\u3001\u6d0b\u7518\u83ca\u63d0\u53d6\u7269\u3001\u8fa3\u6912\u679c\u63d0\u53d6\u7269\u3001\u5c0f\u7c73\u6912\u6a39\u8102\u7b49\u8349\u672c\u6210\u5206\uff0c\u642d\u914d\u9999\u6ab8\u6aac\u3001\u5730\u4e2d\u6d77\u67cf\u6728\u3001\u85b0\u8863\u8349\u4e09\u7a2e\u7cbe\u6cb9\u8907\u65b9\u9999\u6c1b\uff0c\u4f7f\u7528\u5f8c\u7522\u751f\u6301\u7e8c\u6eab\u611f\u3002\n**\u6210\u5206**\uff1a1,3-\u4e19\u4e8c\u9187\u3001\u6c34\u3001\u8089\u6842\u3001\u805a\u4e19\u70ef\u9178\u9209\u3001\u91d1\u76de\u82b1\u82b1\u63d0\u53d6\u7269\u3001\u6d0b\u7518\u83ca\u63d0\u53d6\u7269\u3001\u8fa3\u6912\u679c\u63d0\u53d6\u7269\u3001\u82ef\u6c27\u4e59\u9187\u3001\u9999\u6ab8\u6aac\u679c\u6cb9\u3001\u5c0f\u7c73\u6912\u6a39\u8102\u3001\u5730\u4e2d\u6d77\u67cf\u6728\u8449/\u5805\u679c/\u8396\u6cb9\u3001\u6c2f\u82ef\u7518\u919a\u3001\u85b0\u8863\u8349\u6cb9\u3001o-\u5098\u82b1\u70f4-5-\u9187\u3001EDTA \u4e8c\u9209\n**\u4f7f\u7528\u65b9\u5f0f**\uff1a\u4f7f\u7528\u65bc\u8eab\u9ad4\u808c\u819a\u7dca\u7e43\u8655\uff0c\u900f\u904e\u6309\u6469\u7522\u751f\u6eab\u611f\uff0c\u8212\u7de9\u808c\u819a\u58d3\u529b\n \u65bc\u8eab\u9ad4\u808c\u819a\u8f15\u67d4\u6309\u58d3\uff0c\u53ef\u8212\u7de9\u808c\u819a\u4e0d\u9069\u611f\n**\u98df\u7528/\u4f7f\u7528\u6642\u6a5f**\uff1a\u65e9\u665a\u6e05\u6f54\u5f8c\u4f7f\u7528\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a\u5b30\u5e7c\u5152\n**\u904e\u654f\u539f**\uff1a\u7121\u7279\u5225\u6a19\u793a\n**\u6ce8\u610f\u4e8b\u9805**\uff1a\u672c\u5546\u54c1\u4f7f\u7528\u5f8c\u6703\u6709\u6eab\u611f\u73fe\u8c61\uff0c\u8acb\u914c\u91cf\u4f7f\u7528\u3002\n\n\u4f7f\u7528\u5f8c\u8acb\u5fb9\u5e95\u6e05\u6f54\u96d9\u624b\u3002\n \n\u808c\u819a\u5982\u6709\u7570\u5e38\u73fe\u8c61\u6642\uff0c\u8acb\u52ff\u4f7f\u7528\uff0c\u5982\u7570\u5e38\u611f\u6301\u7e8c\uff0c\u8acb\u6d3d\u8a62\u91ab\u751f\u3002\n \n\u5982\u4e0d\u614e\u5165\u773c\u8acb\u7acb\u523b\u4ee5\u6e05\u6c34\u6c96\u6d17\u4e7e\u6de8\u3002\n\n\u8acb\u7f6e\u65bc\u5b30\u5e7c\u5152\u4e0d\u6613\u53d6\u5f97\u8655\u3002\n\n\u8acb\u52ff\u5b58\u653e\u65bc\u9ad8\u6eab\u53ca\u6f6e\u6fd5\u8655\uff0c\u4e26\u907f\u514d\u967d\u5149\u76f4\u5c04\u3002\n\n\u958b\u5c01\u5f8c\u8acb\u5118\u65e9\u4f7f\u7528\u5b8c\u7562\u3002\n\n## \u758f\u901a\u6d3b\u7d61\u827e\u7078\u88dc\u6c23\u7cbe\u6cb9 100g\n**\u5206\u985e**\uff1a\u4fdd\u990a\u54c1 | **\u7522\u5730**\uff1a\u53f0\u7063 | **\u898f\u683c**\uff1a100g\n**\u7522\u54c1\u7c21\u4ecb**\uff1a\u5929\u4f7f\u5149\u827e\u7078\u88dc\u6c23\u7cbe\u6cb9\uff0c\u6dfb\u52a0\u9f8d\u827e\u7cbe\u6cb9\u3001\u9280\u674f\u8449\u63d0\u53d6\u7269\u3001\u7576\u6b78\u6839\u63d0\u53d6\u7269\u7b49\u8349\u672c\u6210\u5206\uff0c\u9069\u7528\u65bc\u6309\u6469\u3001\u6ce1\u8173\u53ca\u805e\u9999\u54c1\u5473\uff0c\u9054\u5230\u808c\u819a\u4fdd\u990a\u6548\u679c\u3002\n**\u8a73\u7d30\u8aaa\u660e**\uff1a\u542b\u9f8d\u827e\uff08\u72f9\u8449\u9752\u84bf\uff09\u7cbe\u6cb9\u3001\u9280\u674f\u8449\u63d0\u53d6\u7269\u3001\u7576\u6b78\u6839\u63d0\u53d6\u7269\u3001\u9999\u862d\u57fa\u4e01\u57fa\u919a\u7b49\u6d3b\u6027\u6210\u5206\uff0c\u642d\u914d\u751f\u80b2\u915a\u4e59\u9178\u916f\uff08\u7dad\u751f\u7d20E\uff09\u8b77\u819a\uff0c\u8cea\u5730\u70ba\u7cbe\u6cb9\u578b\u614b\uff0c\u53ef\u591a\u7528\u9014\u4f7f\u7528\u3002\n**\u6210\u5206**\uff1a\u805a\u4e59\u4e8c\u9187-8\u30011,3-\u4e19\u4e8c\u9187\u3001\u7518\u6cb9\u805a\u919a-26\u3001\u7518\u6cb9\u3001\u9f8d\u827e\uff08\u72f9\u8449\u9752\u84bf\uff09\u6cb9\u3001\u9280\u674f\u8449\u63d0\u53d6\u7269\u3001\u751f\u80b2\u915a\u4e59\u9178\u916f\u3001\u7576\u6b78\u6839\u63d0\u53d6\u7269\u3001\u9999\u862d\u57fa\u4e01\u57fa\u919a\n**\u4f7f\u7528\u65b9\u5f0f**\uff1a\u53ef\u7528\u65bc\u6309\u6469\u3001\u6ce1\u8173\u6216\u805e\u9999\u54c1\u5473\uff0c\u53d6\u9069\u91cf\u5857\u62b9\u65bc\u6b32\u4fdd\u990a\u90e8\u4f4d\u3002\n**\u98df\u7528/\u4f7f\u7528\u6642\u6a5f**\uff1a\u65e9\u665a\u6e05\u6f54\u5f8c\u4f7f\u7528\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a\u5b30\u5e7c\u5152\n**\u904e\u654f\u539f**\uff1a\u7121\u7279\u5225\u6a19\u793a\n**\u6ce8\u610f\u4e8b\u9805**\uff1a\u808c\u819a\u6709\u50b7\u53e3\u6216\u51fa\u73fe\u6fd5\u75b9\u7b49\u7570\u5e38\u73fe\u8c61\u6642\uff0c\u8acb\u505c\u6b62\u4f7f\u7528\uff0c\u5982\u7570\u5e38\u611f\u6301\u7e8c\uff0c\u8acb\u6d3d\u8a62\u91ab\u751f\u3002\n\n\u8acb\u5c0f\u5fc3\u52ff\u6d41\u5165\u773c\u775b\uff0c\u5982\u4e0d\u614e\u5165\u773c\u8acb\u7acb\u523b\u4ee5\u6e05\u6c34\u6c96\u6d17\u4e7e\u6de8\u3002\n\n\u8acb\u7f6e\u65bc\u5b30\u5e7c\u5152\u4e0d\u6613\u53d6\u5f97\u8655\u3002\n\n\u8acb\u52ff\u5b58\u653e\u65bc\u9ad8\u6eab\u53ca\u6f6e\u6fd5\u8655\uff0c\u4e26\u907f\u514d\u967d\u5149\u76f4\u5c04\u3002\n\n\u958b\u5c01\u5f8c\u8acb\u5118\u65e9\u4f7f\u7528\u5b8c\u7562\u3002\n\n## \u9ad8\u6fc3\u5ea6\u91cf\u5b50\u9382\u7d20 Mg \u5fae\u7b11\u653e\u9b06\u7cbe\u6cb9 (\u9ad8\u6fc3\u5ea6) 110ml\n**\u5206\u985e**\uff1a\u4fdd\u990a\u54c1 | **\u7522\u5730**\uff1a\u53f0\u7063 | **\u898f\u683c**\uff1a110ml\n**\u7522\u54c1\u7c21\u4ecb**\uff1a\u9ad8\u6fc3\u5ea6 8% \u9382\u5143\u7d20\u7d50\u5408\u99ac\u9b31\u862d\u3001\u4f5b\u624b\u67d1\u7b49\u516d\u7a2e\u5929\u7136\u690d\u8403\u7cbe\u6cb9\uff0c\u4f7f\u7528\u5f8c\u7522\u751f\u6eab\u71b1\u6548\u679c\u8212\u7de9\u4e0d\u9069\uff0c\u4e26\u85c9\u7531\u690d\u8403\u9999\u6c1b\u8212\u7de9\u58d3\u529b\uff0c\u9069\u5408\u9700\u8981\u653e\u9b06\u7684\u4f7f\u7528\u8005\u3002\n**\u8a73\u7d30\u8aaa\u660e**\uff1a\u4ee5\u6d77\u6d0b\u6df1\u5c64\u6c34\u70ba\u57fa\u5e95\uff0c\u642d\u914d\u99ac\u9b31\u862d\u3001\u4f5b\u624b\u67d1\u3001\u85b0\u8863\u8349\u3001\u79d8\u9b6f\u9999\u8102\u3001\u6c92\u85e5\u3001\u6d0b\u7518\u83ca\u516d\u7a2e\u7cbe\u6cb9\uff0c\u53e6\u6dfb\u52a0\u85cf\u7d05\u82b1\u6210\u5206\uff0c\u8cea\u5730\u70ba\u7cbe\u6cb9\u578b\u614b\uff0c\u53ef\u5857\u62b9\u65bc\u7a74\u9ede\u6216\u5168\u8eab\u808c\u819a\u3002\n**\u6210\u5206**\uff1a\u4e19\u4e8c\u9187\u3001\u805a\u7518\u6cb9-3\u3001\u7570\u620a\u4e8c\u9187\u3001\u805a\u4e59\u4e8c\u9187-8\u3001\u6d77\u6d0b\u6df1\u5c64\u6c34\u3001\u99ac\u9b31\u862d\u7cbe\u6cb9\u3001\u4f5b\u624b\u67d1\u7cbe\u6cb9\u3001\u85cf\u7d05\u82b1\u3001\u85b0\u8863\u8349\u7cbe\u6cb9\u3001\u79d8\u9b6f\u9999\u8102\u7cbe\u6cb9\u3001\u6c92\u85e5\u7cbe\u6cb9\u3001\u6d0b\u7518\u83ca\u7cbe\u6cb9\n**\u4f7f\u7528\u65b9\u5f0f**\uff1a\u4ee5\u756b\u5713\u65b9\u5f0f\u6309\u6469\u5857\u62b9\u65bc\u808c\u819a\uff0c\u6216\u5857\u62b9\u65bc\u624b\u8155\u3001\u592a\u967d\u7a74\u3001\u524d\u81c2\u7b49\u7a74\u9ede\u8655\uff0c\u4ea6\u53ef\u5857\u62b9\u5728\u8179\u90e8\u4e26\u6309\u6469\u4ee5\u5e6b\u52a9\u808c\u819a\u5438\u6536\u3002\n**\u98df\u7528/\u4f7f\u7528\u6642\u6a5f**\uff1a\u65e9\u665a\u6e05\u6f54\u5f8c\u4f7f\u7528\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a\u5b30\u5e7c\u5152\n**\u904e\u654f\u539f**\uff1a\u7121\u7279\u5225\u6a19\u793a\n**\u6ce8\u610f\u4e8b\u9805**\uff1a\u61f7\u5b55\u7279\u6b8a\u9ad4\u8cea\uff0c\u5efa\u8b70\u8a62\u554f\u904e\u91ab\u5e2b\u518d\u4f7f\u7528\u3002\n\n\u5982\u51fa\u73fe\u7570\u5e38\u73fe\u8c61\uff0c\u8acb\u505c\u6b62\u4f7f\u7528\uff0c\u5982\u7570\u5e38\u611f\u6301\u7e8c\uff0c\u8acb\u6d3d\u8a62\u91ab\u751f\u3002\n\n\u8acb\u7f6e\u65bc\u5b30\u5e7c\u5152\u4e0d\u6613\u53d6\u5f97\u8655\u3002\n\n\u8acb\u52ff\u5b58\u653e\u65bc\u9ad8\u6eab\u53ca\u6f6e\u6fd5\u8655\uff0c\u4e26\u907f\u514d\u967d\u5149\u76f4\u5c04\u3002\n\n\u958b\u5c01\u5f8c\u8acb\u5118\u65e9\u4f7f\u7528\u5b8c\u7562\u3002\n\n## \u91cf\u5b50\u9382\u7d20 \u9f8d\u827e\u62cb\u62cb\u6c34\u7cbe\u6cb9 100ml\n**\u5206\u985e**\uff1a\u4fdd\u990a\u54c1 | **\u7522\u5730**\uff1a\u53f0\u7063 | **\u898f\u683c**\uff1a100ml\n**\u7522\u54c1\u7c21\u4ecb**\uff1a\u4ee5\u8377\u8377\u5df4\u6cb9\u3001\u5fae\u85fb\u6cb9\u70ba\u57fa\u5e95\u7684\u690d\u8403\u8907\u65b9\u7cbe\u6cb9\uff0c\u900f\u904e\u690d\u8403\u7cbe\u6cb9\u642d\u914d\u6309\u6469\u653e\u9b06\u8212\u58d3\uff0c\u8212\u7de9\u5168\u8eab\u808c\u819a\u4e0d\u9069\uff0c\u8b93\u8eab\u5fc3\u653e\u9b06\uff0c\u53ef\u5168\u8eab\u5857\u62b9\u6216\u52a0\u5165\u6ce1\u6fa1\u6c34\u4e2d\u4f7f\u7528\u3002\n**\u8a73\u7d30\u8aaa\u660e**\uff1a\u542b\u9f8d\u827e\u7cbe\u6cb9\u3001\u7d72\u67cf\u7cbe\u6cb9\u3001\u80e1\u6912\u8584\u8377\u7cbe\u6cb9\u3001\u751c\u6a59\u7cbe\u6cb9\u3001\u9999\u8449\u5929\u7afa\u8475\u3001\u73ab\u7470\u8349\u3001\u8461\u8404\u67da\u4e03\u7a2e\u690d\u8403\u7cbe\u6cb9\u8907\u65b9\uff0c\u4ee5\u6d77\u6d0b\u6df1\u5c64\u6c34\u53ca\u7dad\u4ed6\u547dE\u8b77\u819a\uff0c\u8212\u7de9\u6548\u679c\u6eab\u548c\u6301\u4e45\u3002\n**\u6210\u5206**\uff1a\u8377\u8377\u5df4\u6cb9\u3001\u5fae\u85fb\u6cb9\u3001\u7678\u9178\u4e09\u9178\u7518\u6cb9\u916f\u3001\u7d72\u67cf\u7cbe\u6cb9\u3001\u6d77\u6d0b\u6df1\u5c64\u6c34\u3001\u80e1\u6912\u8584\u8377\u7cbe\u6cb9\u3001\u751c\u6a59\u7cbe\u6cb9\u3001\u9999\u8449\u5929\u7afa\u8475\u6cb9\u3001\u84d6\u9ebb\u6cb9\u3001\u9999\u862d\u57fa\u4e01\u57fa\u919a\u3001\u9f8d\u827e\u7cbe\u6cb9\u3001\u8461\u8404\u67da\u7cbe\u6cb9\u3001\u73ab\u7470\u8349\u7cbe\u6cb9\u3001\u7dad\u4ed6\u547dE\n**\u4f7f\u7528\u65b9\u5f0f**\uff1a\u53ef\u4f7f\u7528\u65bc\u5168\u8eab\u808c\u819a\uff0c\u6309\u6469\u81f3\u7cbe\u6cb9\u88ab\u808c\u819a\u5438\u6536\n \u6ce1\u6fa1\u6642\u9069\u91cf\u6ef4\u65bc\u6c34\u4e2d\uff0c\u5e6b\u52a9\u6d3b\u5316\u808c\u819a\n**\u98df\u7528/\u4f7f\u7528\u6642\u6a5f**\uff1a\u65e9\u665a\u6e05\u6f54\u5f8c\u4f7f\u7528\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a\u5b30\u5e7c\u5152\n**\u904e\u654f\u539f**\uff1a\u7121\u7279\u5225\u6a19\u793a\n**\u6ce8\u610f\u4e8b\u9805**\uff1a\u808c\u819a\u6709\u50b7\u53e3\u6216\u51fa\u73fe\u6fd5\u75b9\u7b49\u7570\u5e38\u73fe\u8c61\u6642\uff0c\u8acb\u505c\u6b62\u4f7f\u7528\uff0c\u5982\u7570\u5e38\u611f\u6301\u7e8c\uff0c\u8acb\u6d3d\u8a62\u91ab\u751f\u3002\n\n\u8acb\u5c0f\u5fc3\u52ff\u6d41\u5165\u773c\u775b\uff0c\u5982\u4e0d\u614e\u8aa4\u5165\u773c\u775b\u6216\u8033\u6735\u7b49\u654f\u611f\u90e8\u4f4d\uff0c\u8acb\u7acb\u523b\u5857\u62b9\u5927\u91cf\u690d\u7269\u6cb9\u65bc\u654f\u611f\u90e8\u4f4d\u7a00\u91cb\u6fc3\u5ea6\n\n\u8acb\u7f6e\u65bc\u5b30\u5e7c\u5152\u4e0d\u6613\u53d6\u5f97\u8655\n\n\u8acb\u52ff\u5b58\u653e\u65bc\u9ad8\u6eab\u53ca\u6f6e\u6fd5\u8655\uff0c\u4e26\u907f\u514d\u967d\u5149\u76f4\u5c04\n\n\u958b\u5c01\u5f8c\u8acb\u5118\u65e9\u4f7f\u7528\u5b8c\u7562\n\n## \u5ca9\u862d\u8349\u6efe\u73e0\u958b\u904b\u7cbe\u6cb9(\u767d\u82b1\u6cb9) 10ml\n**\u5206\u985e**\uff1a\u4fdd\u990a\u54c1 | **\u7522\u5730**\uff1a\u53f0\u7063 | **\u898f\u683c**\uff1a10ml/\u74f6\n**\u7522\u54c1\u7c21\u4ecb**\uff1a\u542b\u5ca9\u862d\u8349\u6839\u6cb9\u3001\u8584\u8377\u53ca\u970d\u970d\u5df4\u6cb9\u7684\u8907\u65b9\u690d\u8403\u7cbe\u6cb9\uff0c\u6c23\u5473\u6df1\u6c89\u98fd\u6eff\u5e36\u5927\u5730\u6c23\u606f\uff0c\u5857\u62b9\u5f8c\u5e36\u4f86\u82b3\u9999\u6e05\u6dbc\u611f\u3002\n**\u8a73\u7d30\u8aaa\u660e**\uff1a\u767d\u82b1\u6cb9\u806f\u540d\u7cfb\u5217\uff0c\u4ee5\u5ca9\u862d\u8349\u6839\u6cb9\u70ba\u4e3b\u9ad4\uff0c\u8abf\u914d\u8584\u8377\u8449\u6cb9\u3001\u970d\u970d\u5df4\u7c7d\u6cb9\u3001\u751c\u6241\u6843\u6cb9\u53ca\u8f9b\u9178/\u7678\u9178\u7518\u6cb9\u4e09\u916f\u7b49\u690d\u8403\u6210\u5206\uff0c\u9999\u6c23\u6c89\u7a69\u7642\u7652\u3002\u9069\u540812\u6b72\u4ee5\u4e0a\u4f7f\u7528\u3002\n**\u6210\u5206**\uff1a\u68d5\u6ada\u9178\u4e59\u57fa\u5df1\u916f\u3001\u8584\u8377\u8449\u6cb9\u3001\u7570\u58ec\u9178\u7570\u58ec\u916f\u3001\u5ca9\u862d\u8349\u6839\u6cb9\u3001\u970d\u970d\u5df4\u7c7d\u6cb9\u3001\u8f9b\u9178/\u7678\u9178\u7518\u6cb9\u4e09\u916f\u3001\u751c\u6241\u6843\u6cb9\n**\u4f7f\u7528\u65b9\u5f0f**\uff1a\u53d6\u9069\u91cf\u5857\u62b9\u65bc\u808c\u819a\u8868\u9762\u5373\u53ef\u3002\n**\u98df\u7528/\u4f7f\u7528\u6642\u6a5f**\uff1a\u65e9\u665a\u6e05\u6f54\u5f8c\u4f7f\u7528\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a\u5b30\u5e7c\u5152\n**\u904e\u654f\u539f**\uff1a\u7121\u7279\u5225\u6a19\u793a\n**\u6ce8\u610f\u4e8b\u9805**\uff1a\u9069\u752812\u6b72\u4ee5\u4e0a\u5152\u7ae5\u6216\u6210\u4eba\u3002\n\n\u51fa\u73fe\u7570\u5e38\u73fe\u8c61\u6642\u505c\u6b62\u4f7f\u7528\uff0c\u7570\u5e38\u611f\u6301\u7e8c\u8acb\u6d3d\u8a62\u91ab\u751f\u3002\n\n\u52ff\u5b58\u653e\u65bc\u9ad8\u6eab\u53ca\u6f6e\u6fd5\u8655\uff0c\u907f\u514d\u592a\u967d\u76f4\u63a5\u7167\u5c04\u53ca\u5b30\u5e7c\u5152\u53d6\u5f97\u3002\n\n## \u4f5b\u624b\u67d1\u6efe\u73e0\u9192\u795e\u7cbe\u6cb9(\u767d\u82b1\u6cb9) 10ml\n**\u5206\u985e**\uff1a\u4fdd\u990a\u54c1 | **\u7522\u5730**\uff1a\u53f0\u7063 | **\u898f\u683c**\uff1a10ml/\u74f6\n**\u7522\u54c1\u7c21\u4ecb**\uff1a\u542b\u4f5b\u624b\u67d1\u3001\u8461\u8404\u67da\u3001\u85b0\u8863\u8349\u53ca\u8584\u8377\u7684\u8907\u65b9\u690d\u8403\u7cbe\u6cb9\uff0c\u9999\u5473\u6e05\u65b0\u517c\u5177\u82b1\u9999\u8207\u6728\u8cea\u8abf\uff0c\u5857\u62b9\u5f8c\u5e36\u4f86\u82b3\u9999\u6e05\u6dbc\u611f\u3002\n**\u8a73\u7d30\u8aaa\u660e**\uff1a\u767d\u82b1\u6cb9\u806f\u540d\u7cfb\u5217\uff0c\u4ee5\u4f5b\u624b\u67d1\u679c\u6cb9\u3001\u8461\u8404\u67da\u679c\u76ae\u6cb9\u70ba\u4e3b\u9999\u8abf\uff0c\u642d\u914d\u8fa3\u8584\u8377\u6cb9\u3001\u85b0\u8863\u8349\u6cb9\u3001\u6a1f\u6a39\u6a39\u76ae\u6cb9\u3001\u6ab8\u6aac\u9999\u8305\u8449\u6cb9\u53ca\u970d\u970d\u5df4\u7c7d\u6cb9\u7b49\u591a\u7a2e\u690d\u8403\u7cbe\u6cb9\uff0c\u6e05\u65b0\u63d0\u632f\u3002\n**\u6210\u5206**\uff1a\u68d5\u6ada\u9178\u7570\u4e19\u916f\u3001\u8584\u8377\u9187\u3001\u8461\u8404\u67da\u679c\u76ae\u6cb9\u3001\u6a1f\u6a39\u6a39\u76ae\u6cb9\u3001\u8fa3\u8584\u8377\u6cb9\u3001\u8f9b\u9178/\u7678\u9178\u7518\u6cb9\u4e09\u916f\u3001\u4f5b\u624b\u67d1\u679c\u6cb9\u3001\u6ab8\u6aac\u9999\u8305\u8449\u6cb9\u3001\u6ab8\u6aac\u679c\u76ae\u6cb9\u3001\u85b0\u8863\u8349\u6cb9\u3001\u970d\u970d\u5df4\u7c7d\u6cb9\n**\u4f7f\u7528\u65b9\u5f0f**\uff1a\u53d6\u9069\u91cf\u5857\u62b9\u65bc\u808c\u819a\u8868\u9762\u5373\u53ef\u3002\n**\u98df\u7528/\u4f7f\u7528\u6642\u6a5f**\uff1a\u65e9\u665a\u6e05\u6f54\u5f8c\u4f7f\u7528\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a\u5b30\u5e7c\u5152\n**\u904e\u654f\u539f**\uff1a\u7121\u7279\u5225\u6a19\u793a\n**\u6ce8\u610f\u4e8b\u9805**\uff1a\u9069\u752812\u6b72\u4ee5\u4e0a\u5152\u7ae5\u6216\u6210\u4eba\u3002\n\n\u51fa\u73fe\u7570\u5e38\u73fe\u8c61\u6642\u505c\u6b62\u4f7f\u7528\uff0c\u7570\u5e38\u611f\u6301\u7e8c\u8acb\u6d3d\u8a62\u91ab\u751f\u3002\n\n\u52ff\u5b58\u653e\u65bc\u9ad8\u6eab\u53ca\u6f6e\u6fd5\u8655\uff0c\u907f\u514d\u592a\u967d\u76f4\u63a5\u7167\u5c04\u53ca\u5b30\u5e7c\u5152\u53d6\u5f97\u3002\n\n## \u9748\u829d\u591a\u91a3\u9ad4\u767c\u6ce1\u9320(4g*10\u9320/\u7ba1)\n**\u5206\u985e**\uff1a\u4fdd\u5065\u98df\u54c1 | **\u7522\u5730**\uff1a\u53f0\u7063 | **\u898f\u683c**\uff1a4g/\u9320\uff0c10\u9320/\u7ba1\n**\u7522\u54c1\u7c21\u4ecb**\uff1a\u542b\u9748\u829d\u591a\u91a3\u9ad4\u3001\u7dad\u751f\u7d20C\u3001\u7dad\u751f\u7d20D\u53ca\u92c5\u7684\u767c\u6ce1\u9320\uff0c\u6eb6\u65bc\u6c34\u98f2\u7528\uff0c\u65b9\u4fbf\u88dc\u5145\u6bcf\u65e5\u6240\u9700\u71df\u990a\u3002\n**\u8a73\u7d30\u8aaa\u660e**\uff1a\u6dfb\u52a0\u9748\u829d\u83cc\u7d72\u9ad4\u767c\u9175\u6db2\u591a\u91a3\u9ad4\u8403\u53d6\u7269\uff0c\u642d\u914d\u7dad\u751f\u7d20C\u3001\u7dad\u751f\u7d20D 800IU\u53ca\u92c5\uff0c\u6eb6\u65bc\u6c34\u5f8c\u98f2\u7528\uff0c\u9069\u5408\u65e5\u5e38\u514d\u75ab\u529b\u8207\u5065\u5eb7\u7dad\u6301\u3002\n**\u6210\u5206**\uff1a\u6297\u58de\u8840\u9178\uff08\u7dad\u751f\u7d20C\uff09\u3001D-\u5c71\u68a8\u9187\u3001\u78b3\u9178\u6c2b\u9209\u3001\u591a\u91a3\u9ad4\u8403\u53d6\u7269\uff08\u9748\u829d\u83cc\u7d72\u9ad4\u767c\u9175\u6db2\u3001\u96e3\u6d88\u5316\u6027\u9ea5\u82bd\u7cca\u7cbe\uff09\u3001\u6ab8\u6aac\u9178\u3001\u9152\u77f3\u9178\u3001\u805a\u4e59\u4e8c\u9187\u3001\u6a58\u5b50\u7c89\u672b\u9999\u6599\u3001\u786b\u9178\u92c5\u3001\u918b\u78fa\u5167\u916f\u9240\uff08\u751c\u5473\u5291\uff09\u3001\u8517\u7cd6\u7d20\uff08\u751c\u5473\u5291\uff09\u3001\u7dad\u751f\u7d20D3\n**\u4f7f\u7528\u65b9\u5f0f**\uff1a\u6bcf\u65e51\u9320\uff0c\u4ee5150mL\u51b7\uff08\u6eab\uff09\u6c34\u6c96\u6ce1\u6eb6\u89e3\u5f8c\u98f2\u7528\u3002\n**\u98df\u7528/\u4f7f\u7528\u6642\u6a5f**\uff1a\u4f9d\u7522\u54c1\u8aaa\u660e\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a\u8acb\u8a73\u95b1\u6ce8\u610f\u4e8b\u9805\n**\u904e\u654f\u539f**\uff1a\u7121\u7279\u5225\u6a19\u793a\n**\u6ce8\u610f\u4e8b\u9805**\uff1a\u4e00\u65e5\u8acb\u52ff\u8d85\u904e1\u9320\u3002\n\n\u672c\u54c1\u5bb9\u6613\u53d7\u6f6e\uff0c\u958b\u5c01\u5f8c\u8acb\u5118\u65e9\u4f7f\u7528\u3002\n\n\u74f6\u84cb\u5167\u90e8\u7a81\u8d77\u8655\u542b\u4e7e\u71e5\u5291\u8acb\u52ff\u6253\u958b\u3002\n\n\u767c\u6ce1\u9320\u8acb\u52ff\u76f4\u63a5\u541e\u98df\u3002\n\n\u8acb\u7f6e\u65bc\u9670\u6dbc\u4e7e\u71e5\u53ca\u5152\u7ae5\u7121\u6cd5\u53d6\u5f97\u8655\uff0c\u907f\u514d\u9ad8\u6eab\u53ca\u967d\u5149\u76f4\u5c04\u3002\n\n## \u52c1\u91cf\u5feb\u5145\u96fb\u89e3\u6c34(8g*8\u5305/\u76d2)\n**\u5206\u985e**\uff1a\u4fdd\u5065\u98df\u54c1 | **\u7522\u5730**\uff1a\u53f0\u7063 | **\u898f\u683c**\uff1a8g/\u5305\uff0c8\u5305/\u76d2\n**\u7522\u54c1\u7c21\u4ecb**\uff1a\u542b\u9748\u829d\u591a\u91a3\u9ad4\u7684\u6db2\u614b\u96fb\u89e3\u6c34\u88dc\u5145\u54c1\uff0c\u7121\u5496\u5561\u56e0\uff0c\u9069\u5408\u904b\u52d5\u88dc\u5145\u80fd\u91cf\u8207\u96fb\u89e3\u8cea\u3002\n**\u8a73\u7d30\u8aaa\u660e**\uff1a\u4ee5\u6db2\u614b\u5438\u6536\u5feb\u901f\uff0c\u4ee5\u88dc\u5145\u80fd\u91cf\u53d6\u4ee3\u9810\u652f\u80fd\u91cf\u70ba\u8a34\u6c42\u3002\n\n\u542b\u9748\u829d\u591a\u91a3\u9ad4\u83cc\u7d72\u9ad4\u8403\u53d6\u7c89\u672b\u3001\u7d9c\u5408\u7dad\u751f\u7d20\u53ca\u96fb\u89e3\u8cea\uff0c\u9069\u5408\u904b\u52d5\u524d\u5f8c\u88dc\u5145\u3002\n**\u6210\u5206**\uff1a\u8461\u8404\u7cd6\u3001\u9ea5\u82bd\u7cca\u7cbe\u3001\u591a\u91a3\u9ad4\u8403\u53d6\u7c89\u672b\uff08\u9748\u829d\u83cc\u7d72\u9ad4\u6db2\u614b\u57f9\u990a\uff09\u3001\u98df\u9e7d\uff08\u6c2f\u5316\u9209\u3001\u7898\u9178\u9240\uff09\u3001\u6ab8\u6aac\u9178\u3001\u6ab8\u6aac\u9999\u6599\u7c89\u3001\u6d77\u85fb\u9223\u3001\u6c2f\u5316\u9240\u3001\u725b\u78fa\u9178\u3001\u7d9c\u5408\u7dad\u751f\u7d20\uff08\u7dad\u751f\u7d20C\u3001E\u3001A\u3001B1\u3001B2\u3001B6\u3001B12\u3001D3\u3001K1\u3001\u83f8\u9e7c\u91af\u80fa\u3001\u672c\u591a\u9178\u9223\u3001\u8449\u9178\u3001\u751f\u7269\u7d20\uff09\u3001\u4e8c\u6c27\u5316\u77fd\u3001\u8517\u7cd6\u7d20\n**\u4f7f\u7528\u65b9\u5f0f**\uff1a\u6bcf\u5305\u4ee5250cc\u51b7\u6c34\u6216\u6eab\u6c34\u6c96\u6ce1\u70ba1\u4efd\uff0c\u6bcf1-2\u5c0f\u6642\u904b\u52d5\u88dc\u51451\u4efd\uff0c\u53ef\u4f9d\u9700\u6c42\u8abf\u6574\uff0c\u6bcf\u65e5\u88dc\u5145\u4e0d\u8d85\u904e4\u4efd\u3002\n**\u98df\u7528/\u4f7f\u7528\u6642\u6a5f**\uff1a\u4f9d\u7522\u54c1\u8aaa\u660e\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a\u8acb\u8a73\u95b1\u6ce8\u610f\u4e8b\u9805\n**\u904e\u654f\u539f**\uff1a\u7121\u7279\u5225\u6a19\u793a\n**\u6ce8\u610f\u4e8b\u9805**\uff1a\u8acb\u7f6e\u65bc\u9670\u6dbc\u8655\uff0c\u907f\u514d\u967d\u5149\u7167\u5c04\u3002\n\n## \u5927\u6fc0\u8cde\u7d0d\u8c46Q10\u81a0\u56ca 30\u9846/\u74f6\n**\u5206\u985e**\uff1a\u4fdd\u5065\u98df\u54c1 | **\u7522\u5730**\uff1a\u53f0\u7063 | **\u898f\u683c**\uff1a550\u6beb\u514b/\u7c92\uff0c30\u7c92/\u74f6\n**\u7522\u54c1\u7c21\u4ecb**\uff1a\u542b\u9ad8\u55ae\u4f4d\u7d0d\u8c46\u6fc0\u9176\u3001\u8f14\u9176\u7d20Q10\u53ca\u9178\u68d7\u4ec1\u8403\u53d6\u7684\u4fdd\u5065\u81a0\u56ca\uff0c\u5e6b\u52a9\u8abf\u6574\u9ad4\u8cea\u4e26\u8f14\u52a9\u5165\u7761\u3002\n**\u8a73\u7d30\u8aaa\u660e**\uff1a\u6bcf\u514b4000FU\u4ee5\u4e0a\u7684\u7d0d\u8c46\u8403\u53d6\u7269\uff0c\u642d\u914d\u9752\u9999\u8549\u6fb1\u7c89\u3001\u8f14\u9176\u7d20Q10\u3001\u8272\u80fa\u9178\u53ca\u9178\u68d7\u4ec1\u8403\u53d6\u7269\u3001\u9280\u674f\u679c\u8403\u53d6\u7269\u3001\u7d05\u666f\u5929\u8403\u53d6\u7269\u7b49\u8907\u65b9\u6210\u5206\uff0c\u6709\u7d0d\u8c46\u83cc\u6578\u53ca\u6d3b\u6027\u76f8\u95dc\u6aa2\u6e2c\u5831\u544a\u3002\n**\u6210\u5206**\uff1a\u9ea5\u82bd\u7cca\u7cbe\u3001\u7d0d\u8c46\u63d0\u53d6\u7269\uff08\u7d0d\u8c46\u6fc0\u9176\u3001\u7d0d\u8c46\u76ca\u83cc\u3001\u7cca\u7cbe\uff09\u3001\u9752\u9999\u8549\u6fb1\u7c89\u3001\u8f14\u9176\u7d20Q10\u3001\u8272\u80fa\u9178\u3001\u9178\u68d7\u4ec1\u8403\u53d6\u7269\u3001\u9280\u674f\u679c\u8403\u53d6\u7269\u3001\u7d05\u666f\u5929\u8403\u53d6\u7269\u3001\u8461\u8404\u7c7d\u8403\u53d6\u7269\u3002\u81a0\u56ca\u6210\u5206\uff1a\u7fa5\u4e19\u57fa\u7532\u57fa\u7e96\u7dad\u7d20\u3001\u7d14\u6c34\u3001\u9e7f\u89d2\u83dc\u81a0\u3001\u4e8c\u6c27\u5316\u9226\u3001\u6c2f\u5316\u9240\n**\u4f7f\u7528\u65b9\u5f0f**\uff1a\u6bcf\u65e52\u6b21\uff0c\u6bcf\u6b211\u7c92\uff0c\u642d\u914d\u6eab\u958b\u6c34\u98df\u7528\u3002\n**\u98df\u7528/\u4f7f\u7528\u6642\u6a5f**\uff1a\u4f9d\u7522\u54c1\u8aaa\u660e\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a\u54fa\u4e73\u5a66\u5973\u3001\u76f8\u95dc\u6210\u5206\u904e\u654f\u8005\n**\u904e\u654f\u539f**\uff1a\u7121\u7279\u5225\u6a19\u793a\n**\u6ce8\u610f\u4e8b\u9805**\uff1a15\u6b72\u4ee5\u4e0b\u5b69\u7ae5\u3001\u61f7\u5b55\u6216\u54fa\u4e73\u5a66\u5973\u53ca\u670d\u7528\u6297\u51dd\u8840\u85e5\u54c1\uff08warfarin\uff09\u60a3\u8005\u4e0d\u5b9c\u98df\u7528\u3002\n\n\u91cd\u5927\u75be\u75c5\u53ca\u7279\u6b8a\u9ad4\u8cea\u8005\u8acb\u5148\u8aee\u8a62\u91ab\u85e5\u4eba\u54e1\u3002\n\n\u672c\u7522\u54c1\u975e\u85e5\u54c1\uff0c\u7f79\u75c5\u8005\u4ecd\u9700\u5c31\u91ab\u3002\n\n\u904e\u654f\u539f\uff1a\u542b\u5927\u8c46\u3001\u5805\u679c\u985e\u53ca\u5176\u88fd\u54c1\u3002\n\n## \u5927\u6fc0\u8cde\u8461\u8404\u7cd6\u80fa\u6b65\u6b65\u9806\u81a0\u56ca 30\u9846/\u74f6\n**\u5206\u985e**\uff1a\u4fdd\u5065\u98df\u54c1 | **\u7522\u5730**\uff1a\u53f0\u7063 | **\u898f\u683c**\uff1a600mg*30\u9846/\u74f6\n**\u7522\u54c1\u7c21\u4ecb**\uff1a\u542b\u8461\u8404\u7cd6\u80fa\u3001\u9bca\u9b5a\u8edf\u9aa8\u7c89\u3001MSM\u53ca\u4e8c\u578b\u81a0\u539f\u86cb\u767d\u7684\u95dc\u7bc0\u4fdd\u5065\u81a0\u56ca\uff0c\u8907\u65b9\u6210\u5206\u9054\u5230\u9748\u6d3b\u95dc\u9375\u3002\n**\u8a73\u7d30\u8aaa\u660e**\uff1a\u8461\u8404\u7cd6\u80fa\u642d\u914d\u9bca\u9b5a\u8edf\u9aa8\u7d20\u3001MSM\uff08\u7532\u57fa\u786b\u91af\u57fa\u7532\u70f7\uff09\u3001\u8591\u9ec3\u8403\u53d6\u7c89\u3001\u4e8c\u578b\u81a0\u539f\u86cb\u767d\u3001\u9b5a\u9c57\u9223\u53ca\u7dad\u751f\u7d20D\u7b49\u591a\u91cd\u8907\u65b9\u6210\u5206\uff0c\u5168\u9762\u652f\u6301\u95dc\u7bc0\u5065\u5eb7\u3002\n**\u6210\u5206**\uff1a\u8461\u8404\u7cd6\u80fa\uff08\u8461\u8404\u7cd6\u80fa\u9e7d\u9178\u9e7d\u3001\u805a\u4e59\u70ef\u5421\u54af\u70f7\u916e\uff09\u3001\u9cf3\u68a8\u8403\u53d6\u7269\uff08\u542b\u9cf3\u68a8\u9175\u7d20\uff09\u3001\u9bca\u9b5a\u8edf\u9aa8\u7d20\u3001\u78b3\u9178\u9223\u3001MSM\u3001\u8591\u9ec3\u8403\u53d6\u7c89\uff08\u542b\u8591\u9ec3\u7d20\uff09\u3001\u4e8c\u578b\u81a0\u539f\u86cb\u767d\uff08U.C-KOLLA-II\uff09\u3001\u9b5a\u9c57\u9223\u3001\u786c\u8102\u9178\u9382\u3001\u7dad\u751f\u7d20D\u3001\u7d9c\u5408\u7926\u7269\u8cea\uff08\u78b3\u9178\u9223\u3001\u6c27\u5316\u9382\u3001\u8461\u8404\u7cd6\u9178\u92c5\u3001\u7126\u78f7\u9178\u9435\u3001\u7852\u9175\u6bcd\u3001\u927b\u9175\u6bcd\uff09\u3002\u81a0\u56ca\u6210\u5206\uff1a\u660e\u81a0\u3001\u4e8c\u6c27\u5316\u9226\u3001\u98df\u7528\u7d05\u8272\u516d\u865f\u3001\u7518\u6cb9\u7b49\n**\u4f7f\u7528\u65b9\u5f0f**\uff1a\u6bcf\u65e52\u6b21\uff0c\u6bcf\u6b211\u7c92\uff0c\u591a\u98df\u7121\u76ca\u3002\n**\u98df\u7528/\u4f7f\u7528\u6642\u6a5f**\uff1a\u4f9d\u7522\u54c1\u8aaa\u660e\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a\u8acb\u8a73\u95b1\u6ce8\u610f\u4e8b\u9805\n**\u904e\u654f\u539f**\uff1a\u86cb\u53ca\u5176\u88fd\u54c1\u3001\u9b5a\u985e\u53ca\u5176\u88fd\u54c1\n**\u6ce8\u610f\u4e8b\u9805**\uff1a\u8acb\u5b58\u653e\u65bc\u9670\u6dbc\u4e7e\u71e5\u8655\uff0c\u907f\u514d\u9ad8\u6eab\u53ca\u967d\u5149\u7167\u5c04\u3002\n\n\u62c6\u5c01\u5f8c\u61c9\u5118\u901f\u98df\u7528\u5b8c\u7562\u3002\n\n## \u5927\u6fc0\u8cde\u5143\u6c23\u7d05\u6f64\u81a0\u56ca 30\u9846/\u74f6\n**\u5206\u985e**\uff1a\u4fdd\u5065\u98df\u54c1 | **\u7522\u5730**\uff1a\u53f0\u7063 | **\u898f\u683c**\uff1a500mg*30\u9846/\u74f6\n**\u7522\u54c1\u7c21\u4ecb**\uff1a\u542b\u7518\u6c28\u9178\u4e9e\u9435\u3001\u8907\u65b9\u7dad\u751f\u7d20C\u53ca\u5564\u9152\u9175\u6bcdB\u7fa4\u7684\u88dc\u9435\u88dc\u8840\u81a0\u56ca\uff0c\u5e6b\u52a9\u8abf\u6574\u9ad4\u8cea\u3001\u7dad\u6301\u6d3b\u529b\u597d\u6c23\u8272\u3002\n**\u8a73\u7d30\u8aaa\u660e**\uff1a\u6bcf\u9846\u542b\u9435\u8cea10mg\uff08\u7518\u6c28\u9178\u4e9e\u943550mg\uff09\u3001\u8907\u65b9\u7dad\u751f\u7d20C 32.5mg\u3001\u5564\u9152\u9175\u6bcdB\u7fa488.5mg\uff0c\u53e6\u542b\u7852\u9175\u6bcd\u53ca\u92c5\u9175\u6bcd\uff0c\u5e6b\u52a9\u7dad\u6301\u6c23\u8272\u8207\u71df\u990a\u88dc\u7d66\u3002\n**\u6210\u5206**\uff1a\u78f7\u9178\u6c2b\u9223\u3001\u5fae\u7d50\u6676\u7e96\u7dad\u7d20\u3001\u5564\u9152\u9175\u6bcdB\u7fa4\u3001\u7852\u9175\u6bcd\u3001\u8907\u65b9\u7dad\u751f\u7d20C\uff08\u6297\u58de\u8840\u9178\u3001\u67d1\u6a58\u8403\u53d6\u7269\u3001\u7c73\u7ce0\u7c89\uff09\u3001\u7518\u80fa\u9178\u4e9e\u9435\u3001\u92c5\u9175\u6bcd\u3001\u91cd\u9152\u77f3\u9178\u81bd\u9e7c\u3002\u81a0\u56ca\u6210\u5206\uff1a\u660e\u81a0\u3001\u4e8c\u6c27\u5316\u9226\u3001\u7518\u6cb9\u3001\u786b\u9178\u6708\u6842\u916f\u9209\u3001\u7d14\u6c34\n**\u4f7f\u7528\u65b9\u5f0f**\uff1a\u6bcf\u65e51\u6b21\uff0c\u6bcf\u6b211\u7c92\uff0c\u591a\u98df\u7121\u76ca\u3002\n**\u98df\u7528/\u4f7f\u7528\u6642\u6a5f**\uff1a\u4f9d\u7522\u54c1\u8aaa\u660e\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a\u8acb\u8a73\u95b1\u6ce8\u610f\u4e8b\u9805\n**\u904e\u654f\u539f**\uff1a\u7121\u7279\u5225\u6a19\u793a\n**\u6ce8\u610f\u4e8b\u9805**\uff1a\u8acb\u5b58\u653e\u65bc\u9670\u6dbc\u4e7e\u71e5\u8655\uff0c\u907f\u514d\u9ad8\u6eab\u53ca\u967d\u5149\u7167\u5c04\u3002\n\n\u62c6\u5c01\u5f8c\u61c9\u5118\u901f\u98df\u7528\u5b8c\u7562\u3002\n\n## \u6a59\u9577\u9223(2g*30\u5305/\u76d2)\n**\u5206\u985e**\uff1a\u4fdd\u5065\u98df\u54c1 | **\u7522\u5730**\uff1a\u53f0\u7063 | **\u898f\u683c**\uff1a2g*30\u5305/\u76d2\n**\u7522\u54c1\u7c21\u4ecb**\uff1a\u542b\u6d77\u85fb\u9223\u3001\u6c27\u5316\u9382\u53ca\u7dad\u751f\u7d20D3\u7684\u67f3\u6a59\u53e3\u5473\u88dc\u9223\u7c89\u5305\uff0c\u6bcf\u4efd\u542b172mg\u9223\u8cea\u53ca85mg\u9382\uff0c\u5e6b\u52a9\u9aa8\u9abc\u4fdd\u5065\u3002\n**\u8a73\u7d30\u8aaa\u660e**\uff1a\u4ee5\u6d77\u85fb\u9223\u70ba\u4e3b\u8981\u9223\u8cea\u4f86\u6e90\uff0c\u642d\u914d\u6d77\u6d0b\u6df1\u5c64\u6c34\u6fc3\u7e2e\u7269\u3001\u916a\u86cb\u767d\u78f7\u9178\u80dc\u80bd\uff08CPP\uff09\u53ca\u5fae\u7c73\u73cd\u73e0\u7c89\uff0c\u6dfb\u52a0\u7dad\u751f\u7d20D3\u5e6b\u52a9\u9223\u8cea\u5438\u6536\uff0c\u8907\u65b9\u88dc\u5145\u6548\u679c\u512a\u65bc\u55ae\u65b9\u9223\u8cea\u88dc\u5145\u54c1\u3002\n**\u6210\u5206**\uff1a\u67f3\u6a59\u679c\u6c41\u7c89\uff08\u7802\u7cd6\u3001\u67f3\u6a59\u6fc3\u7e2e\u679c\u6c41\u3001\u9ea5\u82bd\u7cca\u7cbe\u3001\u8f9b\u70ef\u57fa\u4e01\u4e8c\u9178\u9209\u6fb1\u7c89\u3001\u6ab8\u6aac\u9178\u3001\u6ab8\u6aac\u9178\u9209\u3001\u7389\u7c73\u6fb1\u7c89\u3001\u860b\u679c\u9178\u3001\u6a58\u5b50\u6cb9\u3001\u03b2-\u80e1\u863f\u8514\u7d20\u3001\u963f\u62c9\u4f2f\u81a0\u3001\u4e2d\u93c8\u4e09\u9178\u7518\u6cb9\u916f\u3001\u7dad\u751f\u7d20C\uff08\u6297\u6c27\u5316\u5291\uff09\u3001\u4e8c\u6c27\u5316\u77fd\u3001\u7dad\u751f\u7d20E\uff08\u6297\u6c27\u5316\u5291\uff09\uff09\u3001\u6d77\u85fb\u9223\u3001\u6d77\u6d0b\u6df1\u5c64\u6c34\u6fc3\u7e2e\u7269\uff08\u5fae\u7d50\u6676\u7e96\u7dad\u7d20\u3001\u6d77\u6d0b\u6df1\u5c64\u6c34\u6fc3\u7e2e\u6db2\u3001\u7fa5\u4e19\u57fa\u7532\u57fa\u7e96\u7dad\u7d20\u3001\u4e8c\u6c27\u5316\u77fd\uff09\u3001\u83ca\u82e3\u7e96\u7dad\u3001\u7dad\u751f\u7d20D3\uff08\u8f9b\u70ef\u57fa\u4e01\u4e8c\u9178\u9209\u6fb1\u7c89\u3001\u8517\u7cd6\u3001\u7dad\u751f\u7d20C\uff08\u6297\u6c27\u5316\u5291\uff09\u3001\u4e2d\u93c8\u4e09\u9178\u7518\u6cb9\u916f\u3001\u4e8c\u6c27\u5316\u77fd\u3001\u7dad\u751f\u7d20E\uff08\u6297\u6c27\u5316\u5291\uff09\u3001\u7dad\u751f\u7d20D3\u3001\u9ea5\u82bd\u7cca\u7cbe\uff09\u3001\u916a\u86cb\u767d\u78f7\u9178\u80bd\n**\u9069\u7528\u5e74\u9f61**\uff1a1\u6b72\u4ee5\u4e0a\u5152\u7ae5\u5373\u53ef\u88dc\u5145\uff1b\u672a\u6eff1\u6b72\u5efa\u8b70\u5148\u8aee\u8a62\u5152\u79d1\u91ab\u5e2b\n**\u4f7f\u7528\u65b9\u5f0f**\uff1a\u65e9\u9910\u98ef\u5f8c\u4e00\u6b21\uff0c\u6bcf\u6b21\u4e00\u5305\u3002\n**\u98df\u7528/\u4f7f\u7528\u6642\u6a5f**\uff1a\u65e9\u9910\u5f8c\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a\u76f8\u95dc\u6210\u5206\u904e\u654f\u8005\n**\u904e\u654f\u539f**\uff1a\u725b\u4e73\u53ca\u5176\u88fd\u54c1\u3001\u86cb\u53ca\u5176\u88fd\u54c1\n**\u6ce8\u610f\u4e8b\u9805**\uff1a\u8acb\u653e\u7f6e\u9670\u6dbc\u4e7e\u71e5\u8655\uff0c\u907f\u514d\u9ad8\u6eab\u53ca\u967d\u5149\u76f4\u5c04\u3002\n\n\u904e\u654f\u539f\uff1a\u542b\u725b\u4e73\u53ca\u5176\u88fd\u54c1\u3002\n\n## \u8070\u660e\u591a\u591a\u76ca\u83cc\u7403 (50g/\u593e\u93c8\u5305) (\u4e73\u9178\u83cc\u591a\u591a)\n**\u5206\u985e**\uff1a\u4fdd\u990a\u54c1 | **\u7522\u5730**\uff1a\u53f0\u7063 | **\u898f\u683c**\uff1a2.5g*20\u9846/\u5305\n**\u7522\u54c1\u7c21\u4ecb**\uff1a\u76ca\u83cc\u7403\u70ba\u53f0\u7063\u88fd\u9020\u7684\u76ca\u751f\u83cc\u8edf\u7cd6\uff0c\u542b225\u5104\u71b1\u5c01\u578b\u76ca\u751f\u83cc\u8207\u570b\u969b\u5c08\u5229Lbiome\u00ae\u914d\u65b9\uff0c\u9069\u5408\u5168\u5bb6\u65e5\u5e38\u88dc\u5145\uff0c\u7dad\u6301\u6d88\u5316\u9053\u6a5f\u80fd\u3002\n**\u8a73\u7d30\u8aaa\u660e**\uff1a\u63a1\u7528225\u5104\u71b1\u5c01\u578b\u76ca\u751f\u83cc\uff0c\u7d50\u5408\u570b\u969b\u5c08\u5229Lbiome\u00ae\u53ca\u9382\u5143\u7d20\uff0c\u4e26\u6dfb\u52a0\u9ad8\u6fc3\u5ea6\u539f\u82b1\u9752\u7d20\u4ee5\u63d0\u5347\u5438\u6536\u6548\u679c\u3002\n\n\u7522\u54c1\u4e3b\u6253\u7dad\u6301\u6d88\u5316\u9053\u6a5f\u80fd\u3001\u63d0\u9ad8\u8178\u9053\u5438\u6536\u7387\uff0c\u53e3\u611f\u70ba\u8edf\u7cd6\u7403\u5f62\u5f0f\uff0c\u65b9\u4fbf\u5152\u7ae5\u53ca\u6210\u4eba\u98df\u7528\u3002\u63d0\u4f9b\u5169\u7a2e\u53e3\u5473\u9078\u64c7\uff1a\u4e73\u9178\u83cc\u591a\u591a\u53e3\u5473\u53caD+\u9223\u8349\u8393\u53e3\u5473\u3002\n**\u6210\u5206**\uff1a\u7802\u7cd6\u3001\u9ea5\u82bd\u7cd6\u3001\u6930\u5b50\u6cb9\u3001\u660e\u81a0\u3001\u6ab8\u6aac\u9178\uff08\u8abf\u5473\u5291\uff09\u3001\u8907\u5408\u4e73\u9178\u83cc\uff08\u4e73\u7cd6\u3001\u9175\u6bcd\u8403\u53d6\u7269\u3001Lactobacillus fermentum\u3001Lactobacillus delbrueckii subsp. Lactis\uff09\u3001\u4e73\u9178\u3001\u918b\u9178\u9209\u3001\u6c34\u89e3\u916a\u86cb\u767d\u3001\u78b3\u9178\u9223\u3001\u78f7\u9178\u6c2b\u4e8c\u9240\u3001\u6c27\u5316\u9382\u3001\u677e\u6a39\u76ae\u8403\u53d6\u7269\u3001\u5976\u7c89\u3001\u7149\u4e73\u3001\u9999\u6599\u3001\u7dad\u751f\u7d20C\uff08\u6297\u6c27\u5316\u5291\uff09\u3001\u679c\u5be1\ u65bc\u6210\u4eba\u76e3\u8b77\u4e0b\u98df\u7528\u3002\n**\u98df\u7528/\u4f7f\u7528\u6642\u6a5f**\uff1a\u4f9d\u7522\u54c1\u8aaa\u660e\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a\u76f8\u95dc\u6210\u5206\u904e\u654f\u8005\n**\u904e\u654f\u539f**\uff1a\u725b\u4e73\u53ca\u5176\u88fd\u54c1\u3001\u86cb\u53ca\u5176\u88fd\u54c1\n**\u6ce8\u610f\u4e8b\u9805**\uff1a\u672c\u7522\u54c1\u542b\u5976\u985e\u3001\u542b\u9ea9\u8cea\u4e4b\u7a40\u7269\u3001\u5927\u8c46\u53ca\u5176\u88fd\u54c1\uff0c\u4e0d\u9069\u5408\u76f8\u95dc\u904e\u654f\u9ad4\u8cea\u8005\u98df\u7528\u3002\n\n\u8acb\u7f6e\u65bc\u4e7e\u71e5\u9670\u6dbc\u8655\uff0c\u907f\u514d\u9ad8\u6eab\u53ca\u967d\u5149\u76f4\u5c04\u3002\n\n## \u725b\u6a1f\u829d\u5143\u6c23\u80fd\u91cf\u7403(50\u514b/\u5305)\n**\u5206\u985e**\uff1a\u4fdd\u5065\u98df\u54c1 | **\u7522\u5730**\uff1a\u53f0\u7063 | **\u898f\u683c**\uff1a2.5g*20\u9846/\u5305\n**\u7522\u54c1\u7c21\u4ecb**\uff1a\u542b\u725b\u6a1f\u829d\u83cc\u7d72\u9ad4\u3001\u795e\u4ed9\u83dc\u8403\u53d6\u7269\u53ca\u725b\u78fa\u9178\u7684\u6a5f\u80fd\u7cd6\u7403\uff0c\u5e6b\u52a9\u88dc\u5145\u5143\u6c23\u8207\u7cbe\u795e\u6d3b\u529b\uff0c\u6ab8\u6aac\u8584\u8377\u53e3\u5473\u3002\n**\u8a73\u7d30\u8aaa\u660e**\uff1a\u63a1\u56fa\u614b\u57f9\u990a\u725b\u6a1f\u829d\u83cc\u7d72\u9ad4\uff0c\u642d\u914d\u795e\u4ed9\u83dc\u8403\u53d6\u7269\uff08RabenLiv\u542bHCP774\uff09\u3001\u725b\u78fa\u9178\u53ca\u7dad\u751f\u7d20C\uff0c\u4ee5\u7cd6\u7403\u578b\u614b\u65b9\u4fbf\u98df\u7528\u3002\n**\u6210\u5206**\uff1a\u7802\u7cd6\u3001\u9ea5\u82bd\u7cd6\u3001\u6930\u5b50\u6cb9\u3001\u660e\u81a0\u3001\u6ab8\u6aac\u9178\uff08\u8abf\u5473\u5291\uff09\u3001\u6ab8\u6aac\u6fc3\u7e2e\u679c\u6c41\u3001\u7dad\u751f\u7d20C\uff08\u6297\u6c27\u5316\u5291\uff09\u3001\u9999\u6599\u3001\u725b\u6a1f\u829d\u83cc\u7d72\u9ad4\uff08\u56fa\u614b\u57f9\u990a\uff09\u3001\u725b\u78fa\u9178\u3001\u795e\u4ed9\u83dc\u8403\u53d6\u7269RabenLiv\uff08\u9ea5\u82bd\u7cca\u7cbe\u3001\u795e\u4ed9\u83dc\u8403\u53d6\u7269\uff09\u3001\u5929\u7136 c**\uff1a1\u96d9/\u6b63\u5e38\u5c3a\u5bf8\n**\u7522\u54c1\u7c21\u4ecb**\uff1a\u63a1\u77f3\u58a8\u70ef\u9060\u7d05\u5916\u7dda\u5e03\u6599\u88fd\u6210\u7684\u9577\u817f\u5957\uff0c\u900f\u904e\u9060\u7d05\u5916\u7dda\u9846\u7c92\u7d50\u69cb\u7279\u6b8a\u8a2d\u8a08\u63d0\u4f9b\u91cd\u9ede\u90e8\u4f4d\u6eab\u71b1\u4fdd\u6696\uff0c\u6709\u6b63\u5e38\u53ca\u52a0\u5927\u5169\u7a2e\u5c3a\u5bf8\u3002\n**\u8a73\u7d30\u8aaa\u660e**\uff1a\u5916\u5c64\u53ca\u5e95\u5c64100%\u805a\u916f\u7e96\u7dad\uff0c\u4e2d\u5c64100%\u5f48\u6027\u6a61\u81a0\u4e09\u5c64\u8907\u5408\u7d50\u69cb\uff0c\u7a7f\u8457\u6709\u660e\u986f\u6eab\u71b1\u767c\u71b1\u611f\uff0c\u9069\u5408\u65e5\u5e38\u4fdd\u6696\u6216\u904b\u52d5\u4f7f\u7528\u3002\n**\u6210\u5206**\uff1a\u5916\u5c64100%\u805a\u916f\u7e96\u7dad\u3001\u4e2d\u5c64100%\u5f48\u6027\u6a61\u81a0\u3001\u5e95\u5c64100%\u805a\u916f\u7e96\u7dad\n**\u4f7f\u7528\u65b9\u5f0f**\uff1a\u5957\u6234\u65bc\u817f\u90e8\uff0c\u7531\u8173\u8e1d\u8986\u84cb\u81f3\u5927\u817f\u4f4d\u7f6e\u3002\n**\u98df\u7528/\u4f7f\u7528\u6642\u6a5f**\uff1a\u4f9d\u7522\u54c1\u8aaa\u660e\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a\u8acb\u8a73\u95b1\u6ce8\u610f\u4e8b\u9805\n**\u904e\u654f\u539f**\uff1a\u7121\u7279\u5225\u6a19\u793a\n**\u6ce8\u610f\u4e8b\u9805**\uff1a\u6d17\u6ecc\u7528\u51b7\u6c34\uff0c\u624b\u6d17\u6c34\u6eab\u6700\u9ad8\u4e0d\u8d85\u904e40\u5ea6\uff1b\u4e0d\u53ef\u71a8\u71d9\u3001\u4e0d\u53ef\u6f02\u767d\u3001\u4e0d\u53ef\u5c08\u696d\u4e7e\u6d17\u3001\u4e0d\u53ef\u7ffb\u6efe\u70d8\u4e7e\uff1b\u9670\u6dbc\u8655\u61f8\u639b\u667e\u4e7e\uff1b\u6d17\u6ecc\u6642\u8acb\u653e\u5165\u6d17\u8863\u7db2\u3002\n\n\u8acb\u52ff\u4f7f\u7528\u67d4\u8edf\u7cbe\uff1b\u6df1\u6dfa\u8272\u5206\u958b\u6d17\u6ecc\u3002\n\n## HOT SNOW \u77f3\u58a8\u70ef\u9577\u8173\u8e1d\u5957\u52a0\u5927\u7248(\u96d9)\n**\u5206\u985e**\uff1a\u8b77\u5177/\u7d21\u7e54 | **\u7522\u5730**\uff1a\u53f0\u7063 | **\u898f\u683c**\uff1a1\u96d9/\u52a0\u5927\u5c3a\u5bf8\n**\u7522\u54c1\u7c21\u4ecb**\uff1a\u63a1\u77f3\ \u7063\u88fd\u91ab\u7642\u7d1a\u71b1\u6577\u588a\uff08\u885b\u90e8\u91ab\u5668\u88fd\u58f9\u767b\u5b57\u7b2c007341\u865f\uff09\u3002\u7d50\u5408\u9060\u7d05\u5916\u7dda\u6280\u8853\uff0c\u7528\u65bc\u7de9\u89e3\u808c\u8089\u75e0\u75db\u3001\u4fc3\u9032\u8840\u6db2\u5faa\u74b0\uff0c\u517712\u5c0f\u6642\u81ea\u52d5\u65b7\u96fb\u8207\u6eab\u63a7\u529f\u80fd\uff0c\u898f\u683c\u591a\u70ba \\(45 \\times 90\\) \u516c\u5206\uff0c\u9069\u5408\u5e8a\u588a\u4f7f\u7528\u3002\n**\u6210\u5206**\uff1a\u4e3b\u8981\u7279\u8272\uff1a\n\n\u25ba\u6280\u8853\u6838\u5fc3\uff1a \u5229\u7528\u9ad8\u79d1\u6280\u77f3\u58a8\u70ef\u7e96\u7dad\u50b3\u5c0e\u71b1\u80fd\uff0c\u642d\u914d\u6cd5\u570b\u937a\u77f3\u84c4\u71b1\uff0c\u7522\u751f\u9060\u7d05\u5916\u7dda\u3002\n\u25ba\u7522\u54c1\u5c6c\u6027\uff1a \u5c6c\u65bc\u7b2c\u4e00\u7b49\u7d1a\u91ab\u7642\u5668\u6750\uff0c\u901a\u904eSGS\u6aa2\u6e2c\u7121\u6bd2\u3001\u7121\u523a\u6fc0\u6027\uff0c\u5177\u5099\u96fb\u78c1\u76f8\u5bb9\u6027\u5408\u683c\u5b89\u5168\u898f\u7bc4\u3002\n\u25ba\u5b89\u5168\u6027\uff1a \u8a2d\u6709\u81ea\u52d5\u904e\u96fb\u4fdd\u8b77\uff0c12\u5c0f\u6642\u81ea\u52d5\u65b7\u96fb\uff0c\u63d0\u4f9b\u6eab\u63a7\u8a2d\u5b9a\u4ee5\u5229\u8abf\u7bc0\u3002\n\u25ba\u5c3a\u5bf8\u8207\u898f\u683c\uff1a \u5e38\u898b\u898f\u683c\u70ba \\(45 \\times 90\\) \u516c\u5206\uff0c\u5c6c\u65bc\u8f03\u5927\u578b\u7684\u6577\u588a\uff0c\u53ef\u7528\u65bc\u55ae\u4eba\u5e8a\u7bc4\u570d\u3002\n**\u4f7f\u7528\u65b9\u5f0f**\uff1a\u4f9d\u7522\u54c1\u8aaa\u660e\n**\u98df\u7528/\u4f7f\u7528\u6642\u6a5f**\uff1a\u4f9d\u7522\u54c1\u8aaa\u660e\n**\u4e0d\u9069\u7528\u65cf\u7fa4**\uff1a\u8acb\u8a73\u95b1\u6ce8\u610f\u4e8b\u9805\n**\u904e\u654f\u539f**\uff1a\u7121\u7279\u5225\u6a19\u793a\n**\u6ce8\u610f\u4e8b\u9805**\uff1a\u9632\u6b62\u71d9\u50b7\uff1a \u71b1\u6577\u588a\u6eab\u5ea6\u8f03\u9ad8\uff0c\u4e0d\u9069\u5408\u71b1\u6577\u7684\u6025\u6027\u75bc\u75db\u6216\u5c0d\u6eab\u5ea6\u4e0d\u654f\u611f\u8005\u61c9\u9075\u91ab\u56d1\u3002\n\n\u7279\u6b8a\u6750\u8cea\uff1a \u907f\u514d\u5728\u4e73\u81a0\u5e8a\u588a\u7b49\u805a\u71b1\u6750\u8cea\u4e0a\u9577\u6642\u9593\u8986\u84cb\u4f7f\u7528\uff0c\u4ee5\u514d\u71b1\u91cf\u904e\u9ad8\u3002\n", "snowHealth": "\n## 靈芝多醣體發泡錠(4g*10錠/管)\n**分類**：保健食品 | **產地**：台灣 | **規格**：4g/錠，10錠/管\n**產品簡介**：含靈芝多醣體、維生素C、維生素D及鋅的發泡錠，溶於水飲用，方便補充每日所需營養。\n**詳細說明**：添加靈芝菌絲體發酵液多醣體萃取物，搭配維生素C、維生素D 800IU及鋅，溶於水後飲用，適合日常免疫力與健康維持。\n**成分**：抗壞血酸（維生素C）、D-山梨醇、碳酸氫鈉、多醣體萃取物（靈芝菌絲體發酵液、難消化性麥芽糊精）、檸檬酸、酒石酸、聚乙二醇、橘子粉末香料、硫酸鋅、醋磺內酯鉀（甜味劑）、蔗糖素（甜味劑）、維生素D3\n**使用方式**：每日1錠，以150mL冷（溫）水沖泡溶解後飲用。\n**食用/使用時機**：依產品說明\n**不適用族群**：請詳閱注意事項\n**過敏原**：無特別標示\n**注意事項**：一日請勿超過1錠。\n\n本品容易受潮，開封後請儘早使用。\n\n瓶蓋內部突起處含乾燥劑請勿打開。\n\n發泡錠請勿直接吞食。\n\n請置於陰涼乾燥及兒童無法取得處，避免高溫及陽光直射。\n\n## 勁量快充電解水(8g*8包/盒)\n**分類**：保健食品 | **產地**：台灣 | **規格**：8g/包，8包/盒\n**產品簡介**：含靈芝多醣體的液態電解水補充品，無咖啡因，適合運動補充能量與電解質。\n**詳細說明**：以液態吸收快速，以補充能量取代預支能量為訴求。\n\n含靈芝多醣體菌絲體萃取粉末、綜合維生素及電解質，適合運動前後補充。\n**成分**：葡萄糖、麥芽糊精、多醣體萃取粉末（靈芝菌絲體液態培養）、食鹽（氯化鈉、碘酸鉀）、檸檬酸、檸檬香料粉、海藻鈣、氯化鉀、牛磺酸、綜合維生素（維生素C、E、A、B1、B2、B6、B12、D3、K1、菸鹼醯胺、本多酸鈣、葉酸、生物素）、二氧化矽、蔗糖素\n**使用方式**：每包以250cc冷水或溫水沖泡為1份，每1-2小時運動補充1份，可依需求調整，每日補充不超過4份。\n**食用/使用時機**：依產品說明\n**不適用族群**：請詳閱注意事項\n**過敏原**：無特別標示\n**注意事項**：請置於陰涼處，避免陽光照射。\n\n## 大激賞納豆Q10膠囊 30顆/瓶\n**分類**：保健食品 | **產地**：台灣 | **規格**：550毫克/粒，30粒/瓶\n**產品簡介**：含高單位納豆激酶、輔酶素Q10及酸棗仁萃取的保健膠囊，幫助調整體質並輔助入睡。\n**詳細說明**：每克4000FU以上的納豆萃取物，搭配青香蕉澱粉、輔酶素Q10、色胺酸及酸棗仁萃取物、銀杏果萃取物、紅景天萃取物等複方成分，有納豆菌數及活性相關檢測報告。\n**成分**：麥芽糊精、納豆提取物（納豆激酶、納豆益菌、糊精）、青香蕉澱粉、輔酶素Q10、色胺酸、酸棗仁萃取物、銀杏果萃取物、紅景天萃取物、葡萄籽萃取物。膠囊成分：羥丙基甲基纖維素、純水、鹿角菜膠、二氧化鈦、氯化鉀\n**使用方式**：每日2次，每次1粒，搭配溫開水食用。\n**食用/使用時機**：依產品說明\n**不適用族群**：哺乳婦女、相關成分過敏者\n**過敏原**：無特別標示\n**注意事項**：15歲以下孩童、懷孕或哺乳婦女及服用抗凝血藥品（warfarin）患者不宜食用。\n\n重大疾病及特殊體質者請先諮詢醫藥人員。\n\n本產品非藥品，罹病者仍需就醫。\n\n過敏原：含大豆、堅果類及其製品。\n\n## 大激賞葡萄糖胺步步順膠囊 30顆/瓶\n**分類**：保健食品 | **產地**：台灣 | **規格**：600mg*30顆/瓶\n**產品簡介**：含葡萄糖胺、鯊魚軟骨粉、MSM及二型膠原蛋白的關節保健膠囊，複方成分達到靈活關鍵。\n**詳細說明**：葡萄糖胺搭配鯊魚軟骨素、MSM（甲基硫醯基甲烷）、薑黃萃取粉、二型膠原蛋白、魚鱗鈣及維生素D等多重複方成分，全面支持關節健康。\n**成分**：葡萄糖胺（葡萄糖胺鹽酸鹽、聚乙烯吡咯烷酮）、鳳梨萃取物（含鳳梨酵素）、鯊魚軟骨素、碳酸鈣、MSM、薑黃萃取粉（含薑黃素）、二型膠原蛋白（U.C-KOLLA-II）、魚鱗鈣、硬脂酸鎂、維生素D、綜合礦物質（碳酸鈣、氧化鎂、葡萄糖酸鋅、焦磷酸鐵、硒酵母、鉻酵母）。膠囊成分：明膠、二氧化鈦、食用紅色六號、甘油等\n**使用方式**：每日2次，每次1粒，多食無益。\n**食用/使用時機**：依產品說明\n**不適用族群**：請詳閱注意事項\n**過敏原**：蛋及其製品、魚類及其製品\n**注意事項**：請存放於陰涼乾燥處，避免高溫及陽光照射。\n\n拆封後應儘速食用完畢。\n\n## 大激賞元氣紅潤膠囊 30顆/瓶\n**分類**：保健食品 | **產地**：台灣 | **規格**：500mg*30顆/瓶\n**產品簡介**：含甘氨酸亞鐵、複方維生素C及啤酒酵母B群的補鐵補血膠囊，幫助調整體質、維持活力好氣色。\n**詳細說明**：每顆含鐵質10mg（甘氨酸亞鐵50mg）、複方維生素C 32.5mg、啤酒酵母B群88.5mg，另含硒酵母及鋅酵母，幫助維持氣色與營養補給。\n**成分**：磷酸氫鈣、微結晶纖維素、啤酒酵母B群、硒酵母、複方維生素C（抗壞血酸、柑橘萃取物、米糠粉）、甘胺酸亞鐵、鋅酵母、重酒石酸膽鹼。膠囊成分：明膠、二氧化鈦、甘油、硫酸月桂酯鈉、純水\n**使用方式**：每日1次，每次1粒，多食無益。\n**食用/使用時機**：依產品說明\n**不適用族群**：請詳閱注意事項\n**過敏原**：無特別標示\n**注意事項**：請存放於陰涼乾燥處，避免高溫及陽光照射。\n\n拆封後應儘速食用完畢。\n\n## 橙長鈣(2g*30包/盒)\n**分類**：保健食品 | **產地**：台灣 | **規格**：2g*30包/盒\n**產品簡介**：含海藻鈣、氧化鎂及維生素D3的柳橙口味補鈣粉包，每份含172mg鈣質及85mg鎂，幫助骨骼保健。\n**詳細說明**：以海藻鈣為主要鈣質來源，搭配海洋深層水濃縮物、酪蛋白磷酸胜肽（CPP）及微米珍珠粉，添加維生素D3幫助鈣質吸收，複方補充效果優於單方鈣質補充品。\n**成分**：柳橙果汁粉（砂糖、柳橙濃縮果汁、麥芽糊精、辛烯基丁二酸鈉澱粉、檸檬酸、檸檬酸鈉、玉米澱粉、蘋果酸、橘子油、β-胡蘿蔔素、阿拉伯膠、中鏈三酸甘油酯、維生素C（抗氧化劑）、二氧化矽、維生素E（抗氧化劑））、海藻鈣、海洋深層水濃縮物（微結晶纖維素、海洋深層水濃縮液、羥丙基甲基纖維素、二氧化矽）、菊苣纖維、維生素D3（辛烯基丁二酸鈉澱粉、蔗糖、維生素C（抗氧化劑）、中鏈三酸甘油酯、二氧化矽、維生素E（抗氧化劑）、維生素D3、麥芽糊精）、酪蛋白磷酸肽\n**適用年齡**：1歲以上兒童即可補充；未滿1歲建議先諮詢兒科醫師\n**使用方式**：早餐飯後一次，每次一包。\n**食用/使用時機**：早餐後\n**不適用族群**：相關成分過敏者\n**過敏原**：牛乳及其製品、蛋及其製品\n**注意事項**：請放置陰涼乾燥處，避免高溫及陽光直射。\n\n過敏原：含牛乳及其製品。\n\n## 聰明多多益菌球 (50g/夾鏈包) (乳酸菌多多)\n**分類**：保養品 | **產地**：台灣 | **規格**：2.5g*20顆/包\n**產品簡介**：益菌球為台灣製造的益生菌軟糖，含225億熱封型益生菌與國際專利Lbiome®配方，適合全家日常補充，維持消化道機能。\n**詳細說明**：採用225億熱封型益生菌，結合國際專利Lbiome®及鎂元素，並添加高濃度原花青素以提升吸收效果。\n\n產品主打維持消化道機能、提高腸道吸收率，口感為軟糖球形式，方便兒童及成人食用。提供兩種口味選擇：乳酸菌多多口味及D+鈣草莓口味。\n**成分**：砂糖、麥芽糖、椰子油、明膠、檸檬酸（調味劑）、複合乳酸菌（乳糖、酵母萃取物、Lactobacillus fermentum、Lactobacillus delbrueckii subsp. Lactis）、乳酸、醋酸鈉、水解酪蛋白、碳酸鈣、磷酸氫二鉀、氧化鎂、松樹皮萃取物、奶粉、煉乳、香料、維生素C（抗氧化劑）、果寡醣、芽孢乳酸菌、棕櫚蠟（食品製造用劑）\n**使用方式**：\n一次一顆，細嚼慢嚥，勿直接吞食。兒童及老人須注意吞嚥安全；三歲以下幼童請於成人監護下食用。\n**食用/使用時機**：早晚清潔後使用\n**不適用族群**：相關成分過敏者\n**過敏原**：牛乳及其製品、蛋及其製品\n**注意事項**：本產品含奶類、含麩質之穀物、大豆及其製品，不適合相關過敏體質者食用。\n\n請置於乾燥陰涼處，避免高溫及陽光直射。\n\n## 聰明多多益菌球 (62.5g/枕頭包袋) (乳酸菌多多25顆單顆獨立包)\n**分類**：保養品 | **產地**：台灣 | **規格**：2.5g*25小包/袋\n**產品簡介**：益菌球為台灣製造的益生菌軟糖，含225億熱封型益生菌與國際專利Lbiome®配方，適合全家日常補充，維持消化道機能。\n**詳細說明**：採用225億熱封型益生菌，結合國際專利 let selectedCats = new Set(['diuHealth', 'faqOnly']);
let history = [];
let busy = false;

function toggleCat(cat, btn) {
  if (selectedCats.has(cat)) {
    // 至少保留一個
    if (selectedCats.size <= 1) return;
    selectedCats.delete(cat);
    btn.classList.remove('selected');
  } else {
    selectedCats.add(cat);
    btn.classList.add('selected');
  }
  updateStatus();
}

function updateStatus() {
  const labels = [...selectedCats].map(c => CAT_INFO[c].label);
  document.getElementById('selectedLabels').textContent = labels.join('、');

  // 估算 token 量
  let totalChars = KB.systemPrompt.length + KB.faqKB.length + KB.sopKB.length;
  selectedCats.forEach(cat => {
    const key = CAT_INFO[cat].kbKey;
    if (key && KB[key]) totalChars += KB[key].length;
  });

  const badge = document.getElementById('tokenBadge');
  if (totalChars < 20000) {
    badge.className = 'token-badge low'; badge.textContent = '💡 省流';
  } else if (totalChars < 40000) {
    badge.className = 'token-badge mid'; badge.textContent = '⚡ 中量';
  } else {
    badge.className = 'token-badge high'; badge.textContent = '🔥 高量';
  }
}

function buildSys() {
  let s = KB.systemPrompt + '\n\n---\n\n';
  
  selectedCats.forEach(cat => {
    const key = CAT_INFO[cat].kbKey;
    if (key && KB[key]) {
      s += '## ' + KB_TITLES[key] + '\n' + KB[key] + '\n\n';
    }
  });

  // FAQ+SOP 固定加入
  s += '## FAQ 完整庫（175筆）\n' + KB.faqKB + '\n\n';
  s += '## 客訴SOP庫\n' + KB.sopKB;
  return s;
}

  document.getElementById('noSelectWarn').style.display = 'none';

  inp.value = '';
  inp.style.height = 'auto';
  history.push({ role: 'user', content: txt });

  busy = true;
  document.getElementById('sendBtn').disabled = true;
  const loader = addLoader();

  try {
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 2000,
        system: buildSys(),
        messages: history
      })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const d = await res.json();
    const reply = d.content?.[0]?.text || '（無回覆）';
    removeEl(loader);
    history.push({ role: 'assistant', content: reply });
    addReply(reply);
  } catch (e) {
    removeEl(loader);
    addSys('❌ 錯誤：' + e.message);
  }
  busy = false;
  document.getElementById('sendBtn').disabled = false;
}

function addMsg(type, text) {
  const msgs = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'msg ' + type;
  d.textContent = text;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

function addReply(text) {
  const msgs = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap';
  const d = document.createElement('div');
  d.className = 'msg assistant';
  d.textContent = text;

  let badge = '';
  if (text.includes('需要轉人工') || text.includes('腫瘤') || text.includes('化療') || text.includes('腎功能不全')) {
    badge = '<span class="risk-badge risk-high">⚠️ 高風險</span>';
  } else if (text.includes('建議先諮詢醫師') || text.includes('先暫停') || text.includes('先諮詢')) {
    badge = '<span class="risk-badge risk-mid">⚡ 中風險</span>';
  } else {
    badge = '<span class="risk-badge risk-low">✅ 一般</span>';
  }

  const copyBtn = document.createElement('button');
  copyBtn.className = 'copy-btn';
  copyBtn.textContent = '📋 複製';
  copyBtn.onclick = () => {
    navigator.clipboard.writeText(text).then(() => {
      copyBtn.textContent = '✅ 已複製';
      copyBtn.classList.add('copied');
      setTimeout(() => { copyBtn.textContent = '📋 複製'; copyBtn.classList.remove('copied'); }, 2000);
    });
  };

  const meta = document.createElement('div');
  meta.className = 'msg-meta';
  meta.innerHTML = badge;
  meta.appendChild(copyBtn);
  wrap.appendChild(d);
  wrap.appendChild(meta);
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
}

function addSys(text) {
  const msgs = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'msg sys';
  d.textContent = text;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

function addLoader() {
  const msgs = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'loading';
  d.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
  return d;
}

function removeEl(el) { if (el && el.parentNode) el.parentNode.removeChild(el); }
function hideEmpty() { const e = document.getElementById('emptyState'); if (e) e.remove(); }
function clearChat() {
  history = [];
  document.getElementById('messages').innerHTML = '<div class="empty-state" id="emptyState"><div class="empty-icon">💬</div><div style="font-size:13px;color:#9ca3af">選擇產品類別（可多選），再貼上客人問題</div><div style="font-size:11px;color:#d1d5db;margin-top:3px">Enter 送出 ｜ Shift+Enter 換行</div></div>';
}
function fill(text) { const inp = document.getElementById('inp'); inp.value = text; inp.focus(); resize(inp); }
function onKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }
function resize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 140) + 'px'; }
</script>
</body>
</html>
